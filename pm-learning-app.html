<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PM Academy</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d2e;--bg3:#242740;--acc:#6c63ff;--acc2:#48bb78;--acc3:#f6ad55;--acc4:#fc8181;--txt:#e2e8f0;--txt2:#a0aec0;--brd:#2d3748;--r:14px;--sh:0 4px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
body.light{--bg:#f0f4f8;--bg2:#fff;--bg3:#e2e8f0;--acc:#5a52d5;--txt:#1a202c;--txt2:#4a5568;--brd:#cbd5e0;--sh:0 4px 24px rgba(0,0,0,.1)}
a{color:inherit;text-decoration:none}
.screen{display:none;min-height:100vh;padding-bottom:80px}
.screen.active{display:block}
/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -2px 20px rgba(0,0,0,.3)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;cursor:pointer;border:none;background:none;color:var(--txt2);font-size:10px;transition:.2s}
.nav-btn.active{color:var(--acc)}
.nav-btn span:first-child{font-size:20px}
/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--brd)}
.topbar-right{display:flex;gap:8px;align-items:center}
.streak-chip{background:linear-gradient(135deg,#f6ad55,#ed8936);color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700}
.btn{border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;transition:.2s}
.btn-ghost{background:var(--bg3);color:var(--txt)}
.btn-ghost:hover{background:var(--brd)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{opacity:.85}
/* HOME */
.hero{text-align:center;padding:40px 20px 24px;background:linear-gradient(160deg,var(--bg2) 0%,var(--bg) 100%)}
.hero h1{font-size:clamp(26px,6vw,42px);font-weight:800;line-height:1.2}
.hero h1 span{background:linear-gradient(135deg,var(--acc),#48bb78);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--txt2);margin-top:8px;font-size:14px}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px}
.level-card{background:var(--bg2);border-radius:var(--r);padding:20px;cursor:pointer;border:2px solid var(--brd);transition:.25s;position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;inset:0;background:var(--acc);opacity:0;transition:.3s}
.level-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.level-card:hover::before{opacity:.05}
.level-card h3{font-size:15px;margin-bottom:4px}
.level-card p{font-size:12px;color:var(--txt2);line-height:1.4}
.level-card .lc-icon{font-size:28px;margin-bottom:8px}
.ivw-banner{margin:0 20px 20px;background:linear-gradient(135deg,#553c9a,#6c63ff);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer}
.ivw-banner .ib-icon{font-size:36px}
.ivw-banner h3{font-size:16px;font-weight:700;color:#fff}
.ivw-banner p{font-size:12px;color:rgba(255,255,255,.8)}
/* MODULE LIST */
.search-bar{padding:12px 20px}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);padding:10px 16px;font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--acc)}
.filter-bar{display:flex;gap:8px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{border:1px solid var(--brd);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;background:var(--bg2);color:var(--txt2);transition:.2s}
.filter-chip.active{border-color:var(--acc);background:var(--acc);color:#fff}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:0 20px 20px}
.mod-card{background:var(--bg2);border-radius:var(--r);padding:20px;cursor:pointer;border:1px solid var(--brd);transition:.25s;display:flex;flex-direction:column;gap:8px}
.mod-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:var(--sh)}
.mc-head{display:flex;align-items:center;gap:12px}
.mc-icon{font-size:28px;background:var(--bg3);border-radius:10px;padding:8px;line-height:1}
.mc-meta{flex:1}
.mc-meta h3{font-size:15px;font-weight:700;margin-bottom:2px}
.mc-meta .mc-sub{font-size:12px;color:var(--txt2);line-height:1.3}
.mc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.mc-cat{background:var(--bg3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--txt2)}
.mc-dur{font-size:11px;color:var(--txt2)}
.mc-prog{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mc-prog-inner{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:.4s}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-beg{background:#bee3f8;color:#2b6cb0}
.badge-int{background:#fefcbf;color:#744210}
.badge-adv{background:#fed7e2;color:#702459}
/* MODULE DETAIL */
.mod-hero{padding:24px 20px 16px;background:linear-gradient(135deg,var(--bg2),var(--bg))}
.mod-hero h2{font-size:22px;font-weight:800;margin-bottom:4px}
.mod-hero p{color:var(--txt2);font-size:13px}
.tabs{display:flex;border-bottom:1px solid var(--brd);padding:0 20px}
.tab{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--txt2);border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab-body{display:none;padding:20px}
.tab-body.active{display:block}
.sec-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.sec-dots{display:flex;gap:6px}
.sec-dot{width:8px;height:8px;border-radius:50%;background:var(--brd);cursor:pointer;transition:.2s}
.sec-dot.active{background:var(--acc)}
/* content blocks */
.cb{background:var(--bg2);border-radius:var(--r);padding:20px;margin-bottom:16px}
.cb h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--txt)}
.cb h4{font-size:14px;font-weight:700;margin:12px 0 8px;color:var(--acc)}
.cb ul{padding-left:20px;display:flex;flex-direction:column;gap:6px}
.cb li{font-size:14px;line-height:1.5;color:var(--txt2)}
.cb li strong{color:var(--txt)}
.cb p{font-size:14px;line-height:1.6;color:var(--txt2)}
.cb p strong{color:var(--txt)}
.ib{background:rgba(108,99,255,.12);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin:12px 0}
.ib p{font-size:13px;color:var(--txt)}
.ib.g{background:rgba(72,187,120,.12);border-color:var(--acc2)}
.ib.y{background:rgba(246,173,85,.12);border-color:var(--acc3)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);padding:10px 12px;text-align:left;font-weight:700;color:var(--txt);border-bottom:1px solid var(--brd)}
td{padding:10px 12px;border-bottom:1px solid var(--brd);color:var(--txt2);line-height:1.4}
tr:last-child td{border-bottom:none}
/* QUIZ */
.quiz-wrap{max-width:640px;margin:0 auto;padding:20px}
.q-counter{text-align:right;font-size:12px;color:var(--txt2);margin-bottom:12px}
.q-card{background:var(--bg2);border-radius:var(--r);padding:24px;margin-bottom:16px}
.q-card h3{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:20px}
.opt-list{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--bg3);border-radius:12px;padding:14px 16px;cursor:pointer;border:2px solid transparent;font-size:14px;transition:.2s;text-align:left;width:100%;color:var(--txt)}
.opt:hover:not([disabled]){border-color:var(--acc);background:rgba(108,99,255,.1)}
.opt.correct{border-color:var(--acc2);background:rgba(72,187,120,.15);color:var(--txt)}
.opt.wrong{border-color:var(--acc4);background:rgba(252,129,129,.12);color:var(--txt)}
.exp-box{background:var(--bg3);border-radius:var(--r);padding:16px;margin-top:12px;border-left:3px solid var(--acc);font-size:13px;color:var(--txt2);line-height:1.6}
.quiz-result{text-align:center;padding:40px 20px}
.result-score{font-size:56px;font-weight:800;line-height:1}
.result-msg{font-size:18px;margin:12px 0;color:var(--txt2)}
.result-xp{background:linear-gradient(135deg,#f6ad55,#ed8936);color:#fff;border-radius:20px;padding:8px 20px;display:inline-block;font-weight:700;font-size:14px;margin-top:12px}
/* FLASHCARDS */
.fc-wrap{max-width:540px;margin:0 auto;padding:20px}
.fc-counter{text-align:center;font-size:13px;color:var(--txt2);margin-bottom:16px}
.fc-card{perspective:1000px;height:220px;cursor:pointer;margin-bottom:20px}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s;border-radius:var(--r)}
.fc-card.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-front{background:linear-gradient(135deg,var(--acc),#8b5cf6);color:#fff;font-size:16px;font-weight:700;line-height:1.5}
.fc-back{background:var(--bg2);border:2px solid var(--acc);transform:rotateY(180deg);color:var(--txt);font-size:14px;line-height:1.6}
.fc-hint{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:16px}
.fc-btns{display:flex;justify-content:center;gap:12px}
/* INTERVIEW */
.ivw-wrap{max-width:680px;margin:0 auto;padding:16px 20px}
.ivw-mode-bar{display:flex;gap:8px;margin-bottom:16px;background:var(--bg2);border-radius:var(--r);padding:6px}
.mode-btn{flex:1;padding:8px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;background:none;color:var(--txt2);transition:.2s}
.mode-btn.active{background:var(--acc);color:#fff}
.ivw-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:16px}
.ivw-cats::-webkit-scrollbar{display:none}
.ivw-q-card{background:var(--bg2);border-radius:var(--r);padding:24px;margin-bottom:12px}
.ivw-q-card h3{font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.5}
.ivw-q-card .diff-badge{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;display:inline-block;margin-bottom:10px}
.diff-basic{background:#bee3f8;color:#2b6cb0}
.diff-mid{background:#fefcbf;color:#744210}
.diff-adv{background:#fed7e2;color:#702459}
.ans-box{background:var(--bg3);border-radius:12px;padding:16px;margin-top:12px;border-left:3px solid var(--acc2);font-size:13px;color:var(--txt2);line-height:1.7;display:none}
.star-tip{text-align:center;background:rgba(108,99,255,.1);border-radius:var(--r);padding:12px;font-size:12px;color:var(--acc);font-weight:600;margin-bottom:16px}
/* MOCK MODE */
.mock-wrap{max-width:560px;margin:0 auto;padding:20px;text-align:center}
.mock-q{background:linear-gradient(135deg,var(--acc),#8b5cf6);border-radius:var(--r);padding:32px 24px;color:#fff;font-size:18px;font-weight:700;line-height:1.5;margin-bottom:20px;min-height:120px;display:flex;align-items:center;justify-content:center}
.mock-ans-wrap{background:var(--bg2);border-radius:var(--r);padding:24px;text-align:left;margin-bottom:16px;display:none}
.mock-ans-wrap h4{font-weight:700;margin-bottom:8px;color:var(--acc2)}
.mock-ans-wrap p{font-size:14px;color:var(--txt2);line-height:1.7}
/* DASHBOARD */
.dash-wrap{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:20px;text-align:center}
.stat-val{font-size:32px;font-weight:800;color:var(--acc)}
.stat-lbl{font-size:12px;color:var(--txt2);margin-top:4px}
.mod-status-list{background:var(--bg2);border-radius:var(--r);overflow:hidden}
.ms-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--brd)}
.ms-item:last-child{border-bottom:none}
.ms-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px}
.ms-info{flex:1}
.ms-info h4{font-size:13px;font-weight:600}
.ms-info p{font-size:11px;color:var(--txt2)}
.ms-xp{font-size:12px;font-weight:700;color:var(--acc3)}
/* XP bar */
.xp-bar-wrap{margin:16px 20px;background:var(--bg2);border-radius:var(--r);padding:16px}
.xp-bar-track{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;margin-top:8px}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:4px;transition:.5s}
/* RESPONSIVE */
@media(max-width:500px){.mod-grid{grid-template-columns:1fr}.level-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<!-- ===== HOME ===== -->
<div id="s-home" class="screen active">
  <div class="topbar">
    <strong style="font-size:18px">🎓 PM Academy</strong>
    <div class="topbar-right">
      <span class="streak-chip" id="streak-chip">🔥 0</span>
      <button class="btn btn-ghost" id="lang-btn" onclick="toggleLang()"></button>
      <button class="btn btn-ghost" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <div class="hero">
    <h1><span id="h1a"></span><br><span id="h1b"></span></h1>
    <p id="home-sub"></p>
  </div>
  <div class="level-grid" id="level-grid"></div>
  <div class="ivw-banner" onclick="goIvw()">
    <div class="ib-icon">🎤</div>
    <div>
      <h3 id="ivw-t"></h3>
      <p id="ivw-d"></p>
    </div>
    <button class="btn btn-acc" id="ivw-btn" style="margin-left:auto;white-space:nowrap"></button>
  </div>
</div>

<!-- ===== MODULES ===== -->
<div id="s-mods" class="screen">
  <div class="topbar">
    <strong id="mods-title"></strong>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="goHome()">←</button>
    </div>
  </div>
  <div class="search-bar"><input id="mod-search" oninput="filterMods()" placeholder="..."></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="mod-grid" id="mod-grid"></div>
</div>

<!-- ===== MODULE DETAIL ===== -->
<div id="s-mod" class="screen">
  <div class="topbar">
    <button class="btn btn-ghost" id="back-mods-btn" onclick="goMods()"></button>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="toggleLang()">🌐</button>
    </div>
  </div>
  <div class="mod-hero">
    <div id="mod-icon-big" style="font-size:40px;margin-bottom:8px"></div>
    <h2 id="mod-title"></h2>
    <p id="mod-sub-txt"></p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('content')" id="tab-content">📖</div>
    <div class="tab" onclick="switchTab('quiz')" id="tab-quiz" id="tab-q"></div>
    <div class="tab" onclick="switchTab('fc')" id="tab-fc"></div>
  </div>
  <!-- CONTENT TAB -->
  <div id="tab-body-content" class="tab-body active">
    <div class="sec-nav">
      <button class="btn btn-ghost" id="prev-btn" onclick="prevSec()"></button>
      <div class="sec-dots" id="sec-dots"></div>
      <button class="btn btn-acc" id="next-btn" onclick="nextSec()"></button>
    </div>
    <div id="sec-content"></div>
    <div style="padding:0 20px 20px;text-align:right">
      <button class="btn btn-acc" onclick="switchTab('quiz')" id="go-quiz-btn"></button>
    </div>
  </div>
  <!-- QUIZ TAB -->
  <div id="tab-body-quiz" class="tab-body">
    <div class="quiz-wrap" id="quiz-area"></div>
  </div>
  <!-- FLASHCARD TAB -->
  <div id="tab-body-fc" class="tab-body">
    <div class="fc-wrap">
      <p class="fc-hint" id="fc-hint"></p>
      <p class="fc-counter" id="fc-counter"></p>
      <div class="fc-card" id="fc-card" onclick="flipCard()">
        <div class="fc-inner">
          <div class="fc-front" id="fc-front"></div>
          <div class="fc-back" id="fc-back"></div>
        </div>
      </div>
      <div class="fc-btns">
        <button class="btn btn-ghost" onclick="fcNav(-1)">←</button>
        <button class="btn btn-ghost" onclick="fcNav(1)">→</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== INTERVIEW ===== -->
<div id="s-ivw" class="screen">
  <div class="topbar">
    <strong id="ivw-title"></strong>
    <button class="btn btn-ghost" onclick="goHome()">← </button>
  </div>
  <div class="ivw-wrap">
    <div class="ivw-mode-bar">
      <button class="mode-btn active" id="lib-mode-btn" onclick="setIvwMode('lib')" id="lib-btn"></button>
      <button class="mode-btn" id="mock-mode-btn" onclick="setIvwMode('mock')" id="mock-btn"></button>
    </div>
    <!-- LIBRARY -->
    <div id="ivw-lib">
      <div class="star-tip" id="star-tip"></div>
      <div class="ivw-cats" id="ivw-cats"></div>
      <div id="ivw-q-list"></div>
    </div>
    <!-- MOCK -->
    <div id="ivw-mock" style="display:none">
      <div class="mock-wrap">
        <div class="star-tip" id="star-tip2"></div>
        <div class="mock-q" id="mock-q-text"></div>
        <div class="mock-ans-wrap" id="mock-ans-wrap">
          <h4>💡 Tips & Guía</h4>
          <p id="mock-ans-text"></p>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-ghost" id="mock-show-btn" onclick="toggleMockAns()"></button>
          <button class="btn btn-acc" id="mock-next-btn" onclick="nextMockQ()"></button>
          <button class="btn btn-ghost" id="mock-shuf-btn" onclick="shuffleMock()"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="s-dash" class="screen">
  <div class="topbar">
    <strong id="prog-title"></strong>
    <button class="btn btn-ghost" onclick="goHome()">←</button>
  </div>
  <div class="dash-wrap">
    <p id="prog-sub" style="color:var(--txt2);font-size:13px;margin-bottom:16px"></p>
    <div class="stats-grid" id="stats-grid"></div>
    <h3 id="mod-status-title" style="margin-bottom:12px;font-size:15px"></h3>
    <div class="mod-status-list" id="mod-status-list"></div>
  </div>
</div>

<!-- NAV BAR -->
<nav>
  <button class="nav-btn active" onclick="goHome()" id="nav-home">
    <span>🏠</span><span>Home</span>
  </button>
  <button class="nav-btn" onclick="goMods()" id="nav-mods">
    <span>📚</span><span id="nav-mods-lbl">Módulos</span>
  </button>
  <button class="nav-btn" onclick="goIvw()" id="nav-ivw">
    <span>🎤</span><span id="nav-ivw-lbl">Entrevista</span>
  </button>
  <button class="nav-btn" onclick="goDash()" id="nav-dash">
    <span>📊</span><span id="nav-dash-lbl">Progreso</span>
  </button>
</nav>

<script>

tamental", "ivw_tec": "Técnica", "ivw_sit": "Situacional", "ivw_ask": "Preguntas al entrevistador", "show_ans": "Ver respuesta y tips →", "next_ivw": "Siguiente →", "shuffle": "🔀 Aleatorio", "mock_btn": "🎯 Simulacro", "lib_btn": "📚 Biblioteca", "star_tip": "Usa el Método STAR: Situación · Tarea · Acción · Resultado", "basic": "Básico", "mid": "Medio", "adv": "Avanzado", "search": "Buscar módulo..."}, "en": {"lang_btn": "🌐 ES", "dash_btn": "📊 My Progress", "streak_lbl": "🔥", "days": "days", "h1a": "Master", "h1b": "Project Management", "home_sub": "PMI/PMBOK · Scrum · Kanban · Lean · Six Sigma · CPMAI and more", "beg_t": "Beginner", "beg_d": "PM fundamentals, key roles and first methodologies.", "int_t": "Intermediate", "int_d": "PMI/PMBOK, Scrum, Kanban, PRINCE2, Lean and hybrid approaches.", "adv_t": "Advanced", "adv_d": "Six Sigma, CPMAI, CRISP-DM/ML, CPM and data-driven management.", "all_t": "All Content", "all_d": "All 17 modules with no level filter.", "ivw_t": "Job Interview", "ivw_d": "Common recruiter questions for PM positions.", "start": "Get Started →", "view_all": "View All →", "ivw_btn": "Practice →", "mods_title": "Modules", "mods_suf": " modules available", "filter_all": "All", "prog_title": "My Progress", "prog_sub": "Summary of your PM Academy progress", "stat_done": "Modules completed", "stat_tot": "Total modules", "stat_xp": "XP earned", "stat_avg": "Quiz average", "stat_str": "Streak", "mod_status": "Module status", "back_home": "← Home", "back_mods": "← Modules", "next": "Next →", "prev": "← Previous", "go_quiz": "Take Quiz →", "quiz_tab": "📝 Quiz", "fc_tab": "🃏 Flashcards", "retry": "🔄 Retake quiz", "review": "📖 Review module", "cont": "Continue →", "q_of": "of", "question": "Question", "correct": "✅ Correct", "wrong": "❌ Incorrect", "next_q": "Next question →", "see_res": "See results →", "res_ans": "correct answers", "msg_100": "Perfect! You mastered this module.", "msg_70": "Great job! Module completed.", "msg_low": "Room to improve. Review the content and try again.", "not_started": "Not started", "in_prog": "In progress: ", "done_quiz": "Quiz: ", "fc_title": "Flashcards", "flip_hint": "Click to flip", "card_of": "Card", "ivw_title": "Job Interview Prep", "ivw_sub": "Practice the most common PM interview questions", "ivw_all": "All", "ivw_beh": "Behavioral", "ivw_tec": "Technical", "ivw_sit": "Situational", "ivw_ask": "Ask the Interviewer", "show_ans": "Show answer & tips →", "next_ivw": "Next →", "shuffle": "🔀 Shuffle", "mock_btn": "🎯 Mock Interview", "lib_btn": "📚 Library", "star_tip": "Use the STAR Method: Situation · Task · Action · Result", "basic": "Basic", "mid": "Mid", "adv": "Advanced", "search": "Search module..."}};
const MODS=[{"id": "foundations", "icon": "📐", "title": {"es": "Fundamentos de Gestión de Proyectos", "en": "Project Management Fundamentals"}, "sub": {"es": "Bases esenciales para cualquier PM", "en": "Essential basics for every PM"}, "level": ["beginner"], "cat": {"es": "Fundamentos", "en": "Fundamentals"}, "dur": "25 min", "secs": [{"t": {"es": "Definición y Triángulo de Restricciones", "en": "Definition & Triple Constraint"}, "c": {"es": "<div class='cb'><h3>Proyecto y el Iron Triangle</h3><p>Un <strong>proyecto</strong> es un esfuerzo <strong>temporal</strong> para crear un resultado <strong>único</strong>. Sus 3 restricciones forman el <em>Iron Triangle</em>:</p><ul><li><strong>Alcance:</strong> ¿Qué se entregará?</li><li><strong>Tiempo:</strong> ¿Cuándo se entregará?</li><li><strong>Costo:</strong> ¿Cuánto costará?</li></ul><div class='ib'><p>💡 PMBOK añade Calidad, Riesgos y Satisfacción del Cliente como restricciones secundarias.</p></div><h4>Ciclo de Vida del Proyecto</h4><div class='tw'><table><tr><th>Fase</th><th>Entregable clave</th></tr><tr><td>Inicio</td><td>Acta de constitución (Project Charter)</td></tr><tr><td>Planificación</td><td>Plan del proyecto</td></tr><tr><td>Ejecución</td><td>Entregables del proyecto</td></tr><tr><td>Monitoreo y Control</td><td>Reportes de estatus</td></tr><tr><td>Cierre</td><td>Informe de cierre + Lecciones aprendidas</td></tr></table></div></div><div class='cb'><h3>El Rol del Project Manager</h3><ul><li>Planificación y organización del trabajo</li><li>Gestión de stakeholders (interesados)</li><li>Control de cronograma, presupuesto y alcance</li><li>Gestión de riesgos e incidentes</li><li>Comunicación en todos los niveles de la organización</li></ul><div class='ib g'><p>✅ <strong>Top habilidades PM:</strong> Comunicación · Liderazgo · Negociación · Resolución de problemas · Gestión del cambio</p></div></div>", "en": "<div class='cb'><h3>Project & the Iron Triangle</h3><p>A <strong>project</strong> is a <strong>temporary</strong> effort to create a <strong>unique</strong> result. Its 3 constraints form the <em>Iron Triangle</em>:</p><ul><li><strong>Scope:</strong> What will be delivered?</li><li><strong>Time:</strong> When will it be delivered?</li><li><strong>Cost:</strong> How much will it cost?</li></ul><div class='ib'><p>💡 PMBOK also considers Quality, Risk, and Customer Satisfaction as secondary constraints.</p></div><h4>Project Lifecycle Phases</h4><div class='tw'><table><tr><th>Phase</th><th>Key Deliverable</th></tr><tr><td>Initiating</td><td>Project Charter</td></tr><tr><td>Planning</td><td>Project Management Plan</td></tr><tr><td>Executing</td><td>Project Deliverables</td></tr><tr><td>Monitoring & Controlling</td><td>Status Reports</td></tr><tr><td>Closing</td><td>Closure Report + Lessons Learned</td></tr></table></div></div><div class='cb'><h3>The Project Manager Role</h3><ul><li>Planning and organizing work</li><li>Managing stakeholders</li><li>Controlling schedule, budget, and scope</li><li>Managing risks and issues</li><li>Communicating across all organizational levels</li></ul><div class='ib g'><p>✅ <strong>Top PM skills:</strong> Communication · Leadership · Negotiation · Problem Solving · Change Management</p></div></div>"}}], "quiz": [{"q": {"es": "¿Cuál NO es una característica de un proyecto según el PMI?", "en": "Which is NOT a characteristic of a project according to PMI?"}, "o": {"es": ["Temporal", "Repetitivo y continuo", "Único", "Progresivamente elaborado"], "en": ["Temporary", "Repetitive and continuous", "Unique", "Progressively elaborated"]}, "c": 1, "e": {"es": "Los proyectos son temporales, únicos y progresivos. Lo repetitivo y continuo describe las OPERACIONES.", "en": "Projects are temporary, unique, and progressive. Repetitive and continuous describes OPERATIONS, not projects."}}, {"q": {"es": "¿Qué representa el Iron Triangle?", "en": "What does the Iron Triangle represent?"}, "o": {"es": ["Calidad, Riesgo y Comunicación", "Alcance, Tiempo y Costo", "Inicio, Ejecución y Cierre", "Planificación, Control y Mejora"], "en": ["Quality, Risk and Communication", "Scope, Time and Cost", "Initiation, Execution and Closure", "Planning, Control and Improvement"]}, "c": 1, "e": {"es": "El Triángulo de Hierro representa las tres restricciones fundamentales: Alcance, Tiempo y Costo.", "en": "The Iron Triangle represents the three fundamental constraints: Scope, Time, and Cost. Changing one affects the others."}}, {"q": {"es": "¿Cuál es el entregable típico de la fase de Inicio?", "en": "What is the key deliverable of the Initiating phase?"}, "o": {"es": ["Plan del proyecto", "Informe de cierre", "Acta de constitución del proyecto", "Reportes de estatus"], "en": ["Project Management Plan", "Closure Report", "Project Charter", "Status Reports"]}, "c": 2, "e": {"es": "El Acta de Constitución (Project Charter) autoriza formalmente el proyecto y nombra al PM.", "en": "The Project Charter formally authorizes the project and names the PM. Without it, the project has no official sanction."}}, {"q": {"es": "¿Cuál habilidad es más crítica para un PM exitoso?", "en": "Which skill is most critical for a successful PM?"}, "o": {"es": ["Programación avanzada", "Comunicación efectiva", "Contabilidad financiera", "Diseño gráfico"], "en": ["Advanced programming", "Effective communication", "Financial accounting", "Graphic design"]}, "c": 1, "e": {"es": "La comunicación es la habilidad más crítica. Los PMs dedican hasta el 90% de su tiempo comunicándose.", "en": "Communication is the most critical skill. PMs spend up to 90% of their time communicating with stakeholders and teams."}}]}, {"id": "pmbok", "icon": "📘", "title": {"es": "PMI / PMBOK Guide", "en": "PMI / PMBOK Guide"}, "sub": {"es": "El estándar global de gestión de proyectos", "en": "The global standard for project management"}, "level": ["beginner", "intermediate"], "cat": {"es": "Estándar PMI", "en": "PMI Standard"}, "dur": "40 min", "secs": [{"t": {"es": "PMI, Certificaciones y PMBOK 7", "en": "PMI, Certifications & PMBOK 7"}, "c": {"es": "<div class='cb'><h3>PMI y el PMBOK® Guide</h3><p>El <strong>Project Management Institute (PMI)</strong> es la organización líder en PM con más de 700,000 miembros en 185 países. El <strong>PMBOK 7</strong> (2021) pasó de procesos prescriptivos a <strong>12 Principios</strong> y <strong>8 Dominios de Desempeño</strong>.</p><h4>Certificaciones PMI</h4><ul><li><strong>PMP:</strong> La más valorada mundialmente. Requiere experiencia y examen.</li><li><strong>PMI-ACP:</strong> Para profesionales ágiles.</li><li><strong>CAPM:</strong> Ideal para principiantes.</li><li><strong>PgMP:</strong> Para gestores de programas.</li></ul></div>", "en": "<div class='cb'><h3>PMI & the PMBOK® Guide</h3><p>The <strong>Project Management Institute (PMI)</strong> is the leading PM organization with 700,000+ members in 185 countries. <strong>PMBOK 7</strong> (2021) shifted from prescriptive processes to <strong>12 Principles</strong> and <strong>8 Performance Domains</strong>.</p><h4>PMI Certifications</h4><ul><li><strong>PMP:</strong> Most valued globally. Requires experience and exam.</li><li><strong>PMI-ACP:</strong> For agile practitioners.</li><li><strong>CAPM:</strong> Ideal for beginners.</li><li><strong>PgMP:</strong> For program managers.</li></ul></div>"}}, {"t": {"es": "5 Grupos de Proceso y 10 Áreas", "en": "5 Process Groups & 10 Knowledge Areas"}, "c": {"es": "<div class='cb'><h3>Los 5 Grupos de Proceso (PMBOK 6)</h3><div class='tw'><table><tr><th>Grupo</th><th>Propósito</th></tr><tr><td>1. Inicio</td><td>Autorizar y definir el proyecto</td></tr><tr><td>2. Planificación</td><td>Definir cómo se logrará el trabajo</td></tr><tr><td>3. Ejecución</td><td>Realizar el trabajo planificado</td></tr><tr><td>4. Monitoreo y Control</td><td>Medir, comparar y corregir</td></tr><tr><td>5. Cierre</td><td>Finalizar formalmente el proyecto</td></tr></table></div><div class='ib y'><p>⚠️ Los grupos de proceso NO son fases del proyecto. Planificación y Monitoreo ocurren a lo largo de todo el proyecto.</p></div></div><div class='cb'><h3>Las 10 Áreas de Conocimiento</h3><p>Integración · Alcance · Cronograma · Costos · Calidad · Recursos · Comunicaciones · Riesgos · Adquisiciones · Stakeholders</p><h4>PMBOK 7: 12 Principios clave</h4><ul><li>Administrador diligente · Equipo colaborativo · Stakeholders involucrados · Enfoque en valor</li><li>Pensamiento sistémico · Liderazgo · Adaptabilidad · Calidad incorporada</li><li>Navegar complejidad · Optimizar riesgo · Resiliencia · Habilitar el cambio</li></ul></div>", "en": "<div class='cb'><h3>The 5 Process Groups (PMBOK 6)</h3><div class='tw'><table><tr><th>Group</th><th>Purpose</th></tr><tr><td>1. Initiating</td><td>Authorize and define the project</td></tr><tr><td>2. Planning</td><td>Define how the work will be done</td></tr><tr><td>3. Executing</td><td>Perform the planned work</td></tr><tr><td>4. Monitoring & Controlling</td><td>Measure, compare and correct</td></tr><tr><td>5. Closing</td><td>Formally finalize the project</td></tr></table></div><div class='ib y'><p>⚠️ Process groups are NOT project phases. Planning and Monitoring occur throughout the entire project.</p></div></div><div class='cb'><h3>The 10 Knowledge Areas</h3><p>Integration · Scope · Schedule · Cost · Quality · Resource · Communications · Risk · Procurement · Stakeholders</p><h4>PMBOK 7: 12 Guiding Principles</h4><ul><li>Stewardship · Collaborative team · Engaged stakeholders · Focus on value</li><li>Systems thinking · Leadership · Adaptability · Quality</li><li>Navigate complexity · Optimize risk · Resilience · Enable change</li></ul></div>"}}], "quiz": [{"q": {"es": "¿Cuántos grupos de proceso define el PMBOK 6?", "en": "How many process groups does PMBOK 6 define?"}, "o": {"es": ["3", "5", "10", "12"], "en": ["3", "5", "10", "12"]}, "c": 1, "e": {"es": "PMBOK 6 define 5 grupos de proceso: Inicio, Planificación, Ejecución, Monitoreo y Control, y Cierre.", "en": "PMBOK 6 defines 5 process groups: Initiating, Planning, Executing, Monitoring & Controlling, and Closing."}}, {"q": {"es": "¿Qué cambio principal introduce el PMBOK 7?", "en": "What is the main change introduced by PMBOK 7?"}, "o": {"es": ["Agrega 2 nuevas áreas", "Reemplaza procesos por 12 principios y 8 dominios", "Elimina la gestión de riesgos", "Enfoca todo en Agile"], "en": ["Adds 2 new areas", "Replaces processes with 12 principles and 8 domains", "Eliminates risk management", "Focuses entirely on Agile"]}, "c": 1, "e": {"es": "PMBOK 7 pasa de un enfoque prescriptivo a uno basado en principios y dominios de desempeño, siendo más flexible.", "en": "PMBOK 7 shifts from a prescriptive process-based approach to one based on principles and performance domains, becoming more flexible."}}, {"q": {"es": "¿Cuál área de conocimiento gestiona 'qué incluye y qué NO incluye el proyecto'?", "en": "Which knowledge area manages what is and is NOT included in the project?"}, "o": {"es": ["Integración", "Comunicaciones", "Alcance", "Calidad"], "en": ["Integration", "Communications", "Scope", "Quality"]}, "c": 2, "e": {"es": "El Área de Alcance (Scope) define y controla qué trabajo es necesario, incluyendo la prevención del scope creep.", "en": "The Scope Knowledge Area defines and controls what work is necessary, including preventing scope creep."}}, {"q": {"es": "¿Cuál es la certificación PMI más reconocida globalmente?", "en": "Which PMI certification is most globally recognized?"}, "o": {"es": ["CAPM", "PMI-ACP", "PMP", "PgMP"], "en": ["CAPM", "PMI-ACP", "PMP", "PgMP"]}, "c": 2, "e": {"es": "El PMP es la certificación más valorada globalmente. Requiere experiencia demostrable y examen riguroso.", "en": "The PMP is the most valued certification globally. It requires demonstrated project experience and a rigorous exam."}}]}, {"id": "scrum", "icon": "🏃", "title": {"es": "Scrum", "en": "Scrum"}, "sub": {"es": "El marco ágil más utilizado en el mundo", "en": "The world's most widely used agile framework"}, "level": ["beginner", "intermediate"], "cat": {"es": "Ágil", "en": "Agile"}, "dur": "35 min", "secs": [{"t": {"es": "Pilares, Valores y Roles", "en": "Pillars, Values & Roles"}, "c": {"es": "<div class='cb'><h3>Scrum: Marco Ágil Empírico</h3><p>Marco liviano para generar valor a través de soluciones adaptativas. Basado en empirismo y lean thinking.</p><div class='ib'><p>📖 La Scrum Guide la mantienen Ken Schwaber y Jeff Sutherland. Última versión: noviembre 2020.</p></div><h4>3 Pilares · 5 Valores</h4><ul><li><strong>Transparencia · Inspección · Adaptación</strong></li><li>Compromiso · Foco · Apertura · Respeto · Coraje</li></ul><h4>Los 3 Roles</h4><div class='tw'><table><tr><th>Rol</th><th>Responsabilidad</th></tr><tr><td>Product Owner</td><td>Maximizar el valor. Gestiona el Product Backlog.</td></tr><tr><td>Scrum Master</td><td>Facilita Scrum, elimina impedimentos. Líder-servidor.</td></tr><tr><td>Developers</td><td>Crean el Incremento. Auto-organizados (3-9).</td></tr></table></div></div>", "en": "<div class='cb'><h3>Scrum: An Empirical Framework</h3><p>A lightweight framework for generating value through adaptive solutions to complex problems. Built on empiricism and lean thinking.</p><div class='ib'><p>📖 The Scrum Guide is maintained by Ken Schwaber and Jeff Sutherland. Latest version: November 2020.</p></div><h4>3 Pillars · 5 Values</h4><ul><li><strong>Transparency · Inspection · Adaptation</strong></li><li>Commitment · Focus · Openness · Respect · Courage</li></ul><h4>The 3 Roles</h4><div class='tw'><table><tr><th>Role</th><th>Responsibility</th></tr><tr><td>Product Owner</td><td>Maximize value. Manages the Product Backlog.</td></tr><tr><td>Scrum Master</td><td>Facilitates Scrum, removes impediments. Servant leader.</td></tr><tr><td>Developers</td><td>Build the Increment. Self-organized (3-9).</td></tr></table></div></div>"}}, {"t": {"es": "Eventos y Artefactos", "en": "Events & Artifacts"}, "c": {"es": "<div class='cb'><h3>Los 5 Eventos de Scrum</h3><div class='tw'><table><tr><th>Evento</th><th>Duración máx. (Sprint 4 sem.)</th></tr><tr><td>Sprint</td><td>4 semanas</td></tr><tr><td>Sprint Planning</td><td>8 horas</td></tr><tr><td>Daily Scrum</td><td>15 minutos</td></tr><tr><td>Sprint Review</td><td>4 horas</td></tr><tr><td>Sprint Retrospective</td><td>3 horas</td></tr></table></div></div><div class='cb'><h3>Los 3 Artefactos + Sus Compromisos</h3><ul><li><strong>Product Backlog</strong> → Product Goal</li><li><strong>Sprint Backlog</strong> → Sprint Goal</li><li><strong>Incremento</strong> → Definition of Done (DoD)</li></ul><div class='ib g'><p>✅ Cada artefacto tiene un compromiso que provee transparencia y foco hacia los objetivos del equipo.</p></div></div>", "en": "<div class='cb'><h3>The 5 Scrum Events</h3><div class='tw'><table><tr><th>Event</th><th>Max. Duration (4-week Sprint)</th></tr><tr><td>Sprint</td><td>4 weeks</td></tr><tr><td>Sprint Planning</td><td>8 hours</td></tr><tr><td>Daily Scrum</td><td>15 minutes</td></tr><tr><td>Sprint Review</td><td>4 hours</td></tr><tr><td>Sprint Retrospective</td><td>3 hours</td></tr></table></div></div><div class='cb'><h3>The 3 Artifacts + Their Commitments</h3><ul><li><strong>Product Backlog</strong> → Product Goal</li><li><strong>Sprint Backlog</strong> → Sprint Goal</li><li><strong>Increment</strong> → Definition of Done (DoD)</li></ul><div class='ib g'><p>✅ Each artifact has a commitment that provides transparency and focus toward the team's objectives.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Cuáles son los 3 pilares del empirismo en Scrum?", "en": "What are the 3 pillars of empiricism in Scrum?"}, "o": {"es": ["Planificación, Ejecución, Revisión", "Transparencia, Inspección, Adaptación", "Velocidad, Calidad, Entrega", "Daily, Retro, Planning"], "en": ["Planning, Execution, Review", "Transparency, Inspection, Adaptation", "Speed, Quality, Delivery", "Daily, Retro, Planning"]}, "c": 1, "e": {"es": "Los 3 pilares: Transparencia, Inspección y Adaptación. Forman la base del empirismo en Scrum.", "en": "The 3 pillars: Transparency, Inspection, and Adaptation. They form the foundation of empiricism in Scrum."}}, {"q": {"es": "¿Quién gestiona y ordena el Product Backlog?", "en": "Who manages and orders the Product Backlog?"}, "o": {"es": ["Scrum Master", "Project Manager", "Product Owner", "Tech Lead"], "en": ["Scrum Master", "Project Manager", "Product Owner", "Tech Lead"]}, "c": 2, "e": {"es": "El Product Owner (PO) maximiza el valor del producto y es el único con autoridad sobre el Product Backlog.", "en": "The Product Owner (PO) maximizes product value and is the only one with authority over the Product Backlog."}}, {"q": {"es": "¿Cuál es la duración máxima del Daily Scrum?", "en": "What is the maximum duration of the Daily Scrum?"}, "o": {"es": ["5 minutos", "30 minutos", "15 minutos", "1 hora"], "en": ["5 minutes", "30 minutes", "15 minutes", "1 hour"]}, "c": 2, "e": {"es": "El Daily Scrum tiene un time-box de 15 minutos para que los Developers inspeccionen el progreso hacia el Sprint Goal.", "en": "The Daily Scrum has a 15-minute timebox for Developers to inspect progress toward the Sprint Goal."}}, {"q": {"es": "¿Qué artefacto tiene como compromiso la Definition of Done?", "en": "Which artifact has the Definition of Done as its commitment?"}, "o": {"es": ["Product Backlog", "Sprint Backlog", "Sprint Goal", "Incremento"], "en": ["Product Backlog", "Sprint Backlog", "Sprint Goal", "Increment"]}, "c": 3, "e": {"es": "El Incremento tiene como compromiso la DoD. Asegura que el Incremento sea potencialmente entregable.", "en": "The Increment has the DoD as its commitment. It ensures the Increment is potentially shippable at all times."}}]}, {"id": "kanban", "icon": "📋", "title": {"es": "Kanban", "en": "Kanban"}, "sub": {"es": "Visualiza el flujo y elimina cuellos de botella", "en": "Visualize flow and eliminate bottlenecks"}, "level": ["intermediate"], "cat": {"es": "Ágil", "en": "Agile"}, "dur": "25 min", "secs": [{"t": {"es": "Principios, Prácticas y Métricas", "en": "Principles, Practices & Metrics"}, "c": {"es": "<div class='cb'><h3>¿Qué es Kanban?</h3><p>Método de gestión del flujo de trabajo para <strong>visualizar el trabajo, limitar el WIP</strong> y maximizar la eficiencia. No requiere cambiar tu proceso actual.</p><h4>4 Principios + 6 Prácticas</h4><ul><li>Empezar con lo que haces ahora · Mejora incremental</li><li><strong>Visualizar</strong> el trabajo · <strong>Limitar el WIP</strong> · Gestionar el flujo</li><li>Políticas explícitas · Feedback loops · Mejorar y evolucionar</li></ul></div><div class='cb'><h3>Métricas Clave</h3><div class='tw'><table><tr><th>Métrica</th><th>Definición</th></tr><tr><td>Lead Time</td><td>Desde solicitud del cliente hasta entrega</td></tr><tr><td>Cycle Time</td><td>Desde que el equipo empieza hasta que termina</td></tr><tr><td>Throughput</td><td>Ítems completados por unidad de tiempo</td></tr></table></div><div class='ib g'><p>📐 <strong>Ley de Little:</strong> Lead Time = WIP ÷ Throughput. Reducir WIP reduce el Lead Time.</p></div></div>", "en": "<div class='cb'><h3>What is Kanban?</h3><p>A workflow management method to <strong>visualize work, limit WIP</strong> and maximize efficiency. It does not require changing your current process.</p><h4>4 Principles + 6 Practices</h4><ul><li>Start with what you do now · Pursue incremental change</li><li><strong>Visualize</strong> work · <strong>Limit WIP</strong> · Manage flow</li><li>Explicit policies · Feedback loops · Improve and evolve</li></ul></div><div class='cb'><h3>Key Metrics</h3><div class='tw'><table><tr><th>Metric</th><th>Definition</th></tr><tr><td>Lead Time</td><td>From customer request to delivery</td></tr><tr><td>Cycle Time</td><td>From team start to completion</td></tr><tr><td>Throughput</td><td>Items completed per unit of time</td></tr></table></div><div class='ib g'><p>📐 <strong>Little's Law:</strong> Lead Time = WIP ÷ Throughput. Reducing WIP reduces Lead Time.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Cuál es el propósito principal de limitar el WIP en Kanban?", "en": "What is the main purpose of limiting WIP in Kanban?"}, "o": {"es": ["Reducir el número de empleados", "Hacer visible el trabajo pendiente", "Mejorar el flujo y reducir el tiempo de entrega", "Aumentar la velocidad de planificación"], "en": ["Reduce headcount", "Make pending work visible", "Improve flow and reduce delivery time", "Increase planning speed"]}, "c": 2, "e": {"es": "Limitar el WIP mejora el flujo reduciendo el multitasking. Según la Ley de Little: Lead Time = WIP ÷ Throughput.", "en": "Limiting WIP improves flow by reducing multitasking. Per Little's Law: Lead Time = WIP ÷ Throughput."}}, {"q": {"es": "¿Qué mide el Cycle Time?", "en": "What does Cycle Time measure?"}, "o": {"es": ["Tiempo total desde solicitud hasta entrega", "Tiempo desde que el equipo empieza hasta que termina", "Número de ítems por semana", "Duración de un ciclo de mejora"], "en": ["Total time from request to delivery", "Time from team start to item completion", "Items completed per week", "Duration of an improvement cycle"]}, "c": 1, "e": {"es": "Cycle Time mide desde que el equipo empieza activamente hasta que termina. Lead Time incluye también el tiempo de espera previo.", "en": "Cycle Time measures from when the team actively starts work until completion. Lead Time also includes the waiting time before work starts."}}, {"q": {"es": "'Hacer políticas explícitas' significa:", "en": "'Making policies explicit' means:"}, "o": {"es": ["Crear reglas corporativas rígidas", "Definir claramente cómo funciona el proceso de trabajo", "Documentar todo en manuales", "Establecer jerarquías claras"], "en": ["Creating rigid corporate rules", "Clearly defining how the work process operates", "Documenting everything in manuals", "Establishing clear hierarchies"]}, "c": 1, "e": {"es": "Significa definir y visualizar las reglas del proceso: criterios de entrada/salida de columnas, DoD y priorización.", "en": "It means defining and visualizing process rules: column entry/exit criteria, column-level DoD, and how items are prioritized."}}]}, {"id": "waterfall", "icon": "💧", "title": {"es": "Cascada (Waterfall)", "en": "Waterfall"}, "sub": {"es": "Enfoque tradicional secuencial y estructurado", "en": "Traditional sequential and structured approach"}, "level": ["beginner"], "cat": {"es": "Tradicional", "en": "Traditional"}, "dur": "20 min", "secs": [{"t": {"es": "Fases y Cuándo Usarlo", "en": "Phases and When to Use It"}, "c": {"es": "<div class='cb'><h3>Metodología Cascada</h3><p>Organiza el proyecto en <strong>fases secuenciales lineales</strong>. Cada fase debe completarse antes de iniciar la siguiente.</p><div class='ib y'><p>⚠️ El costo de cambiar requisitos aumenta exponencialmente conforme avanza el proyecto.</p></div><h4>Las 6 Fases</h4><div class='tw'><table><tr><th>Fase</th><th>Actividad principal</th></tr><tr><td>1. Requisitos</td><td>Captura completa de todos los requisitos</td></tr><tr><td>2. Diseño</td><td>Arquitectura, diseño de BD, interfaces</td></tr><tr><td>3. Implementación</td><td>Desarrollo y codificación</td></tr><tr><td>4. Pruebas</td><td>Verificación y validación del sistema</td></tr><tr><td>5. Despliegue</td><td>Instalación en producción</td></tr><tr><td>6. Mantenimiento</td><td>Correcciones y mejoras</td></tr></table></div><h4>¿Cuándo usar Cascada?</h4><ul><li>Requisitos bien definidos y estables</li><li>Proyectos de construcción, manufactura, ingeniería civil</li><li>Proyectos con regulaciones estrictas o contratos fijos</li></ul></div>", "en": "<div class='cb'><h3>Waterfall Methodology</h3><p>Organizes the project into <strong>sequential linear phases</strong>. Each phase must be completed before the next begins.</p><div class='ib y'><p>⚠️ The cost of changing requirements grows exponentially as the project progresses.</p></div><h4>The 6 Phases</h4><div class='tw'><table><tr><th>Phase</th><th>Main Activity</th></tr><tr><td>1. Requirements</td><td>Complete capture of all requirements</td></tr><tr><td>2. Design</td><td>Architecture, DB design, interfaces</td></tr><tr><td>3. Implementation</td><td>Development and coding</td></tr><tr><td>4. Testing</td><td>System verification and validation</td></tr><tr><td>5. Deployment</td><td>Production installation</td></tr><tr><td>6. Maintenance</td><td>Post-launch fixes and improvements</td></tr></table></div><h4>When to Use Waterfall?</h4><ul><li>Well-defined and stable requirements</li><li>Construction, manufacturing, civil engineering</li><li>Projects with strict regulations or fixed contracts</li></ul></div>"}}], "quiz": [{"q": {"es": "¿Cuál es la característica principal del modelo Cascada?", "en": "What is the main characteristic of the Waterfall model?"}, "o": {"es": ["Las fases se superponen y son iterativas", "Cada fase debe completarse antes de iniciar la siguiente", "No requiere documentación formal", "El equipo se auto-organiza en sprints"], "en": ["Phases overlap and are iterative", "Each phase must complete before starting the next", "No formal documentation required", "Team self-organizes in sprints"]}, "c": 1, "e": {"es": "En Cascada el flujo es estrictamente secuencial: Requisitos → Diseño → Implementación → Pruebas → Despliegue.", "en": "In Waterfall the flow is strictly sequential: Requirements → Design → Implementation → Testing → Deployment."}}, {"q": {"es": "¿En qué tipo de proyecto es más adecuado el modelo Cascada?", "en": "For which type of project is Waterfall most suitable?"}, "o": {"es": ["Startups con requisitos cambiantes", "Construcción de un puente con especificaciones fijas", "Desarrollo de un MVP digital", "Proyectos con alta incertidumbre"], "en": ["Startups with changing requirements", "Building a bridge with fixed specifications", "Developing a digital MVP", "Projects with high uncertainty"]}, "c": 1, "e": {"es": "Cascada es ideal para proyectos con requisitos claros, estables y bien definidos desde el inicio.", "en": "Waterfall is ideal for projects with clear, stable, and well-defined requirements from the start."}}]}, {"id": "prince2", "icon": "👑", "title": {"es": "PRINCE2", "en": "PRINCE2"}, "sub": {"es": "Metodología estructurada con justificación de negocio", "en": "Structured methodology with continued business justification"}, "level": ["intermediate"], "cat": {"es": "Tradicional", "en": "Traditional"}, "dur": "30 min", "secs": [{"t": {"es": "Principios, Temas y Procesos", "en": "Principles, Themes & Processes"}, "c": {"es": "<div class='cb'><h3>¿Qué es PRINCE2?</h3><p><strong>PRINCE2</strong> (PRojects IN Controlled Environments) es una metodología estructurada del Reino Unido basada en <strong>7 Principios, 7 Temas y 7 Procesos</strong>.</p><div class='ib'><p>💡 Filosofía: <strong>Justificación continua del negocio</strong>. Si el proyecto ya no tiene valor, debe detenerse.</p></div><h4>Los 7 Principios</h4><ul><li>Justificación continua del negocio · Aprender de la experiencia · Roles y responsabilidades definidos</li><li>Gestión por fases · Gestión por excepción · Enfoque en los productos · Adaptación al entorno</li></ul></div><div class='cb'><h3>Los 7 Temas</h3><div class='tw'><table><tr><th>Tema</th><th>Pregunta que responde</th></tr><tr><td>Business Case</td><td>¿Por qué hacemos este proyecto?</td></tr><tr><td>Organización</td><td>¿Quién es responsable de qué?</td></tr><tr><td>Calidad</td><td>¿Qué estamos haciendo y si es aceptable?</td></tr><tr><td>Planes</td><td>¿Cómo, cuándo y cuánto?</td></tr><tr><td>Riesgo</td><td>¿Qué pasa si algo sale mal?</td></tr><tr><td>Cambio</td><td>¿Qué efecto tienen los cambios?</td></tr><tr><td>Progreso</td><td>¿Dónde estamos vs. el plan?</td></tr></table></div></div>", "en": "<div class='cb'><h3>What is PRINCE2?</h3><p><strong>PRINCE2</strong> (PRojects IN Controlled Environments) is a structured UK methodology based on <strong>7 Principles, 7 Themes, and 7 Processes</strong>.</p><div class='ib'><p>💡 Philosophy: <strong>Continued Business Justification</strong>. If the project no longer has value, it must be stopped.</p></div><h4>The 7 Principles</h4><ul><li>Continued business justification · Learn from experience · Defined roles and responsibilities</li><li>Manage by stages · Manage by exception · Focus on products · Tailor to environment</li></ul></div><div class='cb'><h3>The 7 Themes</h3><div class='tw'><table><tr><th>Theme</th><th>Question it answers</th></tr><tr><td>Business Case</td><td>Why are we doing this project?</td></tr><tr><td>Organization</td><td>Who is responsible for what?</td></tr><tr><td>Quality</td><td>What are we building and is it acceptable?</td></tr><tr><td>Plans</td><td>How, when and how much will it cost?</td></tr><tr><td>Risk</td><td>What if something goes wrong?</td></tr><tr><td>Change</td><td>What is the impact of changes?</td></tr><tr><td>Progress</td><td>Where are we vs. the plan?</td></tr></table></div></div>"}}], "quiz": [{"q": {"es": "¿Cuál es el principio más diferenciador de PRINCE2?", "en": "Which is PRINCE2's most distinctive principle?"}, "o": {"es": ["Gestión por excepción", "Justificación continua del negocio", "Enfoque en los productos", "Gestión por fases"], "en": ["Manage by exception", "Continued business justification", "Focus on products", "Manage by stages"]}, "c": 1, "e": {"es": "La 'Justificación continua del negocio' es el principio más distintivo. El Business Case debe validarse en cada fase.", "en": "'Continued business justification' is the most distinctive principle. The Business Case must be validated at each stage."}}, {"q": {"es": "¿Cuántos principios, temas y procesos tiene PRINCE2?", "en": "How many principles, themes, and processes does PRINCE2 have?"}, "o": {"es": ["5, 10, 5", "7, 7, 7", "12, 8, 6", "4, 7, 9"], "en": ["5, 10, 5", "7, 7, 7", "12, 8, 6", "4, 7, 9"]}, "c": 1, "e": {"es": "PRINCE2 se articula sobre la regla del 7: 7 Principios, 7 Temas y 7 Procesos.", "en": "PRINCE2 is built on the rule of 7: 7 Principles, 7 Themes, and 7 Processes."}}, {"q": {"es": "'Gestión por excepción' en PRINCE2 significa:", "en": "'Manage by exception' in PRINCE2 means:"}, "o": {"es": ["El PM gestiona todos los problemas directamente", "Cada nivel jerárquico tiene tolerancias; solo se escala si se superan", "Las excepciones son bienvenidas", "Solo se gestiona lo urgente"], "en": ["PM handles all problems directly", "Each hierarchical level has tolerances; only escalate if exceeded", "Exceptions to processes are welcome", "Only manage urgent matters"]}, "c": 1, "e": {"es": "Establece tolerancias para cada nivel jerárquico. Solo se escala cuando se prevé superar esas tolerancias.", "en": "Establishes tolerances for each level. Escalation only occurs when those tolerances are forecast to be exceeded."}}]}, {"id": "lean", "icon": "⚙️", "title": {"es": "Lean Project Management", "en": "Lean Project Management"}, "sub": {"es": "Maximiza el valor, minimiza el desperdicio", "en": "Maximize value, minimize waste"}, "level": ["intermediate"], "cat": {"es": "Optimización", "en": "Optimization"}, "dur": "25 min", "secs": [{"t": {"es": "Principios Lean y los 7 Desperdicios", "en": "Lean Principles & 7 Wastes"}, "c": {"es": "<div class='cb'><h3>¿Qué es Lean?</h3><p>Filosofía de gestión originada en el <strong>Toyota Production System</strong>. Objetivo: crear más valor con menos recursos eliminando el desperdicio (<em>muda</em>).</p><h4>Los 5 Principios Lean (Womack y Jones)</h4><ul><li><strong>1. Definir el valor</strong> desde la perspectiva del cliente</li><li><strong>2. Mapear la cadena de valor</strong> (Value Stream Mapping)</li><li><strong>3. Crear flujo</strong> sin interrupciones</li><li><strong>4. Establecer el pull</strong>: producir solo lo que el cliente necesita</li><li><strong>5. Buscar la perfección</strong> (Kaizen: mejora continua)</li></ul></div><div class='cb'><h3>Los 7 Desperdicios (Muda) en Proyectos</h3><div class='tw'><table><tr><th>Desperdicio</th><th>En proyectos se manifiesta como…</th></tr><tr><td>1. Sobreproducción</td><td>Funcionalidades que nadie usa</td></tr><tr><td>2. Espera</td><td>Tiempo muerto en aprobaciones</td></tr><tr><td>3. Transporte</td><td>Mover información innecesariamente</td></tr><tr><td>4. Sobreprocesamiento</td><td>Exceso de documentación o reuniones</td></tr><tr><td>5. Inventario (WIP)</td><td>Demasiado trabajo en curso sin terminar</td></tr><tr><td>6. Movimiento</td><td>Buscar información o herramientas</td></tr><tr><td>7. Defectos</td><td>Errores que requieren retrabajo</td></tr></table></div></div>", "en": "<div class='cb'><h3>What is Lean?</h3><p>A management philosophy originating from the <strong>Toyota Production System</strong>. Goal: create more value with fewer resources by eliminating waste (<em>muda</em>).</p><h4>The 5 Lean Principles (Womack & Jones)</h4><ul><li><strong>1. Define value</strong> from the customer's perspective</li><li><strong>2. Map the value stream</strong> (Value Stream Mapping)</li><li><strong>3. Create flow</strong> without interruptions</li><li><strong>4. Establish pull</strong>: produce only what the customer needs</li><li><strong>5. Seek perfection</strong> (Kaizen: continuous improvement)</li></ul></div><div class='cb'><h3>The 7 Wastes (Muda) in Projects</h3><div class='tw'><table><tr><th>Waste</th><th>In projects this looks like…</th></tr><tr><td>1. Overproduction</td><td>Features nobody uses</td></tr><tr><td>2. Waiting</td><td>Idle time in approvals</td></tr><tr><td>3. Transport</td><td>Unnecessarily moving information</td></tr><tr><td>4. Over-processing</td><td>Excessive documentation or meetings</td></tr><tr><td>5. Inventory (WIP)</td><td>Too much unfinished work in progress</td></tr><tr><td>6. Motion</td><td>Searching for information or tools</td></tr><tr><td>7. Defects</td><td>Errors requiring rework</td></tr></table></div></div>"}}], "quiz": [{"q": {"es": "¿Cuál es el objetivo central de Lean?", "en": "What is the central goal of Lean?"}, "o": {"es": ["Acelerar el desarrollo de software", "Crear más valor con menos recursos eliminando desperdicios", "Documentar todos los procesos organizacionales", "Implementar control de calidad estadístico"], "en": ["Accelerate software development", "Create more value with fewer resources by eliminating waste", "Document all organizational processes", "Implement statistical quality control"]}, "c": 1, "e": {"es": "Lean busca maximizar el valor para el cliente minimizando los desperdicios. Toda actividad que no agrega valor es desperdicio.", "en": "Lean seeks to maximize customer value by minimizing waste. Any activity that does not add value from the customer's perspective is waste."}}, {"q": {"es": "¿Cuál de estos NO es uno de los 7 desperdicios de Lean?", "en": "Which of these is NOT one of Lean's 7 wastes?"}, "o": {"es": ["Sobreproducción", "Espera", "Planificación excesiva", "Defectos"], "en": ["Overproduction", "Waiting", "Excessive planning", "Defects"]}, "c": 2, "e": {"es": "Los 7 desperdicios son: Sobreproducción, Espera, Transporte, Sobreprocesamiento, Inventario, Movimiento y Defectos.", "en": "The 7 wastes are: Overproduction, Waiting, Transport, Over-processing, Inventory, Motion, and Defects."}}, {"q": {"es": "¿Qué es el Kaizen en el contexto Lean?", "en": "What is Kaizen in the Lean context?"}, "o": {"es": ["Un tipo de tablero visual", "La filosofía de mejora continua e incremental", "El sistema de producción de Toyota", "Un método de estimación de costos"], "en": ["A type of visual board", "The philosophy of continuous and incremental improvement", "The Toyota production system", "A cost estimation method"]}, "c": 1, "e": {"es": "Kaizen (改善) = mejora continua. Es el quinto principio Lean: pequeñas mejoras constantes en todos los niveles.", "en": "Kaizen (改善) = continuous improvement. It is the fifth Lean principle: small, constant improvements at all organizational levels."}}]}, {"id": "sixsigma", "icon": "σ", "title": {"es": "Six Sigma & DMAIC", "en": "Six Sigma & DMAIC"}, "sub": {"es": "Control de calidad y reducción de variabilidad", "en": "Quality control and variability reduction"}, "level": ["advanced"], "cat": {"es": "Optimización", "en": "Optimization"}, "dur": "30 min", "secs": [{"t": {"es": "Six Sigma y el ciclo DMAIC", "en": "Six Sigma and the DMAIC Cycle"}, "c": {"es": "<div class='cb'><h3>¿Qué es Six Sigma?</h3><p>Metodología <strong>basada en datos y estadística</strong> para mejorar procesos y reducir defectos. Objetivo: <strong>3.4 defectos por millón de oportunidades</strong> (6σ).</p><div class='ib'><p>📊 Niveles: 1σ=690,000 DPMO | 3σ=66,807 DPMO | <strong>6σ=3.4 DPMO</strong></p></div><h4>Cinturones (Belts)</h4><ul><li><strong>Yellow Belt:</strong> Conocimiento básico</li><li><strong>Green Belt:</strong> Lidera proyectos de tiempo parcial</li><li><strong>Black Belt:</strong> Experto de tiempo completo</li><li><strong>Master Black Belt:</strong> Coach de Black Belts</li></ul></div><div class='cb'><h3>El Ciclo DMAIC</h3><div class='tw'><table><tr><th>Fase</th><th>Pregunta clave</th><th>Herramientas</th></tr><tr><td>Define</td><td>¿Cuál es el problema?</td><td>Project Charter, SIPOC, VOC</td></tr><tr><td>Measure</td><td>¿Cuál es el desempeño actual?</td><td>Capacidad, MSA, mapas de proceso</td></tr><tr><td>Analyze</td><td>¿Cuál es la causa raíz?</td><td>Fishbone, 5 Porqués, Regresión</td></tr><tr><td>Improve</td><td>¿Cómo solucionamos el problema?</td><td>DoE, Poka-Yoke, Piloto</td></tr><tr><td>Control</td><td>¿Cómo sostenemos la mejora?</td><td>Control Charts (SPC), Plan de control</td></tr></table></div><div class='ib g'><p>🔗 <strong>Lean Six Sigma:</strong> Lean elimina desperdicios (velocidad) + Six Sigma reduce variabilidad (calidad).</p></div></div>", "en": "<div class='cb'><h3>What is Six Sigma?</h3><p>A <strong>data and statistics-based methodology</strong> to improve processes and reduce defects. Goal: <strong>3.4 defects per million opportunities</strong> (6σ).</p><div class='ib'><p>📊 Levels: 1σ=690,000 DPMO | 3σ=66,807 DPMO | <strong>6σ=3.4 DPMO</strong></p></div><h4>Belts</h4><ul><li><strong>Yellow Belt:</strong> Basic knowledge</li><li><strong>Green Belt:</strong> Leads part-time projects</li><li><strong>Black Belt:</strong> Full-time expert</li><li><strong>Master Black Belt:</strong> Coaches Black Belts</li></ul></div><div class='cb'><h3>The DMAIC Cycle</h3><div class='tw'><table><tr><th>Phase</th><th>Key Question</th><th>Tools</th></tr><tr><td>Define</td><td>What is the problem?</td><td>Project Charter, SIPOC, VOC</td></tr><tr><td>Measure</td><td>What is the current performance?</td><td>Process capability, MSA</td></tr><tr><td>Analyze</td><td>What is the root cause?</td><td>Fishbone, 5 Whys, Regression</td></tr><tr><td>Improve</td><td>How do we solve the problem?</td><td>DoE, Poka-Yoke, Pilot</td></tr><tr><td>Control</td><td>How do we sustain the improvement?</td><td>Control Charts (SPC), Control plan</td></tr></table></div><div class='ib g'><p>🔗 <strong>Lean Six Sigma:</strong> Lean eliminates waste (speed) + Six Sigma reduces variability (quality).</p></div></div>"}}], "quiz": [{"q": {"es": "¿Cuántos DPMO representa el nivel Six Sigma (6σ)?", "en": "How many DPMO does Six Sigma (6σ) represent?"}, "o": {"es": ["66,807", "3.4", "308,537", "6,210"], "en": ["66,807", "3.4", "308,537", "6,210"]}, "c": 1, "e": {"es": "Un proceso Six Sigma produce solo 3.4 defectos por millón de oportunidades. Calidad del 99.9997%.", "en": "A Six Sigma process produces only 3.4 defects per million opportunities. That's 99.9997% quality."}}, {"q": {"es": "¿En qué fase de DMAIC se identifica la causa raíz?", "en": "In which DMAIC phase is the root cause identified?"}, "o": {"es": ["Define", "Measure", "Analyze", "Control"], "en": ["Define", "Measure", "Analyze", "Control"]}, "c": 2, "e": {"es": "La fase Analyze identifica las causas raíz usando Diagrama de Ishikawa, 5 Porqués, análisis de regresión.", "en": "The Analyze phase identifies root causes using Ishikawa diagram, 5 Whys, regression analysis, and hypothesis testing."}}, {"q": {"es": "¿Qué herramienta se usa en la fase Control de DMAIC?", "en": "What tool is used in the Control phase of DMAIC?"}, "o": {"es": ["Diagrama de Ishikawa", "SIPOC", "Gráficas de control estadístico (SPC)", "Design of Experiments (DoE)"], "en": ["Ishikawa diagram", "SIPOC", "Statistical Process Control (SPC) charts", "Design of Experiments (DoE)"]}, "c": 2, "e": {"es": "Las Gráficas de Control (SPC) monitorean el proceso en el tiempo para detectar variaciones especiales.", "en": "Statistical Process Control (SPC) charts monitor the process over time to detect special cause variation before it generates defects."}}]}, {"id": "scrumban", "icon": "🔀", "title": {"es": "Scrumban & Metodologías Híbridas", "en": "Scrumban & Hybrid Methodologies"}, "sub": {"es": "Lo mejor de Scrum y Kanban combinados", "en": "The best of Scrum and Kanban combined"}, "level": ["intermediate"], "cat": {"es": "Híbrido", "en": "Hybrid"}, "dur": "20 min", "secs": [{"t": {"es": "Scrumban y Enfoques Escalados", "en": "Scrumban & Scaled Approaches"}, "c": {"es": "<div class='cb'><h3>¿Qué es Scrumban?</h3><p>Combina la estructura de <strong>Scrum</strong> (retrospectivas, planificación) con la flexibilidad de flujo de <strong>Kanban</strong> (tablero visual, límites WIP). Ideal para equipos mixtos.</p><div class='tw'><table><tr><th>Aspecto</th><th>Scrum</th><th>Kanban</th><th>Scrumban</th></tr><tr><td>Cadencia</td><td>Sprints fijos</td><td>Flujo continuo</td><td>Flexible</td></tr><tr><td>Roles</td><td>PO, SM, Devs</td><td>Ninguno</td><td>Opcionales</td></tr><tr><td>WIP Limits</td><td>No explícitos</td><td>Obligatorios</td><td>Explícitos</td></tr><tr><td>Planificación</td><td>Sprint Planning</td><td>Bajo demanda</td><td>Bajo demanda+umbral</td></tr></table></div></div><div class='cb'><h3>Frameworks Escalados</h3><ul><li><strong>SAFe (Scaled Agile Framework):</strong> Escala Agile para grandes organizaciones.</li><li><strong>LeSS (Large-Scale Scrum):</strong> Extiende Scrum a múltiples equipos con mínima burocracia.</li><li><strong>DAD (Disciplined Agile Delivery):</strong> Marco de decisiones que combina Scrum, Kanban, Lean y más.</li><li><strong>Híbrido Agile-Waterfall:</strong> Planificación cascada con ejecución iterativa.</li></ul></div>", "en": "<div class='cb'><h3>What is Scrumban?</h3><p>Combines <strong>Scrum</strong> structure (retrospectives, planning) with <strong>Kanban</strong> flow flexibility (visual board, WIP limits). Ideal for mixed teams.</p><div class='tw'><table><tr><th>Aspect</th><th>Scrum</th><th>Kanban</th><th>Scrumban</th></tr><tr><td>Cadence</td><td>Fixed sprints</td><td>Continuous flow</td><td>Flexible</td></tr><tr><td>Roles</td><td>PO, SM, Devs</td><td>None required</td><td>Optional</td></tr><tr><td>WIP Limits</td><td>Not explicit</td><td>Mandatory</td><td>Explicit</td></tr><tr><td>Planning</td><td>Sprint Planning</td><td>On demand</td><td>On demand+threshold</td></tr></table></div></div><div class='cb'><h3>Scaled Frameworks</h3><ul><li><strong>SAFe (Scaled Agile Framework):</strong> Scales Agile for large organizations.</li><li><strong>LeSS (Large-Scale Scrum):</strong> Extends Scrum to multiple teams with minimal bureaucracy.</li><li><strong>DAD (Disciplined Agile Delivery):</strong> Decision-making framework combining Scrum, Kanban, Lean, and more.</li><li><strong>Agile-Waterfall Hybrid:</strong> Waterfall planning with iterative execution.</li></ul></div>"}}], "quiz": [{"q": {"es": "¿Qué frameworks combina Scrumban?", "en": "What frameworks does Scrumban combine?"}, "o": {"es": ["Lean y Six Sigma", "Scrum y Kanban", "PRINCE2 y Scrum", "Waterfall y Kanban"], "en": ["Lean and Six Sigma", "Scrum and Kanban", "PRINCE2 and Scrum", "Waterfall and Kanban"]}, "c": 1, "e": {"es": "Scrumban combina Scrum (estructura: retrospectivas, planificación) con Kanban (flujo continuo, límites WIP, tablero visual).", "en": "Scrumban combines Scrum (structure: retrospectives, planning) with Kanban (continuous flow, WIP limits, visual board."}}, {"q": {"es": "¿Cuál es la diferencia principal en planificación entre Scrum y Scrumban?", "en": "What is the main planning difference between Scrum and Scrumban?"}, "o": {"es": ["Scrum no tiene planificación", "Scrum planifica en sprints fijos; Scrumban planifica bajo demanda con umbrales", "Ambos usan el mismo sistema", "Scrumban usa sprints de 6 meses"], "en": ["Scrum has no planning", "Scrum plans in fixed sprints; Scrumban plans on-demand with thresholds", "Both use the same system", "Scrumban uses 6-month sprints"]}, "c": 1, "e": {"es": "Scrum tiene Sprint Planning fijo. Scrumban usa planificación bajo demanda cuando el backlog cae por debajo de un umbral definido.", "en": "Scrum has a fixed Sprint Planning event. Scrumban uses on-demand planning triggered when the backlog falls below a defined threshold."}}]}, {"id": "cpm", "icon": "🗺️", "title": {"es": "Ruta Crítica (CPM)", "en": "Critical Path Method (CPM)"}, "sub": {"es": "Identifica la secuencia de tareas que define la duración del proyecto", "en": "Identifies the task sequence that defines project duration"}, "level": ["advanced"], "cat": {"es": "Técnicas", "en": "Techniques"}, "dur": "30 min", "secs": [{"t": {"es": "Método de la Ruta Crítica", "en": "Critical Path Method"}, "c": {"es": "<div class='cb'><h3>¿Qué es el CPM?</h3><p>Técnica de scheduling que identifica la secuencia más larga de actividades dependientes. Las actividades en la ruta crítica tienen <strong>Float = 0</strong>: un retraso en cualquiera retrasa el proyecto.</p><div class='ib'><p>📅 CPM fue desarrollado en 1957 por DuPont y Remington Rand.</p></div><h4>Conceptos Clave</h4><div class='tw'><table><tr><th>Concepto</th><th>Definición</th></tr><tr><td>ES (Early Start)</td><td>Fecha más temprana de inicio</td></tr><tr><td>EF (Early Finish)</td><td>ES + Duración</td></tr><tr><td>LS (Late Start)</td><td>Fecha más tardía de inicio sin retrasar el proyecto</td></tr><tr><td>LF (Late Finish)</td><td>Fecha más tardía de finalización</td></tr><tr><td>Float / Holgura</td><td>LS - ES = LF - EF. Si = 0, está en la ruta crítica</td></tr></table></div><div class='ib g'><p>✅ Float = LS − ES = LF − EF. Float = 0 → Ruta Crítica.</p></div></div>", "en": "<div class='cb'><h3>What is CPM?</h3><p>A scheduling technique that identifies the longest sequence of dependent activities. Activities on the critical path have <strong>Float = 0</strong>: any delay there delays the entire project.</p><div class='ib'><p>📅 CPM was developed in 1957 by DuPont and Remington Rand.</p></div><h4>Key Concepts</h4><div class='tw'><table><tr><th>Concept</th><th>Definition</th></tr><tr><td>ES (Early Start)</td><td>Earliest possible start date</td></tr><tr><td>EF (Early Finish)</td><td>ES + Duration</td></tr><tr><td>LS (Late Start)</td><td>Latest start without delaying the project</td></tr><tr><td>LF (Late Finish)</td><td>Latest finish without delaying the project</td></tr><tr><td>Float / Slack</td><td>LS - ES = LF - EF. If = 0, it's on the critical path</td></tr></table></div><div class='ib g'><p>✅ Float = LS − ES = LF − EF. Float = 0 → Critical Path.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Qué significa que una actividad tiene Float = 0?", "en": "What does it mean that an activity has Float = 0?"}, "o": {"es": ["La actividad no tiene dependencias", "Está en la Ruta Crítica y un retraso retrasa el proyecto", "Fue completada sin retrasos", "Tiene recursos ilimitados"], "en": ["The activity has no dependencies", "It's on the Critical Path and any delay delays the project", "It was completed without delays", "It has unlimited resources"]}, "c": 1, "e": {"es": "Float = 0 indica Ruta Crítica. La actividad no puede retrasarse ni un día sin que el proyecto completo se retrase.", "en": "Float = 0 indicates Critical Path. The activity cannot be delayed even one day without delaying the entire project."}}, {"q": {"es": "¿Cómo se calcula el Float de una actividad?", "en": "How is the Float of an activity calculated?"}, "o": {"es": ["EF - ES", "LS - ES (o LF - EF)", "ES + Duración", "LF - EF + ES"], "en": ["EF - ES", "LS - ES (or LF - EF)", "ES + Duration", "LF - EF + ES"]}, "c": 1, "e": {"es": "Float = LS - ES = LF - EF. Si Late Start menos Early Start es cero, está en la Ruta Crítica.", "en": "Float = LS - ES = LF - EF. If Late Start minus Early Start is zero, the activity is on the Critical Path."}}]}, {"id": "cpmai", "icon": "🤖", "title": {"es": "CPMAI — Proyectos de IA", "en": "CPMAI — AI Projects"}, "sub": {"es": "Metodología estándar para proyectos de IA/ML", "en": "Standard methodology for AI/ML projects"}, "level": ["advanced"], "cat": {"es": "IA & Datos", "en": "AI & Data"}, "dur": "35 min", "secs": [{"t": {"es": "CPMAI: 6 Fases para Proyectos de IA", "en": "CPMAI: 6 Phases for AI Projects"}, "c": {"es": "<div class='cb'><h3>¿Qué es CPMAI?</h3><p><strong>CPMAI (Cognitive Project Management for AI)</strong> es el estándar emergente del PMI para proyectos de IA. Proceso iterativo de 6 fases que extiende los enfoques tradicionales.</p><div class='tw'><table><tr><th>Fase</th><th>Propósito</th></tr><tr><td>1. Business Understanding</td><td>Entender el problema de negocio, KPIs, viabilidad</td></tr><tr><td>2. Data Understanding</td><td>Inventario de datos, análisis exploratorio (EDA), calidad</td></tr><tr><td>3. Data Preparation</td><td>Limpieza, transformación, feature engineering, etiquetado</td></tr><tr><td>4. Modeling</td><td>Selección de algoritmos, entrenamiento, validación cruzada</td></tr><tr><td>5. Evaluation</td><td>Métricas de negocio, pruebas A/B, análisis de sesgo</td></tr><tr><td>6. Deployment</td><td>MLOps, monitoreo, gobernanza, reentrenamiento</td></tr></table></div><div class='ib y'><p>⚠️ CPMAI es iterativo. Es común volver a fases anteriores: los hallazgos de Modeling pueden requerir más Data Preparation.</p></div></div><div class='cb'><h3>PM Tradicional vs. PM para IA</h3><div class='tw'><table><tr><th>Aspecto</th><th>PM Tradicional</th><th>PM para IA (CPMAI)</th></tr><tr><td>Entregable</td><td>Software / producto</td><td>Modelo + datos + pipeline</td></tr><tr><td>Incertidumbre</td><td>Media</td><td>Muy alta</td></tr><tr><td>Riesgo especial</td><td>Scope creep</td><td>Sesgo algorítmico, data drift</td></tr></table></div></div>", "en": "<div class='cb'><h3>What is CPMAI?</h3><p><strong>CPMAI (Cognitive Project Management for AI)</strong> is the PMI's emerging standard for AI projects. An iterative 6-phase process that extends traditional approaches.</p><div class='tw'><table><tr><th>Phase</th><th>Purpose</th></tr><tr><td>1. Business Understanding</td><td>Understand business problem, KPIs, feasibility</td></tr><tr><td>2. Data Understanding</td><td>Data inventory, exploratory analysis (EDA), quality</td></tr><tr><td>3. Data Preparation</td><td>Cleaning, transformation, feature engineering, labeling</td></tr><tr><td>4. Modeling</td><td>Algorithm selection, training, cross-validation</td></tr><tr><td>5. Evaluation</td><td>Business metrics, A/B testing, bias analysis</td></tr><tr><td>6. Deployment</td><td>MLOps, monitoring, governance, retraining</td></tr></table></div><div class='ib y'><p>⚠️ CPMAI is iterative. It's common to revisit earlier phases: Modeling findings may require more Data Preparation.</p></div></div><div class='cb'><h3>Traditional PM vs. AI PM</h3><div class='tw'><table><tr><th>Aspect</th><th>Traditional PM</th><th>AI PM (CPMAI)</th></tr><tr><td>Deliverable</td><td>Software / product</td><td>Model + data + pipeline</td></tr><tr><td>Uncertainty</td><td>Medium</td><td>Very high</td></tr><tr><td>Special risk</td><td>Scope creep</td><td>Algorithmic bias, data drift</td></tr></table></div></div>"}}], "quiz": [{"q": {"es": "¿Cuál es la primera fase de CPMAI?", "en": "What is the first phase of CPMAI?"}, "o": {"es": ["Data Preparation", "Modeling", "Business Understanding", "Deployment"], "en": ["Data Preparation", "Modeling", "Business Understanding", "Deployment"]}, "c": 2, "e": {"es": "Business Understanding es la primera fase. Sin entender el problema de negocio y los KPIs, no se puede definir qué datos o modelos se necesitan.", "en": "Business Understanding is the first phase. Without understanding the business problem and KPIs, you cannot define what data or models are needed."}}, {"q": {"es": "En proyectos de IA, ¿cuál es un riesgo especial que NO existe en PM tradicional?", "en": "In AI projects, which is a special risk that does NOT exist in traditional PM?"}, "o": {"es": ["Scope creep", "Exceso de reuniones", "Data drift y sesgo algorítmico", "Falta de presupuesto"], "en": ["Scope creep", "Too many meetings", "Data drift and algorithmic bias", "Lack of budget"]}, "c": 2, "e": {"es": "El data drift y el sesgo algorítmico son riesgos únicos de IA. Un modelo puede degradarse sin que nadie lo detecte si no hay monitoreo continuo.", "en": "Data drift and algorithmic bias are unique AI risks. A model can degrade undetected without continuous monitoring."}}]}, {"id": "crispdm", "icon": "🔬", "title": {"es": "CRISP-DM / CRISP-ML(Q)", "en": "CRISP-DM / CRISP-ML(Q)"}, "sub": {"es": "Estándar para Data Mining y Machine Learning", "en": "Standard for Data Mining and Machine Learning"}, "level": ["advanced"], "cat": {"es": "IA & Datos", "en": "AI & Data"}, "dur": "30 min", "secs": [{"t": {"es": "CRISP-DM y su evolución a CRISP-ML(Q)", "en": "CRISP-DM and its evolution to CRISP-ML(Q)"}, "c": {"es": "<div class='cb'><h3>CRISP-DM</h3><p>Estándar para proyectos de minería de datos (1996-2000). Sigue siendo la metodología más utilizada en data science (~50% según encuestas).</p><h4>Las 6 Fases de CRISP-DM</h4><div class='tw'><table><tr><th>Fase</th><th>Objetivo</th></tr><tr><td>1. Business Understanding</td><td>Entender los objetivos del negocio</td></tr><tr><td>2. Data Understanding</td><td>Recolectar y explorar datos iniciales</td></tr><tr><td>3. Data Preparation</td><td>Construir el dataset final (~80% del esfuerzo)</td></tr><tr><td>4. Modeling</td><td>Aplicar técnicas de modelado</td></tr><tr><td>5. Evaluation</td><td>Evaluar respecto a criterios del negocio</td></tr><tr><td>6. Deployment</td><td>Poner en producción</td></tr></table></div></div><div class='cb'><h3>CRISP-ML(Q): La evolución para ML</h3><p>Extiende CRISP-DM añadiendo <strong>Quality Assurance (QA)</strong> en cada fase y monitoreo formal post-despliegue.</p><ul><li><strong>Model Monitoring:</strong> Detección de data drift y model decay</li><li><strong>Model Retraining:</strong> Proceso formal para decidir cuándo reentrenar</li></ul><div class='ib g'><p>🔑 Data Drift = cambia la distribución de los inputs. Concept Drift = cambia la relación inputs-outputs. Ambos degradan los modelos.</p></div></div>", "en": "<div class='cb'><h3>CRISP-DM</h3><p>Standard for data mining projects (1996-2000). Still the most widely used methodology in data science (~50% according to surveys).</p><h4>The 6 CRISP-DM Phases</h4><div class='tw'><table><tr><th>Phase</th><th>Objective</th></tr><tr><td>1. Business Understanding</td><td>Understand business objectives</td></tr><tr><td>2. Data Understanding</td><td>Collect and explore initial data</td></tr><tr><td>3. Data Preparation</td><td>Build the final dataset (~80% of effort)</td></tr><tr><td>4. Modeling</td><td>Apply modeling techniques</td></tr><tr><td>5. Evaluation</td><td>Evaluate against business criteria</td></tr><tr><td>6. Deployment</td><td>Deploy to production</td></tr></table></div></div><div class='cb'><h3>CRISP-ML(Q): ML Evolution</h3><p>Extends CRISP-DM by adding <strong>Quality Assurance (QA)</strong> at each phase and formal post-deployment monitoring.</p><ul><li><strong>Model Monitoring:</strong> Detection of data drift and model decay</li><li><strong>Model Retraining:</strong> Formal process to decide when to retrain</li></ul><div class='ib g'><p>🔑 Data Drift = input distribution changes. Concept Drift = input-output relationship changes. Both degrade models.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Qué fase de CRISP-DM consume típicamente el 80% del esfuerzo?", "en": "Which CRISP-DM phase typically consumes 80% of the effort?"}, "o": {"es": ["Business Understanding", "Modeling", "Data Preparation", "Deployment"], "en": ["Business Understanding", "Modeling", "Data Preparation", "Deployment"]}, "c": 2, "e": {"es": "Data Preparation consume ~80% del esfuerzo. Limpieza, transformación e integración de datos son procesos extensos y críticos.", "en": "Data Preparation consumes ~80% of effort. Data cleaning, transformation, and integration are extensive and critical processes."}}, {"q": {"es": "¿Cuál es la principal adición de CRISP-ML(Q) respecto a CRISP-DM?", "en": "What is the main addition of CRISP-ML(Q) over CRISP-DM?"}, "o": {"es": ["Más fases de modelado", "QA en cada fase y monitoreo formal post-despliegue", "Eliminación del deployment", "Enfoque exclusivo en Python"], "en": ["More modeling phases", "QA at each phase and formal post-deployment monitoring", "Elimination of deployment", "Exclusive Python focus"]}, "c": 1, "e": {"es": "CRISP-ML(Q) añade QA explícita en cada fase y un proceso formal de monitoreo y reentrenamiento post-despliegue.", "en": "CRISP-ML(Q) adds explicit QA at each phase and a formal process for post-deployment monitoring and retraining."}}]}, {"id": "datapm", "icon": "💾", "title": {"es": "Gestión Centrada en Datos", "en": "Data-Centric Project Management"}, "sub": {"es": "El dato como eje del ciclo de vida del proyecto", "en": "Data as the core of the project lifecycle"}, "level": ["advanced"], "cat": {"es": "IA & Datos", "en": "AI & Data"}, "dur": "25 min", "secs": [{"t": {"es": "Data-Centric Project Management", "en": "Data-Centric Project Management"}, "c": {"es": "<div class='cb'><h3>¿Qué es la Gestión Centrada en Datos?</h3><p>El ciclo de vida del proyecto gira en torno a la <strong>gobernanza, calidad y ciclo de vida del dato</strong>. Los datos determinan el éxito del algoritmo.</p><div class='ib'><p>💡 <strong>Andrew Ng:</strong> Mejora los datos para el mismo modelo, no el modelo para los mismos
