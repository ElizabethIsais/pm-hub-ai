 datos.</p></div><h4>Model-Centric vs. Data-Centric</h4><div class='tw'><table><tr><th>Aspecto</th><th>Model-Centric</th><th>Data-Centric</th></tr><tr><td>Foco</td><td>Ajustar el algoritmo</td><td>Mejorar la calidad de datos</td></tr><tr><td>Datos</td><td>Fijos durante el desarrollo</td><td>Iterativamente refinados</td></tr><tr><td>Éxito</td><td>Accuracy en test set</td><td>Rendimiento en producción real</td></tr></table></div></div><div class='cb'><h3>Pilares de la Gobernanza de Datos</h3><ul><li><strong>Data Inventory:</strong> ¿Qué datos existen, dónde están, quién los posee?</li><li><strong>Data Quality:</strong> Completitud, consistencia, exactitud y actualidad.</li><li><strong>Data Lineage:</strong> Rastrear el origen y transformaciones de cada dato.</li><li><strong>Data Labeling:</strong> Crítico en ML supervisado. Requiere expertos de dominio.</li><li><strong>Privacy & Compliance:</strong> GDPR, LGPD, HIPAA según el dominio.</li></ul></div>", "en": "<div class='cb'><h3>What is Data-Centric PM?</h3><p>The project lifecycle revolves around <strong>data governance, quality, and lifecycle</strong>. Data quality determines algorithm success.</p><div class='ib'><p>💡 <strong>Andrew Ng:</strong> Improve the data for the same model, not the model for the same data.</p></div><h4>Model-Centric vs. Data-Centric</h4><div class='tw'><table><tr><th>Aspect</th><th>Model-Centric</th><th>Data-Centric</th></tr><tr><td>Focus</td><td>Tune the algorithm</td><td>Improve data quality</td></tr><tr><td>Data</td><td>Fixed during development</td><td>Iteratively refined</td></tr><tr><td>Success</td><td>Accuracy on test set</td><td>Real production performance</td></tr></table></div></div><div class='cb'><h3>Data Governance Pillars</h3><ul><li><strong>Data Inventory:</strong> What data exists, where is it, who owns it?</li><li><strong>Data Quality:</strong> Completeness, consistency, accuracy and timeliness.</li><li><strong>Data Lineage:</strong> Track the origin and transformations of each data point.</li><li><strong>Data Labeling:</strong> Critical for supervised ML. Requires domain experts.</li><li><strong>Privacy & Compliance:</strong> GDPR, LGPD, HIPAA depending on domain.</li></ul></div>"}}], "quiz": [{"q": {"es": "¿Cuál es la idea central del enfoque Data-Centric AI?", "en": "What is the central idea of the Data-Centric AI approach?"}, "o": {"es": ["Usar más datos sin importar la calidad", "Mejorar los datos para el mismo modelo en lugar de mejorar el modelo", "Construir modelos más complejos", "Reemplazar el equipo de datos con AutoML"], "en": ["Use more data regardless of quality", "Improve the data for the same model rather than improving the model", "Build more complex models", "Replace the data team with AutoML"]}, "c": 1, "e": {"es": "Andrew Ng propone mejorar la calidad de los datos más que iterar sobre la arquitectura del modelo. Los datos definen el techo de cualquier modelo.", "en": "Andrew Ng proposes improving data quality over iterating on the model architecture. Data quality defines the ceiling of what any model can achieve."}}]}, {"id": "stakeholders", "icon": "🤝", "title": {"es": "Gestión de Stakeholders", "en": "Stakeholder Management"}, "sub": {"es": "Identifica, analiza y gestiona a todos los interesados del proyecto", "en": "Identify, analyze and manage all project stakeholders"}, "level": ["intermediate"], "cat": {"es": "Fundamentos", "en": "Fundamentals"}, "dur": "30 min", "secs": [{"t": {"es": "Identificación, Análisis y Estrategias", "en": "Identification, Analysis & Strategies"}, "c": {"es": "<div class='cb'><h3>¿Qué es un Stakeholder?</h3><p>Una persona, grupo u organización que puede <strong>afectar o ser afectada</strong> por el proyecto. La gestión de stakeholders es considerada la habilidad más importante del PM senior.</p><h4>Tipos de Stakeholders</h4><ul><li><strong>Internos:</strong> Sponsor, equipo del proyecto, PMO, otros departamentos</li><li><strong>Externos:</strong> Cliente, usuarios finales, reguladores, proveedores, comunidad</li></ul></div><div class='cb'><h3>Herramientas de Análisis</h3><h4>Matriz Poder / Interés</h4><div class='tw'><table><tr><th>Cuadrante</th><th>Estrategia</th></tr><tr><td>Alto Poder + Alto Interés</td><td>Gestionar de cerca (Manage closely)</td></tr><tr><td>Alto Poder + Bajo Interés</td><td>Mantener satisfecho (Keep satisfied)</td></tr><tr><td>Bajo Poder + Alto Interés</td><td>Mantener informado (Keep informed)</td></tr><tr><td>Bajo Poder + Bajo Interés</td><td>Monitorear (Monitor)</td></tr></table></div><h4>Niveles de Involucramiento</h4><p>Desconocedor → Resistente → Neutral → Partidario → Líder</p><div class='ib g'><p>✅ <strong>Registro de Stakeholders:</strong> Documenta nombre, rol, expectativas, influencia y estrategia de comunicación.</p></div></div>", "en": "<div class='cb'><h3>What is a Stakeholder?</h3><p>A person, group, or organization that can <strong>affect or be affected</strong> by the project. Stakeholder management is considered the most important skill of a senior PM.</p><h4>Types of Stakeholders</h4><ul><li><strong>Internal:</strong> Sponsor, project team, PMO, other departments</li><li><strong>External:</strong> Client, end users, regulators, vendors, community</li></ul></div><div class='cb'><h3>Analysis Tools</h3><h4>Power / Interest Grid</h4><div class='tw'><table><tr><th>Quadrant</th><th>Strategy</th></tr><tr><td>High Power + High Interest</td><td>Manage closely</td></tr><tr><td>High Power + Low Interest</td><td>Keep satisfied</td></tr><tr><td>Low Power + High Interest</td><td>Keep informed</td></tr><tr><td>Low Power + Low Interest</td><td>Monitor</td></tr></table></div><h4>Engagement Levels</h4><p>Unaware → Resistant → Neutral → Supportive → Leading</p><div class='ib g'><p>✅ <strong>Stakeholder Register:</strong> Documents name, role, expectations, influence, and communication strategy.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Qué estrategia se usa para un stakeholder con Alto Poder y Bajo Interés?", "en": "What strategy is used for a stakeholder with High Power and Low Interest?"}, "o": {"es": ["Gestionar de cerca", "Mantener satisfecho", "Mantener informado", "Monitorear"], "en": ["Manage closely", "Keep satisfied", "Keep informed", "Monitor"]}, "c": 1, "e": {"es": "Un stakeholder con Alto Poder pero Bajo Interés debe 'mantenerse satisfecho'. No le interesa el día a día pero su apoyo es crítico.", "en": "A stakeholder with High Power but Low Interest should be 'kept satisfied'. They don't want day-to-day details but their support is critical."}}, {"q": {"es": "¿Cuál es el nivel de involucramiento más alto de un stakeholder?", "en": "What is the highest stakeholder engagement level?"}, "o": {"es": ["Partidario", "Neutral", "Líder", "Desconocedor"], "en": ["Supportive", "Neutral", "Leading", "Unaware"]}, "c": 2, "e": {"es": "'Líder' es el nivel más alto: el stakeholder no solo apoya activamente sino que promueve el éxito del proyecto entre otros.", "en": "'Leading' is the highest level: the stakeholder not only actively supports but also promotes the project's success among others."}}, {"q": {"es": "¿Qué herramienta se usa para documentar a todos los interesados del proyecto?", "en": "What tool is used to document all project stakeholders?"}, "o": {"es": ["Diagrama de Gantt", "Registro de Stakeholders", "Plan de comunicaciones", "RACI matrix"], "en": ["Gantt Chart", "Stakeholder Register", "Communication Plan", "RACI Matrix"]}, "c": 1, "e": {"es": "El Registro de Stakeholders documenta a cada interesado con su nombre, rol, nivel de influencia, expectativas y estrategia de gestión.", "en": "The Stakeholder Register documents each stakeholder with their name, role, influence level, expectations, and management strategy."}}]}, {"id": "estimation", "icon": "📏", "title": {"es": "Técnicas de Estimación", "en": "Estimation Techniques"}, "sub": {"es": "Story points, Planning Poker, PERT, análogo y paramétrico", "en": "Story points, Planning Poker, PERT, analogous and parametric"}, "level": ["intermediate"], "cat": {"es": "Técnicas", "en": "Techniques"}, "dur": "30 min", "secs": [{"t": {"es": "Estimación Ágil y Tradicional", "en": "Agile and Traditional Estimation"}, "c": {"es": "<div class='cb'><h3>Estimación Ágil</h3><h4>Story Points</h4><p>Unidades relativas de esfuerzo que miden la complejidad, incertidumbre y tamaño de una historia de usuario. Usan la escala de Fibonacci: 1, 2, 3, 5, 8, 13, 21...</p><h4>Planning Poker</h4><p>Técnica colaborativa donde el equipo estima simultáneamente con cartas. Las diferencias disparan la discusión para llegar a consenso.</p><h4>T-Shirt Sizing</h4><p>Estimación rápida usando tallas: XS, S, M, L, XL, XXL. Ideal para roadmaps y estimaciones tempranas.</p><div class='ib g'><p>✅ <strong>Velocity:</strong> La cantidad de story points que el equipo completa por Sprint en promedio. Sirve para proyectar el trabajo futuro.</p></div></div><div class='cb'><h3>Estimación Tradicional</h3><h4>Estimación Análoga</h4><p>Usa datos de proyectos similares anteriores. Rápida pero menos precisa. Se usa en las fases tempranas del proyecto.</p><h4>Estimación Paramétrica</h4><p>Usa relaciones estadísticas entre variables históricas para calcular la estimación. Más precisa que la análoga.</p><h4>Estimación de Tres Puntos (PERT)</h4><p><strong>E = (O + 4M + P) / 6</strong></p><ul><li><strong>O</strong> = Optimista (mejor caso)</li><li><strong>M</strong> = Más probable</li><li><strong>P</strong> = Pesimista (peor caso)</li></ul><div class='ib'><p>📊 PERT también calcula la desviación estándar: σ = (P - O) / 6, que mide la incertidumbre de la estimación.</p></div></div>", "en": "<div class='cb'><h3>Agile Estimation</h3><h4>Story Points</h4><p>Relative effort units measuring complexity, uncertainty, and size of a user story. Use Fibonacci scale: 1, 2, 3, 5, 8, 13, 21...</p><h4>Planning Poker</h4><p>Collaborative technique where the team estimates simultaneously with cards. Differences trigger discussion to reach consensus.</p><h4>T-Shirt Sizing</h4><p>Quick estimation using sizes: XS, S, M, L, XL, XXL. Ideal for roadmaps and early estimates.</p><div class='ib g'><p>✅ <strong>Velocity:</strong> The average story points the team completes per Sprint. Used to project future work.</p></div></div><div class='cb'><h3>Traditional Estimation</h3><h4>Analogous Estimation</h4><p>Uses data from similar past projects. Fast but less precise. Used in early project phases.</p><h4>Parametric Estimation</h4><p>Uses statistical relationships between historical variables to calculate estimates. More precise than analogous.</p><h4>Three-Point Estimation (PERT)</h4><p><strong>E = (O + 4M + P) / 6</strong></p><ul><li><strong>O</strong> = Optimistic (best case)</li><li><strong>M</strong> = Most likely</li><li><strong>P</strong> = Pessimistic (worst case)</li></ul><div class='ib'><p>📊 PERT also calculates standard deviation: σ = (P - O) / 6, measuring the estimate's uncertainty.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Qué escala se usa típicamente en Story Points?", "en": "Which scale is typically used for Story Points?"}, "o": {"es": ["1-10", "Horas de trabajo", "Fibonacci (1,2,3,5,8,13,21)", "T-shirt sizes"], "en": ["1-10", "Work hours", "Fibonacci (1,2,3,5,8,13,21)", "T-shirt sizes"]}, "c": 2, "e": {"es": "Los Story Points usan la secuencia de Fibonacci porque los números se separan más a medida que crecen, reflejando la mayor incertidumbre de ítems grandes.", "en": "Story Points use the Fibonacci sequence because numbers spread further apart as they grow, reflecting greater uncertainty in larger items."}}, {"q": {"es": "¿Cuál es la fórmula de la estimación PERT de tres puntos?", "en": "What is the PERT three-point estimation formula?"}, "o": {"es": ["(O + M + P) / 3", "(O + 4M + P) / 6", "(O + M + P) / 6", "(O + 2M + P) / 4"], "en": ["(O + M + P) / 3", "(O + 4M + P) / 6", "(O + M + P) / 6", "(O + 2M + P) / 4"]}, "c": 1, "e": {"es": "E = (O + 4M + P) / 6. La estimación más probable tiene un peso 4 veces mayor que las estimaciones optimista y pesimista.", "en": "E = (O + 4M + P) / 6. The most likely estimate is weighted 4 times more than the optimistic and pessimistic estimates."}}, {"q": {"es": "¿Qué es la Velocity en Scrum?", "en": "What is Velocity in Scrum?"}, "o": {"es": ["La velocidad de cada desarrollador individual", "La cantidad de story points completados por Sprint en promedio", "El número de sprints completados", "La velocidad de despliegue del software"], "en": ["The speed of each individual developer", "The average story points completed per Sprint", "The number of completed sprints", "The speed of software deployment"]}, "c": 1, "e": {"es": "La Velocity es la cantidad promedio de story points que el equipo completa por Sprint. Se usa para proyectar cuánto trabajo se puede hacer en el futuro.", "en": "Velocity is the average amount of story points the team completes per Sprint. It is used to forecast how much work can be done in future sprints."}}]}, {"id": "pmtools", "icon": "🔧", "title": {"es": "Herramientas PM", "en": "PM Tools"}, "sub": {"es": "Jira, Monday.com, Asana, MS Project y más", "en": "Jira, Monday.com, Asana, MS Project and more"}, "level": ["beginner", "intermediate"], "cat": {"es": "Herramientas", "en": "Tools"}, "dur": "25 min", "secs": [{"t": {"es": "Las herramientas más demandadas del mercado", "en": "The most in-demand tools in the market"}, "c": {"es": "<div class='cb'><h3>Panorama de Herramientas PM</h3><div class='tw'><table><tr><th>Herramienta</th><th>Mejor para</th><th>Metodología</th></tr><tr><td>🔵 <strong>Jira</strong></td><td>Equipos de software, DevOps</td><td>Scrum, Kanban, SAFe</td></tr><tr><td>🟡 <strong>Monday.com</strong></td><td>Equipos multifuncionales</td><td>Flexible (cualquier metodología)</td></tr><tr><td>🟣 <strong>Asana</strong></td><td>Proyectos de marketing, operaciones</td><td>Waterfall, Ágil, Híbrido</td></tr><tr><td>🟢 <strong>MS Project</strong></td><td>Proyectos complejos, CPM, EVM</td><td>Waterfall, CPM</td></tr><tr><td>🔷 <strong>Azure DevOps</strong></td><td>Equipos Microsoft, DevOps</td><td>Scrum, Kanban, SAFe</td></tr><tr><td>⬜ <strong>Trello</strong></td><td>Proyectos pequeños, personal</td><td>Kanban</td></tr></table></div></div><div class='cb'><h3>¿Cómo elegir la herramienta correcta?</h3><ul><li><strong>Tamaño del equipo:</strong> Trello (pequeño) → Jira (grande)</li><li><strong>Metodología:</strong> Jira/Azure DevOps (ágil) → MS Project (cascada/CPM)</li><li><strong>Sector:</strong> Tech → Jira/Azure; Marketing/Ops → Monday/Asana</li><li><strong>Presupuesto:</strong> Trello/Asana (gratuito limitado) → MS Project (licencia)</li></ul><h4>Funciones clave a buscar</h4><ul><li>Tableros Kanban y backlog de sprints</li><li>Diagramas de Gantt y timeline</li><li>Gestión de dependencias entre tareas</li><li>Reporting y dashboards de progreso</li><li>Integraciones (Slack, GitHub, Confluence)</li></ul><div class='ib'><p>💼 <strong>Jira</strong> es la herramienta más demandada en job postings para PMs de tecnología. <strong>Monday.com</strong> y <strong>Asana</strong> son las más populares en empresas no-tech.</p></div></div>", "en": "<div class='cb'><h3>PM Tools Landscape</h3><div class='tw'><table><tr><th>Tool</th><th>Best for</th><th>Methodology</th></tr><tr><td>🔵 <strong>Jira</strong></td><td>Software teams, DevOps</td><td>Scrum, Kanban, SAFe</td></tr><tr><td>🟡 <strong>Monday.com</strong></td><td>Cross-functional teams</td><td>Flexible (any methodology)</td></tr><tr><td>🟣 <strong>Asana</strong></td><td>Marketing, operations projects</td><td>Waterfall, Agile, Hybrid</td></tr><tr><td>🟢 <strong>MS Project</strong></td><td>Complex projects, CPM, EVM</td><td>Waterfall, CPM</td></tr><tr><td>🔷 <strong>Azure DevOps</strong></td><td>Microsoft teams, DevOps</td><td>Scrum, Kanban, SAFe</td></tr><tr><td>⬜ <strong>Trello</strong></td><td>Small projects, personal use</td><td>Kanban</td></tr></table></div></div><div class='cb'><h3>How to Choose the Right Tool?</h3><ul><li><strong>Team size:</strong> Trello (small) → Jira (large)</li><li><strong>Methodology:</strong> Jira/Azure DevOps (agile) → MS Project (waterfall/CPM)</li><li><strong>Industry:</strong> Tech → Jira/Azure; Marketing/Ops → Monday/Asana</li><li><strong>Budget:</strong> Trello/Asana (free tier) → MS Project (license)</li></ul><h4>Key Features to Look For</h4><ul><li>Kanban boards and sprint backlog</li><li>Gantt charts and timeline views</li><li>Task dependency management</li><li>Progress reporting and dashboards</li><li>Integrations (Slack, GitHub, Confluence)</li></ul><div class='ib'><p>💼 <strong>Jira</strong> is the most demanded tool in tech PM job postings. <strong>Monday.com</strong> and <strong>Asana</strong> are most popular in non-tech companies.</p></div></div>"}}], "quiz": [{"q": {"es": "¿Qué herramienta PM es más demandada en job postings para PMs de tecnología?", "en": "Which PM tool is most demanded in tech PM job postings?"}, "o": {"es": ["Trello", "Monday.com", "Jira", "MS Project"], "en": ["Trello", "Monday.com", "Jira", "MS Project"]}, "c": 2, "e": {"es": "Jira de Atlassian es la herramienta más solicitada en ofertas de trabajo para PMs de tecnología, especialmente en equipos de software y DevOps.", "en": "Jira by Atlassian is the most requested tool in tech PM job postings, especially for software and DevOps teams."}}, {"q": {"es": "¿Qué tipo de proyecto es más adecuado para MS Project?", "en": "For which type of project is MS Project most suitable?"}, "o": {"es": ["Startups con metodología ágil", "Proyectos complejos con CPM, EVM y planificación detallada", "Equipos pequeños de marketing", "Proyectos personales de gestión de tareas"], "en": ["Startups with agile methodology", "Complex projects with CPM, EVM and detailed planning", "Small marketing teams", "Personal task management projects"]}, "c": 1, "e": {"es": "MS Project es ideal para proyectos complejos que requieren CPM (Ruta Crítica), EVM (Earned Value) y planificación detallada de recursos.", "en": "MS Project is ideal for complex projects requiring CPM (Critical Path), EVM (Earned Value), and detailed resource planning."}}, {"q": {"es": "Un equipo de marketing quiere una herramienta flexible, visual y fácil de usar. ¿Cuál recomendarías?", "en": "A marketing team wants a flexible, visual and easy-to-use tool. Which would you recommend?"}, "o": {"es": ["Azure DevOps", "MS Project", "Monday.com o Asana", "JIRA con SAFe"], "en": ["Azure DevOps", "MS Project", "Monday.com or Asana", "JIRA with SAFe"]}, "c": 2, "e": {"es": "Monday.com y Asana son las opciones ideales para equipos de marketing y operaciones: interfaces intuitivas, flexibles y con excelentes plantillas.", "en": "Monday.com and Asana are ideal for marketing and operations teams: intuitive, flexible interfaces with excellent templates."}}]}, {"id": "budget", "icon": "💰", "title": {"es": "Gestión de Presupuesto y Recursos", "en": "Budget & Resource Management"}, "sub": {"es": "Planificación financiera, recursos y Earned Value Management", "en": "Financial planning, resources and Earned Value Management"}, "level": ["intermediate", "advanced"], "cat": {"es": "Fundamentos", "en": "Fundamentals"}, "dur": "35 min", "secs": [{"t": {"es": "Presupuesto, Recursos y Earned Value", "en": "Budget, Resources & Earned Value"}, "c": {"es": "<div class='cb'><h3>Gestión de Recursos</h3><h4>Tipos de Recursos</h4><ul><li><strong>Humanos:</strong> Equipo del proyecto, habilidades requeridas, disponibilidad</li><li><strong>Físicos:</strong> Equipos, materiales, instalaciones</li><li><strong>Costo:</strong> Presupuesto asignado a cada recurso</li></ul><h4>Herramientas de Planificación</h4><ul><li><strong>RACI Matrix:</strong> Responsible, Accountable, Consulted, Informed. Clarifica roles.</li><li><strong>Resource Leveling:</strong> Ajusta el cronograma para evitar la sobreasignación de recursos.</li><li><strong>Histograma de Recursos:</strong> Visualiza la demanda de recursos en el tiempo.</li></ul></div><div class='cb'><h3>Earned Value Management (EVM)</h3><p>Técnica de control que integra alcance, cronograma y costo para medir el desempeño real del proyecto.</p><div class='tw'><table><tr><th>Indicador</th><th>Fórmula</th><th>Interpretación</th></tr><tr><td>EV (Earned Value)</td><td>% completado × BAC</td><td>Valor del trabajo realizado</td></tr><tr><td>PV (Planned Value)</td><td>% planificado × BAC</td><td>Valor planificado a la fecha</td></tr><tr><td>AC (Actual Cost)</td><td>Costo real incurrido</td><td>Lo que realmente costó</td></tr><tr><td>SPI (Schedule)</td><td>EV / PV</td><td>>1 adelantado, <1 atrasado</td></tr><tr><td>CPI (Cost)</td><td>EV / AC</td><td>>1 bajo presupuesto, <1 sobre</td></tr><tr><td>EAC (Al completar)</td><td>BAC / CPI</td><td>Costo estimado al finalizar</td></tr></table></div><div class='ib g'><p>✅ <strong>BAC = Budget At Completion</strong>: Presupuesto total aprobado del proyecto.</p></div></div>", "en": "<div class='cb'><h3>Resource Management</h3><h4>Types of Resources</h4><ul><li><strong>Human:</strong> Project team, required skills, availability</li><li><strong>Physical:</strong> Equipment, materials, facilities</li><li><strong>Cost:</strong> Budget allocated to each resource</li></ul><h4>Planning Tools</h4><ul><li><strong>RACI Matrix:</strong> Responsible, Accountable, Consulted, Informed. Clarifies roles.</li><li><strong>Resource Leveling:</strong> Adjusts the schedule to prevent resource over-allocation.</li><li><strong>Resource Histogram:</strong> Visualizes resource demand over time.</li></ul></div><div class='cb'><h3>Earned Value Management (EVM)</h3><p>A control technique integrating scope, schedule, and cost to measure real project performance.</p><div class='tw'><table><tr><th>Indicator</th><th>Formula</th><th>Interpretation</th></tr><tr><td>EV (Earned Value)</td><td>% complete × BAC</td><td>Value of work performed</td></tr><tr><td>PV (Planned Value)</td><td>% planned × BAC</td><td>Planned value to date</td></tr><tr><td>AC (Actual Cost)</td><td>Actual cost incurred</td><td>What it actually cost</td></tr><tr><td>SPI (Schedule)</td><td>EV / PV</td><td>>1 ahead, <1 behind</td></tr><tr><td>CPI (Cost)</td><td>EV / AC</td><td>>1 under budget, <1 over</td></tr><tr><td>EAC (At completion)</td><td>BAC / CPI</td><td>Estimated cost at completion</td></tr></table></div><div class='ib g'><p>✅ <strong>BAC = Budget At Completion</strong>: Total approved project budget.</p></div></div>"}}], "quiz": [{"q": {"es": "Si un proyecto tiene CPI = 0.8, ¿qué significa?", "en": "If a project has CPI = 0.8, what does it mean?"}, "o": {"es": ["El proyecto está adelantado en cronograma", "El proyecto está sobre presupuesto", "El proyecto está bajo presupuesto", "El proyecto está al día en cronograma"], "en": ["The project is ahead of schedule", "The project is over budget", "The project is under budget", "The project is on schedule"]}, "c": 1, "e": {"es": "CPI = EV / AC. Si CPI < 1, el proyecto está sobre presupuesto. Por cada $1 gastado, solo se obtiene $0.80 de valor.", "en": "CPI = EV / AC. If CPI < 1, the project is over budget. For every $1 spent, only $0.80 of value is being received."}}, {"q": {"es": "¿Qué herramienta clarifica quién es Responsible, Accountable, Consulted e Informed en cada tarea?", "en": "Which tool clarifies who is Responsible, Accountable, Consulted and Informed for each task?"}, "o": {"es": ["Diagrama de Gantt", "RACI Matrix", "Work Breakdown Structure (WBS)", "Registro de Riesgos"], "en": ["Gantt Chart", "RACI Matrix", "Work Breakdown Structure (WBS)", "Risk Register"]}, "c": 1, "e": {"es": "La RACI Matrix define para cada tarea: Responsible (ejecuta), Accountable (rinde cuentas), Consulted (opinión necesaria) e Informed (mantener al tanto).", "en": "The RACI Matrix defines for each task: Responsible (executes), Accountable (answerable), Consulted (whose input is needed), and Informed (kept up to date."}}, {"q": {"es": "¿Qué indica un SPI = 1.2 en Earned Value Management?", "en": "What does SPI = 1.2 indicate in Earned Value Management?"}, "o": {"es": ["El proyecto está atrasado en cronograma", "El proyecto está sobre presupuesto", "El proyecto está adelantado en cronograma", "El proyecto está exactamente en el plan"], "en": ["The project is behind schedule", "The project is over budget", "The project is ahead of schedule", "The project is exactly on plan"]}, "c": 2, "e": {"es": "SPI = EV / PV. Si SPI > 1 el proyecto está adelantado. SPI = 1.2 significa que por cada unidad de tiempo planificada se completó 1.2 unidades de valor.", "en": "SPI = EV / PV. If SPI > 1, the project is ahead of schedule. SPI = 1.2 means for every unit of planned time, 1.2 units of value were completed."}}]}];
const IVW_Q=[{"cat": "beh", "diff": "mid", "q": {"es": "Cuéntame sobre un proyecto exitoso que hayas liderado. ¿Cuál fue tu rol y qué lo hizo exitoso?", "en": "Tell me about a successful project you led. What was your role and what made it successful?"}, "a": {"es": "Usa el método STAR. Describe el contexto (proyecto, equipo, restricciones), tu rol específico como PM, las acciones clave que tomaste (planificación, gestión de stakeholders, mitigación de riesgos) y los resultados medibles (entregado a tiempo, bajo presupuesto, KPIs logrados).", "en": "Use the STAR method. Describe the context (project, team, constraints), your specific PM role, the key actions you took (planning, stakeholder management, risk mitigation), and measurable results (delivered on time, under budget, KPIs achieved)."}}, {"cat": "beh", "diff": "mid", "q": {"es": "Describe una situación en la que tuviste que gestionar un conflicto dentro de tu equipo. ¿Cómo lo resolviste?", "en": "Describe a situation where you had to manage a conflict within your team. How did you resolve it?"}, "a": {"es": "Explica el tipo de conflicto (interpersonal, técnico, de prioridades). Detalla cómo facilitaste la conversación, escuchaste activamente a ambas partes, identificaste los intereses reales detrás de las posiciones, y llegaste a una resolución que el equipo aceptó. Menciona el resultado y las lecciones aprendidas.", "en": "Explain the type of conflict (interpersonal, technical, priorities). Detail how you facilitated the conversation, actively listened to both sides, identified real interests behind positions, and reached a resolution the team accepted. Mention the outcome and lessons learned."}}, {"cat": "beh", "diff": "mid", "q": {"es": "¿Cómo has manejado proyectos que estaban atrasados o sobre presupuesto? Dame un ejemplo concreto.", "en": "How have you handled projects that were behind schedule or over budget? Give me a concrete example."}, "a": {"es": "Describe cómo detectaste el problema temprano (EVM, sprint reviews, alertas), el análisis de causa raíz que realizaste, las acciones correctivas implementadas (replanificación, ajuste de alcance, fast-tracking, crashing, renegociación de recursos) y cómo comunicaste la situación al sponsor y stakeholders.", "en": "Describe how you detected the problem early (EVM, sprint reviews, alerts), the root cause analysis you performed, corrective actions implemented (replanning, scope adjustment, fast-tracking, crashing, resource renegotiation), and how you communicated the situation to the sponsor and stakeholders."}}, {"cat": "beh", "diff": "adv", "q": {"es": "Cuéntame sobre una vez en que fallaste en un proyecto. ¿Qué aprendiste?", "en": "Tell me about a time you failed on a project. What did you learn?"}, "a": {"es": "Sé honesto/a y específico/a. Los entrevistadores valoran la autoconsciencia y el crecimiento. Describe qué salió mal, tu rol en el fracaso, qué acciones tomaste para mitigar el daño, y —lo más importante— qué cambios concretos implementaste en proyectos posteriores como resultado de la lección aprendida.", "en": "Be honest and specific. Interviewers value self-awareness and growth. Describe what went wrong, your role in the failure, what actions you took to mitigate damage, and —most importantly— what concrete changes you implemented in subsequent projects as a result of the lesson learned."}}, {"cat": "beh", "diff": "basic", "q": {"es": "¿Cómo estableces prioridades cuando tienes múltiples proyectos o tareas al mismo tiempo?", "en": "How do you set priorities when you have multiple projects or tasks at the same time?"}, "a": {"es": "Menciona frameworks de priorización: Matriz Eisenhower (urgente/importante), MoSCoW (Must/Should/Could/Won't), modelo RICE (Reach, Impact, Confidence, Effort), o simplemente alinear con los objetivos estratégicos del negocio. Describe cómo comunicas las prioridades al equipo y stakeholders para mantener alineación.", "en": "Mention prioritization frameworks: Eisenhower Matrix (urgent/important), MoSCoW (Must/Should/Could/Won't), RICE model (Reach, Impact, Confidence, Effort), or simply aligning with business strategic objectives. Describe how you communicate priorities to the team and stakeholders."}}, {"cat": "beh", "diff": "mid", "q": {"es": "¿Cómo motivas a un equipo cuando el proyecto enfrenta obstáculos o la moral está baja?", "en": "How do you motivate a team when the project faces obstacles or morale is low?"}, "a": {"es": "Habla de comunicación transparente (explicar el por qué, no solo el qué), de reconocer el esfuerzo del equipo, de celebrar victorias pequeñas, de eliminar impedimentos activamente y de crear un ambiente psicológicamente seguro donde los problemas se puedan reportar sin miedo a consecuencias.", "en": "Talk about transparent communication (explaining the why, not just the what), recognizing team effort, celebrating small wins, actively removing impediments, and creating a psychologically safe environment where problems can be reported without fear of consequences."}}, {"cat": "tec", "diff": "mid", "q": {"es": "¿Cuál es la diferencia entre Scrum y Kanban? ¿Cuándo usarías cada uno?", "en": "What is the difference between Scrum and Kanban? When would you use each?"}, "a": {"es": "Scrum: iteraciones fijas (sprints), roles definidos (PO/SM/Devs), backlog priorizado, ceremonias. Ideal para desarrollo de producto con requisitos que evolucionan. Kanban: flujo continuo, sin sprints, sin roles definidos, límites WIP, pull system. Ideal para operaciones, soporte, equipos con demanda variable e impredecible. Scrumban combina ambos.", "en": "Scrum: fixed iterations (sprints), defined roles (PO/SM/Devs), prioritized backlog, ceremonies. Ideal for product development with evolving requirements. Kanban: continuous flow, no sprints, no defined roles, WIP limits, pull system. Ideal for operations, support, teams with variable and unpredictable demand. Scrumban combines both."}}, {"cat": "tec", "diff": "adv", "q": {"es": "Explica qué es el Earned Value Management (EVM) y cómo lo has usado en proyectos reales.", "en": "Explain what Earned Value Management (EVM) is and how you have used it on real projects."}, "a": {"es": "EVM integra alcance, cronograma y costo para medir el desempeño real. KPIs clave: CPI = EV/AC (>1 bajo presupuesto), SPI = EV/PV (>1 adelantado). EAC = BAC/CPI proyecta el costo final. En proyectos reales: recolectar AC semanalmente, calcular % completado objetivamente, generar dashboards para el sponsor, y usar la tendencia del CPI para alertas tempranas.", "en": "EVM integrates scope, schedule, and cost to measure real performance. Key KPIs: CPI = EV/AC (>1 under budget), SPI = EV/PV (>1 ahead of schedule). EAC = BAC/CPI projects final cost. In real projects: collect AC weekly, calculate % complete objectively, generate dashboards for the sponsor, and use CPI trend for early warnings."}}, {"cat": "tec", "diff": "mid", "q": {"es": "¿Qué herramientas PM has utilizado y cuál es tu favorita? ¿Por qué?", "en": "Which PM tools have you used and what is your favorite? Why?"}, "a": {"es": "Menciona herramientas con las que tienes experiencia real: Jira (sprints, backlog, Kanban), Monday.com (flexibilidad, visualización), MS Project (CPM, recursos), Azure DevOps (DevOps/CI-CD). Tu herramienta favorita debe justificarse según el contexto: Jira para equipos de software por su integración con GitHub/Confluence y su robustez para Scrum.", "en": "Mention tools you have real experience with: Jira (sprints, backlog, Kanban), Monday.com (flexibility, visualization), MS Project (CPM, resources), Azure DevOps (DevOps/CI-CD). Your favorite tool should be justified by context: Jira for software teams for its integration with GitHub/Confluence and robustness for Scrum."}}, {"cat": "tec", "diff": "adv", "q": {"es": "¿Cómo gestionas los riesgos de un proyecto? ¿Cuál es tu proceso?", "en": "How do you manage project risks? What is your process?"}, "a": {"es": "Proceso: 1) Identificación (brainstorming, revisión de lecciones aprendidas, SWOT), 2) Análisis cualitativo (probabilidad × impacto → matriz 5×5), 3) Análisis cuantitativo (Monte Carlo, árboles de decisión para riesgos críticos), 4) Respuestas: Evitar, Transferir, Mitigar, Aceptar, 5) Monitoreo continuo en el Registro de Riesgos con dueño y fecha de revisión.", "en": "Process: 1) Identification (brainstorming, lessons learned review, SWOT), 2) Qualitative analysis (probability × impact → 5×5 matrix), 3) Quantitative analysis (Monte Carlo, decision trees for critical risks), 4) Responses: Avoid, Transfer, Mitigate, Accept, 5) Continuous monitoring in Risk Register with owner and review date."}}, {"cat": "tec", "diff": "mid", "q": {"es": "¿Qué es el PMBOK y cómo influye en tu trabajo diario?", "en": "What is the PMBOK and how does it influence your daily work?"}, "a": {"es": "El PMBOK (Project Management Body of Knowledge) del PMI es la guía estándar de mejores prácticas. Proporciona un marco de referencia de procesos, áreas de conocimiento y principios. En la práctica, no se aplica al pie de la letra sino que se adapta al contexto (tailoring). Los PMP aplican el PMBOK como guía, no como receta.", "en": "The PMBOK (Project Management Body of Knowledge) by PMI is the standard guide for best practices. It provides a framework of processes, knowledge areas, and principles. In practice, it is not applied literally but adapted to context (tailoring). PMPs use the PMBOK as a guide, not a recipe."}}, {"cat": "tec", "diff": "basic", "q": {"es": "¿Qué es un Project Charter y para qué sirve?", "en": "What is a Project Charter and what is it used for?"}, "a": {"es": "El Project Charter (Acta de Constitución) es el documento que autoriza formalmente el proyecto. Define: nombre del proyecto, objetivo, sponsor, PM designado, descripción de alto nivel, justificación del negocio, hitos principales, presupuesto inicial y principales stakeholders. Sin él, el PM carece de autoridad formal para asignar recursos.", "en": "The Project Charter is the document that formally authorizes the project. It defines: project name, objective, sponsor, designated PM, high-level description, business justification, key milestones, initial budget, and main stakeholders. Without it, the PM lacks formal authority to assign resources."}}, {"cat": "sit", "diff": "mid", "q": {"es": "El alcance del proyecto está cambiando constantemente y el cliente pide más funcionalidades sin cambiar el presupuesto. ¿Qué haces?", "en": "The project scope is constantly changing and the client keeps requesting more features without changing the budget. What do you do?"}, "a": {"es": "1) Implementa un proceso formal de control de cambios (Change Control Board). 2) Documenta el impacto de cada solicitud en costo, tiempo y calidad. 3) Presenta al cliente las opciones con sus implicaciones (scope/cost/time trade-offs). 4) Si el cliente insiste, escala al sponsor con datos objetivos. 5) Prevé esto en el contrato incluyendo un proceso claro de change requests.", "en": "1) Implement a formal change control process (Change Control Board). 2) Document the impact of each request on cost, time, and quality. 3) Present options to the client with implications (scope/cost/time trade-offs). 4) If the client insists, escalate to the sponsor with objective data. 5) Prevent this in the contract by including a clear change request process."}}, {"cat": "sit", "diff": "mid", "q": {"es": "Un miembro clave del equipo renuncia 2 semanas antes del lanzamiento. ¿Cómo reaccionas?", "en": "A key team member resigns 2 weeks before launch. How do you react?"}, "a": {"es": "1) Evalúa el impacto real: ¿qué tareas críticas dependían de esta persona? 2) Documenta inmediatamente su conocimiento y trabajo en curso. 3) Opciones: redistribuir a otros miembros, contratar un consultor temporal, negociar una extensión del plazo con el stakeholder, o reducir el alcance del lanzamiento. 4) Comunica la situación de forma transparente al sponsor y stakeholders con un plan de acción concreto.", "en": "1) Assess the real impact: which critical tasks depended on this person? 2) Immediately document their knowledge and work in progress. 3) Options: redistribute to other members, hire a temporary consultant, negotiate a deadline extension with the stakeholder, or reduce the launch scope. 4) Communicate the situation transparently to the sponsor and stakeholders with a concrete action plan."}}, {"cat": "sit", "diff": "adv", "q": {"es": "Tienes dos proyectos con el mismo sponsor que compiten por los mismos recursos limitados. ¿Cómo priorizas?", "en": "You have two projects with the same sponsor competing for the same limited resources. How do you prioritize?"}, "a": {"es": "No decides unilateralmente. 1) Presentas al sponsor un análisis objetivo de ambos proyectos: impacto en negocio, ROI, riesgo de retraso, dependencias. 2) Facilitas una sesión de toma de decisiones con los stakeholders relevantes. 3) Una vez decidida la prioridad, documentas y comunicas la decisión con claridad. 4) Propones si hay formas de servir a ambos proyectos (recursos parciales, paralelismo, contratación adicional).", "en": "You don't decide unilaterally. 1) Present the sponsor an objective analysis of both projects: business impact, ROI, delay risk, dependencies. 2) Facilitate a decision-making session with relevant stakeholders. 3) Once priority is decided, document and communicate the decision clearly. 4) Propose if there are ways to serve both projects (partial resources, parallelism, additional contracting)."}}, {"cat": "sit", "diff": "mid", "q": {"es": "Un stakeholder importante no está satisfecho con el progreso del proyecto y amenaza con cancelarlo. ¿Qué haces?", "en": "An important stakeholder is not satisfied with the project's progress and threatens to cancel it. What do you do?"}, "a": {"es": "1) Solicita una reunión urgente uno a uno para entender sus preocupaciones concretas. 2) Presenta datos objetivos: estado del proyecto (EVM, hitos completados, riesgos gestionados). 3) Identifica la brecha entre sus expectativas y la realidad. 4) Presenta un plan de acción con acciones correctivas específicas y fechas. 5) Establece un cadencia de comunicación más frecuente para recuperar la confianza.", "en": "1) Request an urgent one-on-one meeting to understand their specific concerns. 2) Present objective data: project status (EVM, completed milestones, managed risks). 3) Identify the gap between their expectations and reality. 4) Present an action plan with specific corrective actions and dates. 5) Establish more frequent communication cadence to rebuild trust."}}, {"cat": "sit", "diff": "basic", "q": {"es": "Tu equipo dice que la estimación inicial era incorrecta y necesita 3 semanas más. El cliente quiere la fecha original. ¿Qué haces?", "en": "Your team says the initial estimate was incorrect and needs 3 more weeks. The client wants the original date. What do you do?"}, "a": {"es": "1) Primero, valida con el equipo: ¿es la estimación definitiva o hay margen? ¿Hay work items que se puedan eliminar del alcance? 2) Evalúa opciones de compresión de cronograma: fast-tracking (paralelizar tareas), crashing (agregar recursos). 3) Prepara un análisis de impacto claro para presentar al cliente con las opciones y sus trade-offs. 4) Negocia: ¿puede el cliente aceptar un entregable parcial en la fecha original?", "en": "1) First, validate with the team: is the estimate final or is there margin? Are there work items that can be removed from scope? 2) Evaluate schedule compression options: fast-tracking (parallelize tasks), crashing (add resources). 3) Prepare a clear impact analysis to present to the client with options and their trade-offs. 4) Negotiate: can the client accept a partial deliverable on the original date?"}}, {"cat": "ask", "diff": "basic", "q": {"es": "¿Cómo describirías la cultura del equipo de PMs en esta organización?", "en": "How would you describe the PM team culture in this organization?"}, "a": {"es": "Esta pregunta revela cómo trabaja el equipo, si valoran la colaboración vs. el trabajo individual, si hay psicología de seguridad, y si el PM tiene autonomía real. Presta atención a señales sobre el equilibrio entre metodología y pragmatismo.", "en": "This question reveals how the team works, whether they value collaboration vs. individual work, if there is psychological safety, and if the PM has real autonomy. Pay attention to signals about the balance between methodology and pragmatism."}}, {"cat": "ask", "diff": "basic", "q": {"es": "¿Cuáles son los proyectos más importantes en los que estaría trabajando en los primeros 6 meses?", "en": "What are the most important projects I would be working on in the first 6 months?"}, "a": {"es": "Una pregunta importante para entender si habrá proyectos desafiantes e impactantes desde el inicio, o si primero hay un período de onboarding y proyectos menores. También revela si el rol es reactivo o estratégico.", "en": "An important question to understand if there will be challenging and impactful projects from the start, or if there is first an onboarding period with smaller projects. Also reveals if the role is reactive or strategic."}}, {"cat": "ask", "diff": "mid", "q": {"es": "¿Cómo mide la organización el éxito de un Project Manager?", "en": "How does the organization measure the success of a Project Manager?"}, "a": {"es": "Revela qué KPIs importan: ¿entrega a tiempo/presupuesto? ¿satisfacción del cliente? ¿OKRs de negocio? ¿desarrollo del equipo? Una buena organización mide el impacto del PM en múltiples dimensiones, no solo en métricas de tiempo y costo.", "en": "Reveals which KPIs matter: on-time/budget delivery? Customer satisfaction? Business OKRs? Team development? A good organization measures the PM's impact across multiple dimensions, not just time and cost metrics."}}, {"cat": "ask", "diff": "adv", "q": {"es": "¿Cuáles son los mayores desafíos que enfrenta el equipo de proyectos actualmente?", "en": "What are the biggest challenges the project team is currently facing?"}, "a": {"es": "Una pregunta que muestra interés genuino y madurez profesional. La respuesta te dará información crítica sobre problemas reales de la organización (deuda técnica, falta de recursos, problemas culturales, burocracia excesiva) y si estás listo/a para enfrentarlos.", "en": "A question showing genuine interest and professional maturity. The answer will give you critical information about real organizational problems (technical debt, lack of resources, cultural issues, excessive bureaucracy) and whether you're ready to face them."}}, {"cat": "ask", "diff": "mid", "q": {"es": "¿Qué metodologías de gestión de proyectos utiliza la organización y hay flexibilidad para adaptarlas?", "en": "What project management methodologies does the organization use and is there flexibility to adapt them?"}, "a": {"es": "Revela si la organización es ágil/tradicional/híbrida y qué tan dogmática es con su metodología. También muestra si habrá espacio para que aportes tu experiencia y proponga mejoras al proceso.", "en": "Reveals if the organization is agile/traditional/hybrid and how dogmatic it is with its methodology. Also shows if there will be room for you to contribute your experience and propose process improvements."}}];
const FLASHCARDS={"foundations": [{"q": {"es": "¿Cuáles son las 3 restricciones del Iron Triangle?", "en": "What are the 3 constraints of the Iron Triangle?"}, "a": {"es": "Alcance · Tiempo · Costo. Cambiar uno afecta a los otros dos.", "en": "Scope · Time · Cost. Changing one affects the other two."}}, {"q": {"es": "¿Cuáles son las 5 fases del ciclo de vida del proyecto?", "en": "What are the 5 phases of the project lifecycle?"}, "a": {"es": "Inicio → Planificación → Ejecución → Monitoreo/Control → Cierre", "en": "Initiating → Planning → Executing → Monitoring/Controlling → Closing"}}, {"q": {"es": "¿Qué es un Project Charter?", "en": "What is a Project Charter?"}, "a": {"es": "Documento que autoriza formalmente el proyecto y le da poder formal al PM para asignar recursos.", "en": "Document that formally authorizes the project and gives the PM formal authority to assign resources."}}, {"q": {"es": "¿Cuánto tiempo pasan los PMs comunicándose?", "en": "How much time do PMs spend communicating?"}, "a": {"es": "Hasta el 90% de su tiempo. Es la habilidad más crítica del PM.", "en": "Up to 90% of their time. It is the most critical PM skill."}}, {"q": {"es": "¿Cuál es la diferencia entre proyecto y operaciones?", "en": "What is the difference between a project and operations?"}, "a": {"es": "Proyectos: temporales y únicos. Operaciones: repetitivas y continuas.", "en": "Projects: temporary and unique. Operations: repetitive and continuous."}}], "pmbok": [{"q": {"es": "¿Cuántos principios tiene el PMBOK 7?", "en": "How many principles does PMBOK 7 have?"}, "a": {"es": "12 principios, organizados en 8 Dominios de Desempeño.", "en": "12 principles, organized into 8 Performance Domains."}}, {"q": {"es": "¿Cuáles son las 10 Áreas de Conocimiento del PMBOK 6?", "en": "What are the 10 Knowledge Areas of PMBOK 6?"}, "a": {"es": "Integración · Alcance · Cronograma · Costos · Calidad · Recursos · Comunicaciones · Riesgos · Adquisiciones · Stakeholders", "en": "Integration · Scope · Schedule · Cost · Quality · Resource · Communications · Risk · Procurement · Stakeholders"}}, {"q": {"es": "¿Qué certifica el PMP?", "en": "What does the PMP certify?"}, "a": {"es": "Experiencia y conocimiento en gestión de proyectos. Es la certificación más valorada del PMI.", "en": "Experience and knowledge in project management. It is the most valued PMI certification."}}, {"q": {"es": "¿Cuál es el área de conocimiento que 'integra' todo el trabajo del PM?", "en": "Which knowledge area 'integrates' all the PM's work?"}, "a": {"es": "Gestión de la Integración. Coordina todos los demás procesos y áreas.", "en": "Integration Management. It coordinates all other processes and knowledge areas."}}, {"q": {"es": "¿Qué diferencia PMBOK 6 de PMBOK 7?", "en": "What differentiates PMBOK 6 from PMBOK 7?"}, "a": {"es": "PMBOK 6: 49 procesos prescriptivos. PMBOK 7: 12 principios + 8 dominios, más flexible y adaptable.", "en": "PMBOK 6: 49 prescriptive processes. PMBOK 7: 12 principles + 8 domains, more flexible and adaptable."}}], "scrum": [{"q": {"es": "¿Cuáles son los 3 roles de Scrum?", "en": "What are the 3 Scrum roles?"}, "a": {"es": "Product Owner · Scrum Master · Developers (3-9 personas)", "en": "Product Owner · Scrum Master · Developers (3-9 people)"}}, {"q": {"es": "¿Cuáles son los 3 artefactos de Scrum y sus compromisos?", "en": "What are the 3 Scrum artifacts and their commitments?"}, "a": {"es": "Product Backlog → Product Goal | Sprint Backlog → Sprint Goal | Incremento → Definition of Done", "en": "Product Backlog → Product Goal | Sprint Backlog → Sprint Goal | Increment → Definition of Done"}}, {"q": {"es": "¿Cuánto dura el Daily Scrum?", "en": "How long is the Daily Scrum?"}, "a": {"es": "15 minutos. Es un evento de inspección del progreso hacia el Sprint Goal.", "en": "15 minutes. It is an inspection event for progress toward the Sprint Goal."}}, {"q": {"es": "¿Cuáles son los 3 pilares del empirismo en Scrum?", "en": "What are the 3 pillars of empiricism in Scrum?"}, "a": {"es": "Transparencia · Inspección · Adaptación", "en": "Transparency · Inspection · Adaptation"}}, {"q": {"es": "¿Cuánto dura un Sprint máximo?", "en": "What is the maximum Sprint duration?"}, "a": {"es": "4 semanas (1 mes). La Sprint Planning es de máximo 8 horas para un Sprint de 4 semanas.", "en": "4 weeks (1 month). Sprint Planning is max 8 hours for a 4-week Sprint."}}], "kanban": [{"q": {"es": "¿Cuáles son las 6 prácticas principales de Kanban?", "en": "What are the 6 core Kanban practices?"}, "a": {"es": "Visualizar · Limitar WIP · Gestionar flujo · Políticas explícitas · Feedback loops · Mejorar y evolucionar", "en": "Visualize · Limit WIP · Manage flow · Make policies explicit · Feedback loops · Improve and evolve"}}, {"q": {"es": "Enuncia la Ley de Little.", "en": "State Little's Law."}, "a": {"es": "Lead Time = WIP ÷ Throughput. Reducir el WIP reduce el Lead Time.", "en": "Lead Time = WIP ÷ Throughput. Reducing WIP reduces Lead Time."}}, {"q": {"es": "¿Diferencia entre Lead Time y Cycle Time?", "en": "Difference between Lead Time and Cycle Time?"}, "a": {"es": "Lead Time: desde la solicitud del cliente hasta la entrega. Cycle Time: desde que el equipo empieza hasta que termina.", "en": "Lead Time: from customer request to delivery. Cycle Time: from when the team starts until completion."}}, {"q": {"es": "¿Qué es el Throughput en Kanban?", "en": "What is Throughput in Kanban?"}, "a": {"es": "Número de ítems completados por unidad de tiempo (p.ej., ítems/semana).", "en": "Number of items completed per unit of time (e.g., items/week)."}}, {"q": {"es": "¿Qué es el WIP (Work In Progress)?", "en": "What is WIP (Work In Progress)?"}, "a": {"es": "Cantidad de trabajo iniciado pero no completado. Limitarlo mejora el flujo y reduce el Lead Time.", "en": "Amount of started but not completed work. Limiting it improves flow and reduces Lead Time."}}], "waterfall": [{"q": {"es": "¿Cuáles son las 6 fases del modelo Cascada?", "en": "What are the 6 phases of the Waterfall model?"}, "a": {"es": "1. Requisitos → 2. Diseño → 3. Implementación → 4. Pruebas → 5. Despliegue → 6. Mantenimiento", "en": "1. Requirements → 2. Design → 3. Implementation → 4. Testing → 5. Deployment → 6. Maintenance"}}, {"q": {"es": "¿Cuándo es más adecuado usar Cascada?", "en": "When is Waterfall most appropriate?"}, "a": {"es": "Requisitos estables y bien definidos, proyectos de construcción/manufactura, contratos fijos, regulaciones estrictas.", "en": "Stable and well-defined requirements, construction/manufacturing projects, fixed contracts, strict regulations."}}, {"q": {"es": "¿Cuál es el mayor riesgo de Cascada?", "en": "What is Waterfall's biggest risk?"}, "a": {"es": "El costo del cambio crece exponencialmente. Los defectos detectados tarde son muy costosos de corregir.", "en": "Cost of change grows exponentially. Defects detected late are very expensive to correct."}}, {"q": {"es": "¿Qué significa que Cascada es un modelo 'secuencial'?", "en": "What does it mean that Waterfall is a 'sequential' model?"}, "a": {"es": "Cada fase debe completarse 100% antes de comenzar la siguiente. No hay iteraciones ni retrocesos planificados.", "en": "Each phase must be 100% complete before starting the next. No planned iterations or back-tracking."}}], "prince2": [{"q": {"es": "¿Cuántos principios, temas y procesos tiene PRINCE2?", "en": "How many principles, themes and processes does PRINCE2 have?"}, "a": {"es": "7 Principios · 7 Temas · 7 Procesos", "en": "7 Principles · 7 Themes · 7 Processes"}}, {"q": {"es": "¿Cuál es el principio más distintivo de PRINCE2?", "en": "What is PRINCE2's most distinctive principle?"}, "a": {"es": "Justificación continua del negocio. El Business Case debe ser válido en cada fase del proyecto.", "en": "Continued business justification. The Business Case must be valid at each stage of the project."}}, {"q": {"es": "¿Qué significa 'Gestión por excepción' en PRINCE2?", "en": "What does 'Manage by exception' mean in PRINCE2?"}, "a": {"es": "Cada nivel tiene tolerancias definidas. Solo se escala al nivel superior si se prevé superar esas tolerancias.", "en": "Each level has defined tolerances. Escalate to the next level only when tolerances are forecast to be exceeded."}}, {"q": {"es": "¿Qué es el 'Enfoque en los productos' en PRINCE2?", "en": "What is 'Focus on products' in PRINCE2?"}, "a": {"es": "El proyecto se planifica en base a los productos (entregables) que debe producir, no solo en actividades.", "en": "The project is planned based on the products (deliverables) it must produce, not just activities."}}], "lean": [{"q": {"es": "¿Cuáles son los 5 principios Lean?", "en": "What are the 5 Lean principles?"}, "a": {"es": "1.Definir valor · 2.Mapear la cadena de valor · 3.Crear flujo · 4.Pull · 5.Buscar la perfección (Kaizen)", "en": "1.Define value · 2.Map value stream · 3.Create flow · 4.Establish pull · 5.Seek perfection (Kaizen)"}}, {"q": {"es": "¿Cuáles son los 7 desperdicios de Lean (Muda)?", "en": "What are the 7 Lean wastes (Muda)?"}, "a": {"es": "Sobreproducción · Espera · Transporte · Sobreprocesamiento · Inventario · Movimiento · Defectos", "en": "Overproduction · Waiting · Transport · Over-processing · Inventory · Motion · Defects"}}, {"q": {"es": "¿Qué es el Kaizen?", "en": "What is Kaizen?"}, "a": {"es": "Mejora continua e incremental. El quinto principio Lean. Pequeñas mejoras constantes en todos los niveles.", "en": "Continuous and incremental improvement. The fifth Lean principle. Small, constant improvements at all levels."}}, {"q": {"es": "¿Qué es el Value Stream Mapping?", "en": "What is Value Stream Mapping?"}, "a": {"es": "Herramienta para mapear todas las actividades del flujo de valor, identificando cuáles agregan valor y cuáles son desperdicios.", "en": "Tool to map all value stream activities, identifying which add value and which are waste."}}], "sixsigma": [{"q": {"es": "¿Cuántos defectos por millón (DPMO) representa el nivel Six Sigma?", "en": "How many defects per million (DPMO) does Six Sigma represent?"}, "a": {"es": "3.4 DPMO. Equivale a una calidad del 99.9997%.", "en": "3.4 DPMO. Equivalent to 99.9997% quality."}}, {"q": {"es": "¿Qué significan las letras de DMAIC?", "en": "What do the letters of DMAIC stand for?"}, "a": {"es": "Define · Measure · Analyze · Improve · Control", "en": "Define · Measure · Analyze · Improve · Control"}}, {"q": {"es": "¿Qué herramienta se usa en la fase Analyze para identificar causas raíz?", "en": "Which tool is used in the Analyze phase to identify root causes?"}, "a": {"es": "Diagrama de Ishikawa (espina de pescado) y los 5 Porqués (5 Whys).", "en": "Ishikawa diagram (fishbone) and 5 Whys analysis."}}, {"q": {"es": "¿Qué es un Black Belt en Six Sigma?", "en": "What is a Black Belt in Six Sigma?"}, "a": {"es": "Experto dedicado a tiempo completo a proyectos Six Sigma. Lidera proyectos DMAIC de mejora de procesos.", "en": "A full-time expert dedicated to Six Sigma projects. Leads DMAIC process improvement projects."}}], "scrumban": [{"q": {"es": "¿Qué combina Scrumban?", "en": "What does Scrumban combine?"}, "a": {"es": "La estructura de Scrum (retrospectivas, planificación) con la flexibilidad de flujo de Kanban (límites WIP, tablero visual).", "en": "The structure of Scrum (retrospectives, planning) with the flow flexibility of Kanban (WIP limits, visual board)."}}, {"q": {"es": "¿Qué es SAFe?", "en": "What is SAFe?"}, "a": {"es": "Scaled Agile Framework. Escala los principios ágiles para grandes organizaciones con múltiples equipos.", "en": "Scaled Agile Framework. Scales agile principles for large organizations with multiple teams."}}, {"q": {"es": "¿Qué es LeSS?", "en": "What is LeSS?"}, "a": {"es": "Large-Scale Scrum. Extiende Scrum a múltiples equipos con mínima burocracia y máxima simplicidad.", "en": "Large-Scale Scrum. Extends Scrum to multiple teams with minimal bureaucracy and maximum simplicity."}}], "cpm": [{"q": {"es": "¿Qué significa que una actividad tiene Float = 0?", "en": "What does it mean that an activity has Float = 0?"}, "a": {"es": "Está en la Ruta Crítica. Un retraso de un solo día retrasa toda la fecha de fin del proyecto.", "en": "It is on the Critical Path. A delay of even one day delays the entire project end date."}}, {"q": {"es": "¿Cómo se calcula el Float?", "en": "How is Float calculated?"}, "a": {"es": "Float = LS - ES = LF - EF. (Late Start minus Early Start, or Late Finish minus Early Finish)", "en": "Float = LS - ES = LF - EF. (Late Start minus Early Start, or Late Finish minus Early Finish)"}}, {"q": {"es": "¿Qué significa EF en CPM?", "en": "What does EF mean in CPM?"}, "a": {"es": "Early Finish = ES (Early Start) + Duración de la actividad.", "en": "Early Finish = ES (Early Start) + Activity Duration."}}, {"q": {"es": "¿En qué año se desarrolló el CPM y quién lo creó?", "en": "When was CPM developed and who created it?"}, "a": {"es": "1957, por DuPont y Remington Rand para gestionar proyectos de mantenimiento de plantas industriales.", "en": "1957, by DuPont and Remington Rand to manage industrial plant maintenance projects."}}], "cpmai": [{"q": {"es": "¿Qué significan las siglas CPMAI?", "en": "What does CPMAI stand for?"}, "a": {"es": "Cognitive Project Management for Artificial Intelligence. Estándar del PMI para proyectos de IA.", "en": "Cognitive Project Management for Artificial Intelligence. PMI's standard for AI projects."}}, {"q": {"es": "¿Cuáles son las 6 fases de CPMAI?", "en": "What are the 6 CPMAI phases?"}, "a": {"es": "1.Business Understanding · 2.Data Understanding · 3.Data Preparation · 4.Modeling · 5.Evaluation · 6.Deployment", "en": "1.Business Understanding · 2.Data Understanding · 3.Data Preparation · 4.Modeling · 5.Evaluation · 6.Deployment"}}, {"q": {"es": "¿Cuál es el riesgo más característico de proyectos de IA vs. proyectos tradicionales?", "en": "What is the most characteristic risk of AI projects vs. traditional projects?"}, "a": {"es": "Data drift y sesgo algorítmico. Un modelo puede degradarse sin que nadie lo detecte si no hay monitoreo continuo.", "en": "Data drift and algorithmic bias. A model can degrade undetected without continuous monitoring."}}, {"q": {"es": "¿Qué es el data drift?", "en": "What is data drift?"}, "a": {"es": "Cambio en la distribución estadística de los datos de entrada que degrada el rendimiento del modelo de ML.", "en": "Change in the statistical distribution of input data that degrades the ML model's performance."}}], "crispdm": [{"q": {"es": "¿Qué % del esfuerzo total consume Data Preparation en CRISP-DM?", "en": "What % of total effort does Data Preparation consume in CRISP-DM?"}, "a": {"es": "Aproximadamente el 80% del esfuerzo total. La limpieza y transformación de datos es la mayor carga de trabajo.", "en": "Approximately 80% of total effort. Data cleaning and transformation is the biggest workload."}}, {"q": {"es": "¿Qué añade CRISP-ML(Q) respecto a CRISP-DM?", "en": "What does CRISP-ML(Q) add over CRISP-DM?"}, "a": {"es": "QA explícita en cada fase + proceso formal de monitoreo y reentrenamiento del modelo post-despliegue.", "en": "Explicit QA at each phase + formal process for model monitoring and retraining post-deployment."}}, {"q": {"es": "¿Cuáles son las 6 fases de CRISP-DM?", "en": "What are the 6 CRISP-DM phases?"}, "a": {"es": "Business Understanding · Data Understanding · Data Preparation · Modeling · Evaluation · Deployment", "en": "Business Understanding · Data Understanding · Data Preparation · Modeling · Evaluation · Deployment"}}], "datapm": [{"q": {"es": "¿Cuál es la idea central de Andrew Ng sobre Data-Centric AI?", "en": "What is Andrew Ng's central idea about Data-Centric AI?"}, "a": {"es": "Mejora los datos para el mismo modelo, en lugar de mejorar el modelo para los mismos datos.", "en": "Improve the data for the same model, rather than improving the model for the same data."}}, {"q": {"es": "¿Qué es el Data Lineage?", "en": "What is Data Lineage?"}, "a": {"es": "Rastrear el origen, movimiento y transformaciones de los datos a lo largo de su ciclo de vida.", "en": "Tracking the origin, movement, and transformations of data throughout its lifecycle."}}, {"q": {"es": "¿Cuáles son los 4 atributos de calidad del dato?", "en": "What are the 4 data quality attributes?"}, "a": {"es": "Completitud · Consistencia · Exactitud · Actualidad (Timeliness)", "en": "Completeness · Consistency · Accuracy · Timeliness"}}], "stakeholders": [{"q": {"es": "¿Cuáles son los 4 cuadrantes de la Matriz Poder/Interés?", "en": "What are the 4 quadrants of the Power/Interest Grid?"}, "a": {"es": "Alto Poder/Alto Interés: Gestionar de cerca · Alto Poder/Bajo Interés: Mantener satisfecho · Bajo Poder/Alto Interés: Mantener informado · Bajo Poder/Bajo Interés: Monitorear", "en": "High Power/High Interest: Manage closely · High Power/Low Interest: Keep satisfied · Low Power/High Interest: Keep informed · Low Power/Low Interest: Monitor"}}, {"q": {"es": "¿Cuáles son los 5 niveles de involucramiento de stakeholders?", "en": "What are the 5 stakeholder engagement levels?"}, "a": {"es": "Desconocedor → Resistente → Neutral → Partidario → Líder", "en": "Unaware → Resistant → Neutral → Supportive → Leading"}}, {"q": {"es": "¿Qué es el Registro de Stakeholders?", "en": "What is the Stakeholder Register?"}, "a": {"es": "Documento que lista cada interesado con nombre, rol, nivel de influencia, expectativas y estrategia de comunicación.", "en": "Document listing each stakeholder with name, role, influence level, expectations, and communication strategy."}}, {"q": {"es": "¿Qué diferencia a un stakeholder interno de uno externo?", "en": "What differentiates an internal from an external stakeholder?"}, "a": {"es": "Internos: sponsor, equipo, PMO, otros departamentos. Externos: clientes, usuarios, reguladores, proveedores, comunidad.", "en": "Internal: sponsor, team, PMO, other departments. External: clients, users, regulators, vendors, community."}}], "estimation": [{"q": {"es": "¿Cuál es la fórmula PERT de tres puntos?", "en": "What is the PERT three-point formula?"}, "a": {"es": "E = (O + 4M + P) / 6. Donde O=Optimista, M=Más probable, P=Pesimista.", "en": "E = (O + 4M + P) / 6. Where O=Optimistic, M=Most likely, P=Pessimistic."}}, {"q": {"es": "¿Qué es la Velocity en Scrum?", "en": "What is Velocity in Scrum?"}, "a": {"es": "Story points promedio completados por Sprint. Se usa para proyectar entregas futuras.", "en": "Average story points completed per Sprint. Used to project future deliveries."}}, {"q": {"es": "¿Qué escala usa Planning Poker?", "en": "What scale does Planning Poker use?"}, "a": {"es": "Fibonacci: 1, 2, 3, 5, 8, 13, 21, 34... Los números grandes se separan más para reflejar mayor incertidumbre.", "en": "Fibonacci: 1, 2, 3, 5, 8, 13, 21, 34... Larger numbers spread further apart to reflect greater uncertainty."}}, {"q": {"es": "¿Qué es la estimación análoga?", "en": "What is analogous estimation?"}, "a": {"es": "Usa datos históricos de proyectos similares como base. Rápida pero menos precisa. Buena para estimaciones tempranas.", "en": "Uses historical data from similar projects as a basis. Fast but less precise. Good for early estimates."}}], "pmtools": [{"q": {"es": "¿Qué herramienta PM es más adecuada para equipos de software ágil?", "en": "Which PM tool is most suitable for agile software teams?"}, "a": {"es": "Jira (Atlassian). Soporta Scrum, Kanban y SAFe. Integración nativa con GitHub y Confluence.", "en": "Jira (Atlassian). Supports Scrum, Kanban, and SAFe. Native integration with GitHub and Confluence."}}, {"q": {"es": "¿Para qué tipo de proyectos es ideal MS Project?", "en": "For which type of projects is MS Project ideal?"}, "a": {"es": "Proyectos complejos que requieren CPM (Ruta Crítica), Earned Value Management y planificación detallada de recursos.", "en": "Complex projects requiring CPM (Critical Path), Earned Value Management, and detailed resource planning."}}, {"q": {"es": "¿Cuál es la herramienta PM más popular en equipos de marketing y operaciones?", "en": "What is the most popular PM tool for marketing and operations teams?"}, "a": {"es": "Monday.com y Asana. Interfaces intuitivas, flexibles, con excelentes plantillas y vistas visuales.", "en": "Monday.com and Asana. Intuitive, flexible interfaces with excellent templates and visual views."}}, {"q": {"es": "¿Qué es Azure DevOps?", "en": "What is Azure DevOps?"}, "a": {"es": "Plataforma de Microsoft para DevOps y PM ágil. Combina tableros (Scrum/Kanban), repos Git, pipelines CI/CD y test plans.", "en": "Microsoft's platform for DevOps and agile PM. Combines boards (Scrum/Kanban), Git repos, CI/CD pipelines, and test plans."}}], "budget": [{"q": {"es": "Si CPI = 0.8, ¿el proyecto está bajo o sobre presupuesto?", "en": "If CPI = 0.8, is the project under or over budget?"}, "a": {"es": "Sobre presupuesto. CPI = EV/AC. CPI < 1 = por cada $1 gastado se obtiene $0.80 de valor.", "en": "Over budget. CPI = EV/AC. CPI < 1 = for every $1 spent, only $0.80 of value is received."}}, {"q": {"es": "¿Qué significa SPI > 1?", "en": "What does SPI > 1 mean?"}, "a": {"es": "El proyecto está adelantado en cronograma. SPI = EV/PV. SPI > 1 = más valor entregado del planificado.", "en": "The project is ahead of schedule. SPI = EV/PV. SPI > 1 = more value delivered than planned."}}, {"q": {"es": "¿Qué significa RACI?", "en": "What does RACI stand for?"}, "a": {"es": "Responsible (ejecuta) · Accountable (rinde cuentas) · Consulted (aporta) · Informed (se informa)", "en": "Responsible (executes) · Accountable (answerable) · Consulted (input needed) · Informed (kept in the loop)"}}, {"q": {"es": "¿Cómo se calcula el EAC (Estimate at Completion)?", "en": "How is EAC (Estimate at Completion) calculated?"}, "a": {"es": "EAC = BAC / CPI. Proyecta el costo total final del proyecto basado en el rendimiento actual.", "en": "EAC = BAC / CPI. Projects the total final cost of the project based on current performance."}}]};

  DARK=!DARK;

}

function updateStreak(){
  const now=Date.now();
  if(now-sessionStart>86400000){streak++;sessionStart=now;}

  document.getElementById('streak-chip').textContent='🔥 '+streak;
}
