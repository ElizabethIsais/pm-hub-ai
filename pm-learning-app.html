function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={s_home:'nav-home','s-home':'nav-home','s-mods':'nav-mods','s-ivw':'nav-ivw','s-dash':'nav-dash'};
  const nb=document.getElementById(map[id]);
  if(nb)nb.classList.add('active');
}
function goHome(){renderHome();showScreen('s-home');}
function goMods(){renderMods();showScreen('s-mods');}
function goIvw(){renderIvw();showScreen('s-ivw');}
function goDash(){renderDash();showScreen('s-dash');}

// ===== RENDER ALL =====
function renderAll(){
  renderHome();
  if(document.getElementById('s-mods').classList.contains('active'))renderMods();
  if(CUR_MOD!==null)renderModDetail();
  renderIvwStatic();
  renderDashStatic();
  updateStreak();
}

// ===== HOME =====
function renderHome(){
  document.getElementById('h1a').textContent=t('h1a');
  document.getElementById('h1b').textContent=t('h1b');
  document.getElementById('home-sub').textContent=t('home_sub');
  document.getElementById('lang-btn').textContent=t('lang_btn');
  document.getElementById('ivw-t').textContent=t('ivw_t');
  document.getElementById('ivw-d').textContent=t('ivw_d');
  document.getElementById('ivw-btn').textContent=t('ivw_btn');
  const lg=document.getElementById('level-grid');
  const levels=[
    {key:'beginner',icon:'🌱',tk:'beg_t',dk:'beg_d'},
    {key:'intermediate',icon:'📈',tk:'int_t',dk:'int_d'},
    {key:'advanced',icon:'🚀',tk:'adv_t',dk:'adv_d'},
    {key:'all',icon:'📦',tk:'all_t',dk:'all_d'}
  ];
  lg.innerHTML=levels.map(l=>`
    <div class="level-card" onclick="selectLevel('${l.key}')">
      <div class="lc-icon">${l.icon}</div>
      <h3>${t(l.tk)}</h3>
      <p>${t(l.dk)}</p>
    </div>`).join('');
}
function selectLevel(lvl){
  LEVEL_FILTER=lvl==='all'?null:lvl;
  CAT_FILTER='all';
  renderMods();
  showScreen('s-mods');
}

// ===== MODULES =====
function renderMods(){
  document.getElementById('mods-title').textContent=t('mods_title');
  document.getElementById('mod-search').placeholder=t('search');
  const cats=[{v:'all',l:t('filter_all')},...[...new Set(MODS.map(m=>m.cat[LANG]))].map(c=>({v:c,l:c}))];
  document.getElementById('filter-bar').innerHTML=cats.map(c=>
    `<div class="filter-chip${CAT_FILTER===c.v?' active':''}" onclick="setCat('${c.v}')">${c.l}</div>`
  ).join('');
  drawModGrid();
}
function setCat(v){CAT_FILTER=v;renderMods();}
function filterMods(){drawModGrid();}
function drawModGrid(){
  const q=(document.getElementById('mod-search').value||'').toLowerCase();
  const mods=MODS.filter(m=>{
    if(LEVEL_FILTER&&!m.level.includes(LEVEL_FILTER))return false;
    if(CAT_FILTER!=='all'&&m.cat[LANG]!==CAT_FILTER)return false;
    if(q&&!m.title[LANG].toLowerCase().includes(q)&&!m.sub[LANG].toLowerCase().includes(q))return false;
    return true;
  });
  const lvlBadge=l=>l.includes('advanced')?`<span class="badge badge-adv">${t('adv')}</span>`:
    l.includes('intermediate')?`<span class="badge badge-int">${t('mid')}</span>`:
    `<span class="badge badge-beg">${t('basic')}</span>`;
  const st=m=>{
    const x=XP[m.id]||0;
    const s=QUIZ_STATE[m.id];
    if(!x&&!s)return t('not_started');
    if(s&&s.done)return t('done_quiz')+(s.score||0)+'%';
    return t('in_prog')+(Math.round((x/120)*100))+'%';
  };
  document.getElementById('mod-grid').innerHTML=mods.length?mods.map(m=>{
    const xp=XP[m.id]||0;
    const prog=Math.min(100,Math.round(xp/120*100));
    return `<div class="mod-card" onclick="openMod('${m.id}')">
      <div class="mc-head">
        <div class="mc-icon">${m.icon}</div>
        <div class="mc-meta">
          <h3>${m.title[LANG]}</h3>
          <p class="mc-sub">${m.sub[LANG]}</p>
        </div>
      </div>
      <div class="mc-prog"><div class="mc-prog-inner" style="width:${prog}%"></div></div>
      <div class="mc-foot">
        <div style="display:flex;gap:4px">${m.level.map(lvlBadge).join('')}</div>
        <span class="mc-cat">${m.cat[LANG]}</span>
        <span class="mc-dur">⏱ ${m.dur}</span>
      </div>
      <div style="font-size:11px;color:var(--txt2)">${st(m)}</div>
    </div>`;
  }).join(''):'<p style="grid-column:1/-1;text-align:center;color:var(--txt2);padding:40px">No modules found</p>';
}

// ===== MODULE DETAIL =====
function openMod(id){
  CUR_MOD=MODS.find(m=>m.id===id);
  CUR_SEC=0;
  FC_IDX=0;
  renderModDetail();
  switchTab('content');
  showScreen('s-mod');
  addXP(id,20);
}
function renderModDetail(){
  if(!CUR_MOD)return;
  document.getElementById('mod-icon-big').textContent=CUR_MOD.icon;
  document.getElementById('mod-title').textContent=CUR_MOD.title[LANG];
  document.getElementById('mod-sub-txt').textContent=CUR_MOD.sub[LANG];
  document.getElementById('back-mods-btn').textContent=t('back_mods');
  document.getElementById('tab-quiz').textContent=t('quiz_tab');
  document.getElementById('tab-fc').textContent=t('fc_tab');
  document.getElementById('go-quiz-btn').textContent=t('go_quiz');
  document.getElementById('prev-btn').textContent=t('prev');
  document.getElementById('next-btn').textContent=t('next');
  renderSec();
  renderFC();
}
function renderSec(){
  if(!CUR_MOD)return;
  const secs=CUR_MOD.secs;
  document.getElementById('sec-dots').innerHTML=secs.map((_,i)=>
    `<div class="sec-dot${i===CUR_SEC?' active':''}" onclick="goSec(${i})"></div>`
  ).join('');
  document.getElementById('sec-content').innerHTML=`<div class="sec-title" style="padding:0 0 12px;font-size:14px;font-weight:700;color:var(--acc)">${secs[CUR_SEC].t[LANG]}</div>`+secs[CUR_SEC].c[LANG];
  document.getElementById('prev-btn').disabled=CUR_SEC===0;
  document.getElementById('next-btn').textContent=CUR_SEC<secs.length-1?t('next'):t('go_quiz');
}
function goSec(i){CUR_SEC=i;addXP(CUR_MOD.id,20);renderSec();}
function prevSec(){if(CUR_SEC>0){CUR_SEC--;renderSec();}}
function nextSec(){
  if(!CUR_MOD)return;
  if(CUR_SEC<CUR_MOD.secs.length-1){CUR_SEC++;addXP(CUR_MOD.id,20);renderSec();}
  else switchTab('quiz');
}
function switchTab(tab){
  ['content','quiz','fc'].forEach(t=>{
    document.getElementById('tab-body-'+t).classList.toggle('active',t===tab);
    const el=document.getElementById('tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  if(tab==='quiz')renderQuiz();
  if(tab==='fc')renderFC();
}

// ===== QUIZ =====
function renderQuiz(){
  if(!CUR_MOD)return;
  const qs=CUR_MOD.quiz;
  const st=QUIZ_STATE[CUR_MOD.id]||{idx:0,answers:[],done:false};
  if(st.done){renderResult(st,qs);return;}
  const i=st.idx;
  const q=qs[i];
  const area=document.getElementById('quiz-area');
  area.innerHTML=`
    <div class="q-counter">${t('question')} ${i+1} ${t('q_of')} ${qs.length}</div>
    <div class="q-card">
      <h3>${q.q[LANG]}</h3>
      <div class="opt-list">
        ${q.o[LANG].map((o,j)=>`<button class="opt" onclick="answerQ(${j})">${o}</button>`).join('')}
      </div>
    </div>`;
}
function answerQ(idx){
  if(!CUR_MOD)return;
  const qs=CUR_MOD.quiz;
  const st=QUIZ_STATE[CUR_MOD.id]||{idx:0,answers:[],done:false};
  const q=qs[st.idx];
  st.answers.push(idx);
  const opts=document.querySelectorAll('.opt');
  opts.forEach((o,j)=>{
    o.disabled=true;
    if(j===q.c)o.classList.add('correct');
    else if(j===idx&&idx!==q.c)o.classList.add('wrong');
  });
  const area=document.getElementById('quiz-area');
  const fb=document.createElement('div');
  fb.className='exp-box';
  fb.innerHTML=`<strong>${idx===q.c?t('correct'):t('wrong')}</strong><br>${q.e[LANG]}`;
  area.querySelector('.q-card').appendChild(fb);
  const nxt=document.createElement('div');
  nxt.style.textAlign='right';
  nxt.style.marginTop='12px';
  const isLast=st.idx===qs.length-1;
  nxt.innerHTML=`<button class="btn btn-acc" onclick="nextQ()">${isLast?t('see_res'):t('next_q')}</button>`;
  area.appendChild(nxt);
  st.idx++;
  QUIZ_STATE[CUR_MOD.id]=st;
}
function nextQ(){
  const st=QUIZ_STATE[CUR_MOD.id];
  const qs=CUR_MOD.quiz;
  if(st.idx>=qs.length){
    const correct=st.answers.filter((a,i)=>a===qs[i].c).length;
    const pct=Math.round(correct/qs.length*100);
    st.score=pct;st.done=true;
    const xp=pct>=70?50:25;
    addXP(CUR_MOD.id,xp);
    updateStreak();
    renderResult(st,qs);
  }else renderQuiz();
}
function renderResult(st,qs){
  const correct=st.answers.filter((a,i)=>a===qs[i].c).length;
  const pct=st.score||Math.round(correct/qs.length*100);
  const msg=pct===100?t('msg_100'):pct>=70?t('msg_70'):t('msg_low');
  const xp=pct>=70?50:25;
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-result">
      <div class="result-score">${pct}%</div>
      <div class="result-msg">${correct} ${t('res_ans')} ${t('q_of')} ${qs.length}</div>
      <div>${msg}</div>
      <div class="result-xp">+${xp} XP 🏆</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="retryQuiz()">${t('retry')}</button>
        <button class="btn btn-acc" onclick="goMods()">${t('cont')}</button>
      </div>
    </div>`;
}
function retryQuiz(){
  if(CUR_MOD){QUIZ_STATE[CUR_MOD.id]={idx:0,answers:[],done:false};renderQuiz();}
}

// ===== FLASHCARDS =====
function renderFC(){
  if(!CUR_MOD)return;
  const cards=FLASHCARDS[CUR_MOD.id]||[];
  if(!cards.length){
    document.getElementById('tab-body-fc').innerHTML='<p style="text-align:center;padding:40px;color:var(--txt2)">No flashcards for this module yet.</p>';
    return;
  }
  FC_IDX=Math.min(FC_IDX,cards.length-1);
  const c=cards[FC_IDX];
  document.getElementById('fc-hint').textContent=t('flip_hint');
  document.getElementById('fc-counter').textContent=`${t('card_of')} ${FC_IDX+1} / ${cards.length}`;
  document.getElementById('fc-front').textContent=c.q[LANG];
  document.getElementById('fc-back').textContent=c.a[LANG];
  document.getElementById('fc-card').classList.remove('flipped');
}
function flipCard(){document.getElementById('fc-card').classList.toggle('flipped');}
function fcNav(d){
  if(!CUR_MOD)return;
  const cards=FLASHCARDS[CUR_MOD.id]||[];
  FC_IDX=(FC_IDX+d+cards.length)%cards.length;
  renderFC();
}

// ===== INTERVIEW =====
function renderIvwStatic(){
  document.getElementById('ivw-title').textContent=t('ivw_title');
  document.getElementById('lib-mode-btn').textContent=t('lib_btn');
  document.getElementById('mock-mode-btn').textContent=t('mock_btn');
  document.getElementById('star-tip').textContent=t('star_tip');
  document.getElementById('star-tip2').textContent=t('star_tip');
}
function renderIvw(){
  renderIvwStatic();
  renderIvwCats();
  renderIvwList();
  initMock();
}
function setIvwMode(m){
  IVW_MODE=m;
  document.getElementById('ivw-lib').style.display=m==='lib'?'block':'none';
  document.getElementById('ivw-mock').style.display=m==='mock'?'block':'none';
  document.getElementById('lib-mode-btn').classList.toggle('active',m==='lib');
  document.getElementById('mock-mode-btn').classList.toggle('active',m==='mock');
  if(m==='mock')renderMock();
}
function renderIvwCats(){
  const cats=[{v:'all',l:t('ivw_all')},{v:'beh',l:t('ivw_beh')},{v:'tec',l:t('ivw_tec')},{v:'sit',l:t('ivw_sit')},{v:'ask',l:t('ivw_ask')}];
  document.getElementById('ivw-cats').innerHTML=cats.map(c=>
    `<div class="filter-chip${IVW_CAT===c.v?' active':''}" onclick="setIvwCat('${c.v}')">${c.l}</div>`
  ).join('');
}
function setIvwCat(v){IVW_CAT=v;renderIvwCats();renderIvwList();}
function diffLabel(d){const k={basic:'basic',mid:'mid',adv:'adv'};return `<span class="diff-badge diff-${d}">${t(k[d]||d)}</span>`;}
function renderIvwList(){
  const qs=IVW_Q.filter(q=>IVW_CAT==='all'||q.cat===IVW_CAT);
  document.getElementById('ivw-q-list').innerHTML=qs.map((q,i)=>`
    <div class="ivw-q-card">
      ${diffLabel(q.diff)}
      <h3>${q.q[LANG]}</h3>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="toggleAns(${i},'ans_${i}')">${t('show_ans')}</button>
      <div class="ans-box" id="ans_${i}">${q.a[LANG]}</div>
    </div>`).join('');
}
function toggleAns(i,id){
  const el=document.getElementById(id);
  el.style.display=el.style.display==='block'?'none':'block';
}
function initMock(){
  MOCK_Q=[...IVW_Q].sort(()=>Math.random()-.5);
  MOCK_IDX=0;MOCK_SHOWN=false;
}
function shuffleMock(){initMock();renderMock();}
function renderMock(){
  const q=MOCK_Q[MOCK_IDX%MOCK_Q.length];
  document.getElementById('mock-q-text').textContent=q.q[LANG];
  document.getElementById('mock-ans-text').textContent=q.a[LANG];
  document.getElementById('mock-ans-wrap').style.display='none';
  MOCK_SHOWN=false;
  document.getElementById('mock-show-btn').textContent=t('show_ans');
  document.getElementById('mock-next-btn').textContent=t('next_ivw');
  document.getElementById('mock-shuf-btn').textContent=t('shuffle');
}
function toggleMockAns(){
  MOCK_SHOWN=!MOCK_SHOWN;
  document.getElementById('mock-ans-wrap').style.display=MOCK_SHOWN?'block':'none';
  document.getElementById('mock-show-btn').textContent=MOCK_SHOWN?'🙈 Ocultar':t('show_ans');
}
function nextMockQ(){MOCK_IDX++;renderMock();}

// ===== DASHBOARD =====
function renderDashStatic(){
  document.getElementById('prog-title').textContent=t('prog_title');
  document.getElementById('prog-sub').textContent=t('prog_sub');
  document.getElementById('mod-status-title').textContent=t('mod_status');
}
function renderDash(){
  renderDashStatic();
  const totalXP=Object.values(XP).reduce((a,b)=>a+b,0);
  const done=Object.values(QUIZ_STATE).filter(s=>s&&s.done&&(s.score||0)>=70).length;
  const scores=Object.values(QUIZ_STATE).filter(s=>s&&s.done).map(s=>s.score||0);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const stats=[
    {v:done,l:t('stat_done')},{v:MODS.length,l:t('stat_tot')},
    {v:totalXP,l:t('stat_xp')},{v:avg+'%',l:t('stat_avg')},{v:streak,l:t('stat_str')+'🔥'}
  ];
  document.getElementById('stats-grid').innerHTML=stats.map(s=>
    `<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`
  ).join('');
  document.getElementById('mod-status-list').innerHTML=MODS.map(m=>{
    const xp=XP[m.id]||0;
    const s=QUIZ_STATE[m.id];
    const status=s&&s.done?`Quiz: ${s.score}%`:xp>0?t('in_prog')+Math.min(100,Math.round(xp/120*100))+'%':t('not_started');
    return `<div class="ms-item">
      <div class="ms-icon">${m.icon}</div>
      <div class="ms-info"><h4>${m.title[LANG]}</h4><p>${status}</p></div>
      <div class="ms-xp">${xp>0?xp+' XP':''}</div>
    </div>`;
  }).join('');
}

// ===== XP =====
function addXP(id,amount){
  XP[id]=(XP[id]||0)+amount;
  updateStreak();
}

// ===== INIT =====
streak=1;
renderAll();
</script>
