<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PM Knowledge Hub AI — Your Technical Project Management learning companion">
  <title>PM Knowledge Hub AI</title>
<style>
/* === core/css/variables.css === */
/* ── CSS Custom Properties — PM Knowledge Hub AI ─────────────────────────── */
:root {
  /* ── Accent — blush pink ── */
  --primary:      #C47D95;
  --primary-bg:   rgba(196, 125, 149, 0.10);
  --primary-hover:rgba(196, 125, 149, 0.16);

  /* ── Semantic ── */
  --success:      #4caf82;
  --warning:      #e8a045;
  --danger:       #e07070;

  /* ── Light theme (default) ── */
  --bg-base:      #F9F7F5;
  --bg-card:      #FFFFFF;
  --bg-el:        #F0EBF0;
  --bg-hover:     rgba(196, 125, 149, 0.07);
  --bg-input:     #FFFFFF;
  --border:       #EAE5EA;
  --border-focus: rgba(196, 125, 149, 0.40);
  --text:         #18181F;
  --text-muted:   #64748B;
  --text-faint:   #B8B0BC;

  /* ── Shadows ── */
  --shadow-sm:    0 1px 4px rgba(0, 0, 0, 0.06);
  --shadow:       0 4px 20px rgba(0, 0, 0, 0.07);
  --shadow-lg:    0 8px 36px rgba(0, 0, 0, 0.10);

  /* ── Layout ── */
  --topnav-h:     54px;
  --mobile-nav-h: 64px;

  /* ── Shape ── */
  --radius-xs:  6px;
  --radius-sm:  10px;
  --radius:     14px;
  --radius-lg:  20px;

  /* ── Motion ── */
  --transition:   0.18s ease;
  --transition-fast: 0.12s ease;

  /* ── Font ── */
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

[data-theme="dark"] {
  --primary:      #C47D95;
  --primary-bg:   rgba(196, 125, 149, 0.12);
  --primary-hover:rgba(196, 125, 149, 0.20);
  --bg-base:      #111118;
  --bg-card:      #1C1C26;
  --bg-el:        #262630;
  --bg-hover:     rgba(196, 125, 149, 0.07);
  --bg-input:     #1C1C26;
  --border:       #2E2E3E;
  --border-focus: rgba(196, 125, 149, 0.40);
  --text:         #E8E6F0;
  --text-muted:   #9A96AA;
  --text-faint:   #504C60;
  --shadow-sm:    0 1px 4px rgba(0, 0, 0, 0.25);
  --shadow:       0 4px 20px rgba(0, 0, 0, 0.35);
  --shadow-lg:    0 8px 36px rgba(0, 0, 0, 0.50);
}


/* === core/css/base.css === */
/* ── Reset & Base ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }

button {
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  -webkit-appearance: none;
  appearance: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}

img, svg { display: block; }

::selection {
  background: rgba(196, 125, 149, 0.18);
  color: var(--text);
}

:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

/* ── Scrollbar ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
  transition: background var(--transition);
}
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }


/* === core/css/layout.css === */
/* ── App Shell ───────────────────────────────────────────────────────────── */
#app-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Top Navigation (desktop) ────────────────────────────────────────────── */
#topnav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--topnav-h);
  background: rgba(249, 247, 245, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 8px;
}

[data-theme="dark"] #topnav {
  background: rgba(17, 17, 24, 0.92);
}

.topnav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
  margin-right: auto;
  flex-shrink: 0;
}

.topnav-logo {
  width: 30px;
  height: 30px;
  background: var(--primary);
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85rem;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.topnav-title {
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: -0.02em;
  color: var(--text);
}

.topnav-links {
  display: flex;
  align-items: center;
  gap: 2px;
}

.topnav-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-xs);
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
}

.topnav-link:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.topnav-link.active {
  background: var(--primary-bg);
  color: var(--primary);
  font-weight: 600;
}

.topnav-link .icon {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}

.topnav-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 12px;
}

.topnav-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  text-decoration: none;
  transition: background var(--transition), color var(--transition);
}

.topnav-icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

/* ── Main Content ────────────────────────────────────────────────────────── */
#main-content {
  flex: 1;
  padding: 24px 24px 40px;
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}

/* ── Mobile Bottom Nav ───────────────────────────────────────────────────── */
#mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--mobile-nav-h);
  background: rgba(249, 247, 245, 0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom);
}

[data-theme="dark"] #mobile-nav {
  background: rgba(17, 17, 24, 0.96);
}

/* ── Mobile top strip ────────────────────────────────────────────────────── */
#mobile-topstrip {
  display: none;
  position: sticky;
  top: 0;
  z-index: 100;
  height: 50px;
  background: rgba(249, 247, 245, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
}

[data-theme="dark"] #mobile-topstrip {
  background: rgba(17, 17, 24, 0.92);
}

.mobile-topstrip-title {
  font-weight: 700;
  font-size: 0.925rem;
  letter-spacing: -0.015em;
  color: var(--text);
}

.mobile-topstrip-actions {
  display: flex;
  gap: 4px;
}

/* ── Overlays ────────────────────────────────────────────────────────────── */
#onboarding-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  z-index: 200;
  overflow-y: auto;
}

#onboarding-overlay.hidden { display: none; }

#toast-container {
  position: fixed;
  bottom: 80px;
  right: 20px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 340px;
}

#modal-container {
  position: fixed;
  inset: 0;
  z-index: 400;
  pointer-events: none;
}

#modal-container:not(:empty) { pointer-events: all; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  #topnav          { display: none; }
  #mobile-nav      { display: flex; align-items: center; justify-content: space-around; }
  #mobile-topstrip { display: flex; }
  #main-content    { padding: 16px 16px 100px; }
  #toast-container { bottom: 88px; right: 12px; left: 12px; max-width: none; }
}

@media (min-width: 768px) {
  #mobile-topstrip { display: none; }
}


/* === core/css/components.css === */
/* ── Mobile Nav Links ────────────────────────────────────────────────────── */
.mob-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  flex: 1;
  padding: 6px 0;
  color: var(--text-faint);
  text-decoration: none;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: color var(--transition);
  border-radius: var(--radius-xs);
}
.mob-link:hover  { color: var(--text-muted); }
.mob-link.active { color: var(--primary); }
.mob-link .icon  { width: 22px; height: 22px; }
.mob-link-label  {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* ── Loading Screen ──────────────────────────────────────────────────────── */
#loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-base);
  z-index: 9999;
  gap: 14px;
}
.loading-logo {
  width: 52px;
  height: 52px;
  background: var(--primary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: #fff;
  animation: pulse 1.6s ease-in-out infinite;
}
.loading-text {
  font-size: 0.82rem;
  color: var(--text-faint);
  letter-spacing: 0.01em;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(0.96); }
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  font-size: 0.84rem;
  color: var(--text);
  animation: toastIn 0.22s ease;
  transition: opacity 0.3s;
}
.toast-success { border-left: 3px solid var(--success); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.2s ease;
  backdrop-filter: blur(4px);
}
.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 440px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.22s ease;
}
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { transform: translateY(14px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ── Unified Button System ───────────────────────────────────────────────── */
/* Primary button */
.btn-primary:hover:not(:disabled) {
  opacity: 0.88;
  transform: translateY(-1px);
}
.btn-primary:active:not(:disabled) { transform: translateY(0); opacity: 0.95; }
.btn-primary:disabled { background: var(--bg-el); color: var(--text-muted); cursor: default; }

/* Secondary button */
.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-1px);
}
.btn-secondary:active { transform: translateY(0); }

/* Ghost / text button */
.btn-ghost:hover { color: var(--text); background: var(--bg-hover); }

/* ── Progress Bar ────────────────────────────────────────────────────────── */
.progress-track {
  height: 5px;
  background: var(--bg-el);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ── Badge / Tag ─────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── Icon base ───────────────────────────────────────────────────────────── */
.icon {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  flex-shrink: 0;
}

/* ── Utilities ───────────────────────────────────────────────────────────── */
.hidden  { display: none !important; }


/* === modules/m1-dashboard/styles.css === */
/* ── Today Screen ────────────────────────────────────────────────────────── */

.today-screen {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Topbar ──────────────────────────────────────────────────────────────── */
.today-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.today-topbar-title {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-faint);
}

/* Streak: warm neutral — no orange gradient */
.today-streak-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: var(--bg-el);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-muted);
}

/* ── Welcome ─────────────────────────────────────────────────────────────── */
.today-welcome {
  margin-bottom: 32px;
}

.today-welcome h1 {
  font-size: clamp(1.6rem, 5.5vw, 2rem);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.12;
  color: var(--text);
  margin-bottom: 8px;
}

.today-welcome p {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.55;
}

/* ── Continue Learning card (primary CTA) ────────────────────────────────── */
.today-continue-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px 24px;
  cursor: pointer;
  transition:
    transform var(--transition),
    box-shadow var(--transition),
    border-color var(--transition);
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 32px;
  text-decoration: none;
  color: inherit;
  width: 100%;
  text-align: left;
  box-shadow: var(--shadow-sm);
}

.today-continue-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.today-continue-icon {
  font-size: 1.75rem;
  background: var(--primary-bg);
  border-radius: var(--radius-sm);
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.today-continue-body { flex: 1; min-width: 0; }

.today-continue-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 5px;
}

.today-continue-title {
  font-size: 0.975rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}

.today-continue-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.45;
}

.today-continue-arrow {
  color: var(--text-faint);
  flex-shrink: 0;
  transition: transform var(--transition), color var(--transition);
}
.today-continue-card:hover .today-continue-arrow {
  transform: translateX(3px);
  color: var(--primary);
}
.today-continue-arrow .icon { width: 18px; height: 18px; }

/* ── Section header ──────────────────────────────────────────────────────── */

/* ── Tip card ────────────────────────────────────────────────────────────── */
.today-tip-card {
  background: rgba(196, 125, 149, 0.04);
  border: 1px solid rgba(196, 125, 149, 0.14);
  border-left: 3px solid var(--primary);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 20px 22px;
}

.today-tip-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.today-tip-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--primary);
}

.today-tip-refresh {
  color: var(--text-faint);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  border-radius: var(--radius-xs);
  transition: color var(--transition), background var(--transition);
}
.today-tip-refresh:hover {
  color: var(--text-muted);
  background: var(--bg-hover);
}
.today-tip-refresh .icon { width: 13px; height: 13px; }

.today-tip-text {
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--text-muted);
  margin: 0;
  font-style: italic;
}

/* ── Placeholder screens ─────────────────────────────────────────────────── */
.placeholder-screen {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 24px 80px;
}



.placeholder-screen h2 {
  font-size: clamp(1.45rem, 4vw, 1.75rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 10px;
  color: var(--text);
  line-height: 1.15;
}

.placeholder-screen > .placeholder-hero > p {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.placeholder-features {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.placeholder-feature-item:hover {
  border-color: var(--primary);
  transform: translateX(3px);
}
.placeholder-feature-item .icon {
  width: 16px;
  height: 16px;
  color: var(--primary);
  flex-shrink: 0;
}

/* ── Settings ────────────────────────────────────────────────────────────── */

.settings-page h1 {
  font-size: clamp(1.45rem, 4vw, 1.75rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  color: var(--text);
}



.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: var(--bg-hover); }



/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .today-screen,
  .placeholder-screen,
  
  .today-welcome h1 { font-size: 1.65rem; }
  .today-continue-card { padding: 18px 20px; }
}

/* ── Browse Learning Tracks (secondary CTA) ──────────────────────────────── */
.today-browse-btn:hover {
  border-color: var(--primary); color: var(--primary);
  background: var(--primary-bg);
}

/* ── Today intent heading ────────────────────────────────────────────────── */
.today-intent-heading {
  font-size: 0.875rem; color: var(--text-muted); margin-top: 4px; font-weight: 500;
}

/* ── Mode grid ───────────────────────────────────────────────────────────── */
.today-mode-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; margin-bottom: 20px;
}
.today-mode-card {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); cursor: pointer; text-align: left;
  font-size: 0.84rem; font-weight: 600; transition: all var(--transition); box-shadow: var(--shadow-sm);
  min-height: 52px;
}
.today-mode-card:hover {
  border-color: var(--primary); background: var(--primary-bg); color: var(--primary);
  transform: translateY(-1px); box-shadow: var(--shadow);
}
.today-mode-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
.today-mode-label { line-height: 1.3; }

@media (max-width: 400px) {
  .today-mode-grid { grid-template-columns: 1fr; }
}

/* ── Mini skills card (Today screen) ── */
.today-skills-card {
  margin: 0 20px 16px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.today-rec-card {
  display: block;
  width: 100%;
  margin-top: 14px;
  padding: 12px 14px;
  background: var(--primary-bg);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius-xs);
  text-align: left;
  cursor: pointer;
  transition: opacity 0.15s;
}
.today-rec-card:hover { opacity: 0.85; }
.today-rec-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--primary);
  margin-bottom: 3px;
}
.today-rec-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.today-rec-reason {
  font-size: 0.76rem;
  color: var(--text-muted);
}


/* === modules/m2-learning/styles.css === */
/* ── M2 Learning Module ──────────────────────────────────────────────────── */

.learn-screen {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Learn header ────────────────────────────────────────────────────────── */
.learn-header {
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.learn-eyebrow {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
}
.learn-header h1 {
  font-size: clamp(1.45rem, 4.5vw, 1.75rem); font-weight: 800;
  letter-spacing: -0.03em; color: var(--text); margin-bottom: 6px; line-height: 1.12;
}
.learn-header p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.55; }

/* ── Track grid ──────────────────────────────────────────────────────────── */
.track-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 540px) { .track-grid { grid-template-columns: 1fr 1fr; } }

/* ── Track card ──────────────────────────────────────────────────────────── */
.track-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; cursor: pointer;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  display: flex; flex-direction: column; gap: 14px;
  text-align: left; width: 100%; color: inherit; box-shadow: var(--shadow-sm);
}
.track-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
.track-card.coming-soon { opacity: 0.55; cursor: default; }
.track-card.coming-soon:hover { transform: none; border-color: var(--border); box-shadow: var(--shadow-sm); }
.track-card.in-progress { border-left: 3px solid var(--primary); border-radius: 0 var(--radius) var(--radius) 0; }

.track-card-top { display: flex; align-items: flex-start; gap: 14px; }
.track-icon {
  font-size: 1.35rem; background: var(--primary-bg); border-radius: var(--radius-xs);
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.track-meta { flex: 1; min-width: 0; }
.track-title { font-size: 0.875rem; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
.track-desc  { font-size: 0.775rem; color: var(--text-muted); line-height: 1.5; }
.track-level-badge {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 99px; background: var(--bg-el); font-size: 0.67rem;
  font-weight: 700; color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px;
}
.track-progress-row { display: flex; align-items: center; gap: 10px; }
.track-progress-bar { flex: 1; height: 5px; background: var(--bg-el); border-radius: 99px; overflow: hidden; }
.track-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }
.track-progress-text { font-size: 0.7rem; color: var(--text-faint); white-space: nowrap; font-weight: 600; }

/* ── Back link ───────────────────────────────────────────────────────────── */
.learn-back {
  display: inline-flex; align-items: center; gap: 5px; font-size: 0.82rem;
  font-weight: 600; color: var(--text-muted); cursor: pointer; padding: 0;
  margin-bottom: 24px; text-decoration: none; transition: color var(--transition);
}
.learn-back:hover { color: var(--primary); }
.learn-back .icon { width: 13px; height: 13px; }

/* ── Track view header ───────────────────────────────────────────────────── */
.track-view-header {
  display: flex; align-items: flex-start; gap: 18px;
  padding-bottom: 22px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.track-view-icon {
  font-size: 1.5rem; background: var(--primary-bg); border-radius: var(--radius-sm);
  width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.track-view-title { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.025em; color: var(--text); margin-bottom: 4px; }
.track-view-stats { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
.track-view-progress { height: 5px; background: var(--bg-el); border-radius: 99px; overflow: hidden; }
.track-view-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }

/* ── Experience list ─────────────────────────────────────────────────────── */
.exp-list { display: flex; flex-direction: column; gap: 8px; }

.exp-item {
  display: flex; align-items: center; gap: 14px; padding: 16px 18px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  text-align: left; width: 100%; color: var(--text); box-shadow: var(--shadow-sm);
}
.exp-item:hover { border-color: var(--primary); transform: translateX(3px); box-shadow: var(--shadow); }
.exp-item.coming-soon { opacity: 0.5; cursor: default; }
.exp-item.coming-soon:hover { transform: none; border-color: var(--border); box-shadow: var(--shadow-sm); }
.exp-item.completed { background: var(--bg-card); }

.exp-status-circle {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.exp-status-circle.done { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
.exp-status-circle.done .icon { width: 12px; height: 12px; color: #fff; }
.exp-status-circle.locked { background: var(--bg-el); border-color: var(--border); }
.exp-status-circle.locked .icon { width: 11px; height: 11px; color: var(--text-faint); }

.exp-item-meta { flex: 1; min-width: 0; }
.exp-item-title { font-size: 0.9rem; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 2px; }
.exp-item.completed .exp-item-title { color: var(--text-muted); }
.exp-item-objective { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }
.exp-item-duration { font-size: 0.7rem; color: var(--text-faint); font-weight: 600; margin-top: 3px; }

.exp-item-arrow .icon { width: 14px; height: 14px; color: var(--text-faint); }
.exp-item:hover .exp-item-arrow .icon { color: var(--primary); }

/* ══════════════════════════════════════════════════════════════════════════
   EXPERIENCE VIEW — Phase engine
══════════════════════════════════════════════════════════════════════════ */

.exp-view { animation: fadeSlideIn 0.25s ease; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── Phase progress bar ──────────────────────────────────────────────────── */
.phase-progress {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 28px; padding: 16px 0 0;
}
.phase-step {
  display: flex; align-items: center; gap: 0; flex: 1;
}
.phase-step-circle {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 0.7rem; font-weight: 700; color: var(--text-faint);
  background: var(--bg-card); transition: all 0.3s ease; position: relative; z-index: 1;
}
.phase-step-circle.active {
  border-color: var(--primary); background: var(--primary); color: #fff;
  box-shadow: 0 0 0 4px var(--primary-bg);
}
.phase-step-circle.done {
  border-color: var(--primary); background: var(--primary); color: #fff;
}
.phase-step-line {
  flex: 1; height: 2px; background: var(--border); margin: 0 -1px;
  transition: background 0.3s ease;
}
.phase-step-line.done { background: var(--primary); }
.phase-step:last-child .phase-step-line { display: none; }
.phase-label-row {
  display: flex; justify-content: space-between; margin-top: 6px; margin-bottom: 20px;
}
.phase-label {
  font-size: 0.63rem; font-weight: 600; color: var(--text-faint);
  letter-spacing: 0.05em; text-transform: uppercase; text-align: center;
  flex: 1; transition: color 0.2s;
}
.phase-label.active { color: var(--primary); }
.phase-label.done   { color: var(--success); }

/* ── Reading phase ───────────────────────────────────────────────────────── */

/* ── Phase continue button ───────────────────────────────────────────────── */
.phase-continue-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 15px 24px; margin-top: 32px;
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: opacity var(--transition), transform var(--transition);
  min-height: 50px; letter-spacing: 0.01em;
}
.phase-continue-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.phase-continue-btn .icon { width: 16px; height: 16px; }

/* ── Classify phase ──────────────────────────────────────────────────────── */
.classify-header { margin-bottom: 24px; }
.classify-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.025em; color: var(--text); margin-bottom: 6px; }
.classify-instruction { font-size: 0.875rem; color: var(--text-muted); line-height: 1.55; }

.classify-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.classify-progress-bar { flex: 1; height: 4px; background: var(--bg-el); border-radius: 99px; overflow: hidden; }
.classify-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }
.classify-progress-text { font-size: 0.72rem; color: var(--text-faint); font-weight: 600; white-space: nowrap; }

.classify-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 28px 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
  transition: transform 0.25s ease, opacity 0.25s ease;
  min-height: 120px; display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
}
.classify-card
.classify-card
.classify-card-label {
  font-size: 0.63rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 10px;
}
.classify-card-text { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.5; }

.classify-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.classify-option-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  padding: 18px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem;
  font-weight: 700; transition: all var(--transition); min-height: 72px;
}
.classify-option-btn .opt-icon { font-size: 1.4rem; line-height: 1; }
.classify-option-btn:hover { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); transform: translateY(-2px); }
.classify-option-btn:disabled { cursor: default; transform: none; }
.classify-option-btn.selected-correct {
  border-color: var(--success); background: rgba(76,175,130,0.10); color: var(--success);
  animation: correctPop 0.3s ease;
}
.classify-option-btn.selected-wrong {
  border-color: var(--danger); background: rgba(224,112,112,0.10); color: var(--danger);
  animation: wrongShake 0.35s ease;
}
.classify-option-btn.other-correct {
  border-color: var(--success); background: rgba(76,175,130,0.06); color: var(--success);
}

@keyframes correctPop  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
@keyframes wrongShake  { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.classify-feedback {
  background: var(--bg-el); border-radius: var(--radius-sm);
  padding: 14px 16px; margin-top: 4px; margin-bottom: 16px;
  font-size: 0.875rem; line-height: 1.65; color: var(--text-muted);
  animation: fadeSlideIn 0.2s ease;
}
.classify-feedback .feedback-verdict {
  font-weight: 700; margin-bottom: 4px; font-size: 0.875rem;
}
.classify-feedback.correct .feedback-verdict { color: var(--success); }
.classify-feedback.wrong   .feedback-verdict { color: var(--danger); }

.classify-results {
  text-align: center; padding: 24px 0 8px;
  animation: fadeSlideIn 0.3s ease;
}
.classify-results-score {
  font-size: 3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 6px;
}
.classify-results-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }
.classify-results-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.classify-result-chip {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  border-radius: 99px; font-size: 0.75rem; font-weight: 700;
}
.classify-result-chip.ok   { background: rgba(76,175,130,0.12); color: var(--success); }
.classify-result-chip.fail { background: rgba(224,112,112,0.12); color: var(--danger); }

/* ── Quiz phase ──────────────────────────────────────────────────────────── */
.quiz-header { margin-bottom: 20px; }
.quiz-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); margin-bottom: 6px; }
.quiz-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.quiz-progress-bar { flex: 1; height: 4px; background: var(--bg-el); border-radius: 99px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }
.quiz-progress-text { font-size: 0.72rem; color: var(--text-faint); font-weight: 600; white-space: nowrap; }

.quiz-question-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
  animation: fadeSlideIn 0.22s ease;
}
.quiz-question-text {
  font-size: 0.9375rem; font-weight: 700; color: var(--text); line-height: 1.55;
}

.quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.quiz-option-btn {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text); cursor: pointer;
  text-align: left; width: 100%; font-size: 0.875rem; line-height: 1.45;
  transition: all var(--transition); box-shadow: var(--shadow-sm);
}
.quiz-option-btn .opt-letter {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-el); color: var(--text-muted); font-size: 0.72rem;
  font-weight: 700; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-top: 1px;
}
.quiz-option-btn .opt-text { flex: 1; }
.quiz-option-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-bg); }
.quiz-option-btn:hover:not(:disabled) .opt-letter { background: var(--primary); color: #fff; }
.quiz-option-btn:disabled { cursor: default; }

.quiz-option-btn.revealed-correct {
  border-color: var(--success); background: rgba(76,175,130,0.08); color: var(--text);
  animation: correctPop 0.3s ease;
}
.quiz-option-btn.revealed-correct .opt-letter { background: var(--success); color: #fff; }

.quiz-option-btn.selected-wrong {
  border-color: var(--danger); background: rgba(224,112,112,0.08); color: var(--text);
  animation: wrongShake 0.35s ease;
}
.quiz-option-btn.selected-wrong .opt-letter { background: var(--danger); color: #fff; }

.quiz-option-btn.neutral-after { opacity: 0.55; }

.quiz-feedback {
  background: var(--bg-el); border-radius: var(--radius-sm); padding: 14px 18px;
  font-size: 0.875rem; line-height: 1.7; color: var(--text-muted);
  animation: fadeSlideIn 0.2s ease; margin-bottom: 14px;
  border-left: 3px solid var(--primary);
}
.quiz-feedback.correct-feedback { border-left-color: var(--success); }
.quiz-feedback.wrong-feedback   { border-left-color: var(--danger); }

.quiz-next-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px 24px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: opacity var(--transition), transform var(--transition);
  min-height: 48px; animation: fadeSlideIn 0.2s ease;
}
.quiz-next-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.quiz-next-btn .icon { width: 15px; height: 15px; }

.quiz-results { text-align: center; padding: 16px 0 8px; animation: fadeSlideIn 0.3s ease; }
.quiz-results-score { font-size: 3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; line-height: 1; margin-bottom: 6px; }
.quiz-results-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 4px; }
.quiz-results-sub { font-size: 0.8rem; color: var(--text-faint); margin-bottom: 20px; }

/* ── Key Takeaway phase ──────────────────────────────────────────────────── */
.keytakeaway-screen {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 16px; animation: fadeSlideIn 0.3s ease;
}
.keytakeaway-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--primary-bg); color: var(--primary);
  padding: 4px 14px; border-radius: 99px;
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 20px;
}
.keytakeaway-card {
  background: rgba(196, 125, 149, 0.06); border: 1px solid rgba(196, 125, 149, 0.18);
  border-left: 4px solid var(--primary); border-radius: 0 var(--radius) var(--radius) 0;
  padding: 28px 28px; margin-bottom: 32px; width: 100%;
}
.keytakeaway-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 12px;
}
.keytakeaway-text {
  font-size: 1.1rem; line-height: 1.65; color: var(--text);
  font-style: italic; font-weight: 600; letter-spacing: -0.01em;
}
.xp-award {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  margin-bottom: 24px; animation: xpPop 0.5s ease 0.2s both;
}
.xp-award-number {
  font-size: 2.5rem; font-weight: 800; color: var(--primary);
  letter-spacing: -0.04em; line-height: 1;
}
.xp-award-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
@keyframes xpPop { 0% { opacity: 0; transform: scale(0.7); } 60% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }

.complete-exp-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px 24px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: opacity var(--transition), transform var(--transition); min-height: 52px;
}
.complete-exp-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.complete-exp-btn .icon { width: 17px; height: 17px; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .learn-screen { padding: 0 18px 104px; }
  .track-grid { grid-template-columns: 1fr; }
  .classify-options { grid-template-columns: 1fr 1fr; }
  .quiz-option-btn { font-size: 0.84rem; }
  .keytakeaway-text { font-size: 1rem; }
  
}

/* ══════════════════════════════════════════════════════════════════════════
   ENGAGEMENT REFINEMENTS — mentor voice, card reading, completion
══════════════════════════════════════════════════════════════════════════ */

/* ── Phase progress block ────────────────────────────────────────────────── */
.phase-progress-block {
  background: var(--bg-card); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 14px 16px 0;
  margin-bottom: 24px; box-shadow: var(--shadow-sm);
}

/* ── Mentor voice ────────────────────────────────────────────────────────── */
.mentor-voice {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--primary-bg); border: 1px solid rgba(196,125,149,0.15);
  border-radius: var(--radius-sm); padding: 12px 14px;
  margin-bottom: 20px; animation: fadeSlideIn 0.25s ease;
}
.mentor-avatar {
  font-size: 1.05rem; flex-shrink: 0; line-height: 1.4;
  margin-top: 1px;
}
.mentor-text {
  font-size: 0.83rem; line-height: 1.65; color: var(--text-muted);
  font-style: italic; margin: 0;
}

/* ── Reading card carousel ───────────────────────────────────────────────── */
.reading-card-nav-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.reading-mini-progress {
  flex: 1; height: 3px; background: var(--bg-el); border-radius: 99px; overflow: hidden;
}
.reading-mini-fill {
  height: 100%; background: var(--primary); border-radius: 99px;
  transition: width 0.35s ease;
}
.reading-card-counter {
  font-size: 0.7rem; color: var(--text-faint); font-weight: 600; white-space: nowrap;
}

.reading-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 24px;
  box-shadow: var(--shadow); margin-bottom: 20px;
  animation: fadeSlideIn 0.22s ease;
  min-height: 180px;
}
.reading-card-heading {
  font-size: 1.05rem; font-weight: 800; color: var(--text);
  letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1.3;
}
.reading-card-body {
  font-size: 0.9375rem; line-height: 1.85; color: var(--text-muted);
}
.reading-card-body strong { color: var(--text); font-weight: 700; }
.reading-card-body em     { color: var(--primary); font-style: normal; font-weight: 600; }

.reading-nav {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.reading-prev-btn {
  padding: 11px 18px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--text-muted); font-size: 0.84rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.reading-prev-btn:hover { border-color: var(--primary); color: var(--primary); }

.reading-next-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 22px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 700;
  cursor: pointer; transition: opacity var(--transition), transform var(--transition);
}
.reading-next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.reading-continue-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 22px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: opacity var(--transition), transform var(--transition);
  flex: 1;
}
.reading-continue-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.reading-continue-btn .icon { width: 16px; height: 16px; }

/* ── Completion screen ───────────────────────────────────────────────────── */
.completion-screen {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 16px 24px; text-align: center;
  animation: fadeSlideIn 0.35s ease;
}
.completion-burst {
  font-size: 3.5rem; margin-bottom: 16px; line-height: 1;
  animation: xpPop 0.5s ease both;
}
.completion-title {
  font-size: 1.75rem; font-weight: 800; letter-spacing: -0.035em;
  color: var(--text); margin-bottom: 6px; line-height: 1.1;
}
.completion-exp-name {
  font-size: 0.875rem; color: var(--text-muted); margin-bottom: 28px;
  font-weight: 500;
}
.completion-stats {
  display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; width: 100%;
}
.completion-stat {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px 24px; flex: 1; max-width: 140px;
  box-shadow: var(--shadow-sm);
}
.completion-stat-val {
  font-size: 1.85rem; font-weight: 800; color: var(--primary);
  letter-spacing: -0.04em; line-height: 1; margin-bottom: 4px;
}
.completion-stat-label {
  font-size: 0.72rem; color: var(--text-faint); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.completion-screen .mentor-voice { width: 100%; text-align: left; margin-bottom: 24px; }
.completion-screen .phase-continue-btn { width: 100%; }

/* ── Classify results mentor ─────────────────────────────────────────────── */
.classify-results .mentor-voice { margin-top: 16px; margin-bottom: 0; text-align: left; }
.classify-results .phase-continue-btn { margin-top: 16px; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .reading-card { padding: 22px 18px; min-height: 160px; }
  .reading-card-body { font-size: 0.9rem; }
  .completion-burst { font-size: 2.8rem; }
  .completion-title { font-size: 1.45rem; }
  .completion-stats { gap: 10px; }
  .completion-stat { padding: 14px 16px; }
  .completion-stat-val { font-size: 1.5rem; }
}

/* ── Experience status labels ─────────────────────────────────────────────── */
.exp-status-label {
  display: inline-flex; align-items: center;
  padding: 1px 7px; border-radius: 99px;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; margin-left: 7px; vertical-align: middle;
}
.review-label {
  background: var(--primary-bg); color: var(--primary);
  border: 1px solid rgba(196,125,149,0.2);
}
.coming-soon-label {
  background: var(--bg-el); color: var(--text-faint);
  border: 1px solid var(--border);
}
/* Completed exp-item: keep arrow visible to signal re-enterable */
.exp-item.completed .exp-item-arrow .icon { color: var(--primary); opacity: 0.5; }
.exp-item.completed:hover .exp-item-arrow .icon { opacity: 1; }

/* ── Learn Home ───────────────────────────────────────────────────────────── */
.learn-header {
  padding: 0 0 20px;
}
.learn-eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
}
.learn-header h1 {
  margin: 0 0 4px; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em;
  color: var(--text);
}
.learn-header p {
  margin: 0; font-size: 0.9rem; color: var(--text-muted);
}


.learn-home-card:hover:not(:disabled) {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg);
  transform: translateY(-1px);
}
.learn-home-card.primary {
  grid-column: 1 / -1;
  background: var(--primary-bg); border-color: rgba(196,125,149,0.35);
}
.learn-home-card.locked { opacity: 0.5; cursor: not-allowed; }
.learn-home-card.locked:hover { transform: none; box-shadow: none; border-color: var(--border); }


/* ── Coming soon placeholder ─────────────────────────────────────────────── */

@media (max-width: 767px) {
  
  .learn-home-card.primary { grid-column: unset; }
}

/* ── Explain Simply ────────────────────────────────────────────────────── */
.explain-simply-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 14px;
  padding: 7px 14px;
  background: var(--primary-bg);
  border: 1px solid var(--primary);
  border-radius: 99px;
  color: var(--primary);
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.explain-simply-btn:hover { background: var(--primary); color: #fff; }

.explain-simply-panel {
  margin-top: 12px;
  padding: 14px 16px;
  background: var(--primary-bg);
  border-left: 3px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
}
.explain-simply-panel[hidden] { display: none; }


/* === modules/m3-practice/styles.css === */
/* ═══════════════════════════════════════════════════════════════════════════
   M3 Practice — styles
   ═══════════════════════════════════════════════════════════════════════════ */

.practice-screen {
  padding: 16px 16px 100px;
  max-width: 680px;
  margin: 0 auto;
}

.practice-back {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--text-muted);
  font-size: 0.85rem; font-weight: 500; cursor: pointer;
  padding: 8px 0; margin-bottom: 12px;
  transition: color var(--transition);
}
.practice-back:hover { color: var(--primary); }
.practice-back .icon { width: 15px; height: 15px; }

/* ── Header ─────────────────────────────────────────────────────────────── */
.practice-header { padding: 0 0 20px; }
.practice-eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
}
.practice-header h1 {
  margin: 0 0 4px; font-size: 1.75rem; font-weight: 800;
  letter-spacing: -0.03em; color: var(--text);
}
.practice-header p {
  margin: 0; font-size: 0.9rem; color: var(--text-muted);
}

/* ── Practice Home Grid ─────────────────────────────────────────────────── */
.practice-home-grid {
  display: flex; flex-direction: column; gap: 10px;
}

.practice-home-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 16px;
  cursor: pointer; text-align: left; transition: all 0.15s;
  color: var(--text);
}
.practice-home-card:hover:not(:disabled) {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg);
  transform: translateY(-1px);
}
.practice-home-card.primary {
  background: var(--primary-bg); border-color: rgba(196,125,149,0.35);
}
.practice-home-card.locked { opacity: 0.5; cursor: not-allowed; }
.practice-home-card.locked:hover { transform: none; box-shadow: none; border-color: var(--border); }

.ph-card-left { display: flex; align-items: flex-start; gap: 14px; flex: 1; }
.ph-card-icon { font-size: 1.6rem; flex-shrink: 0; margin-top: 2px; }
.ph-card-body { flex: 1; }
.ph-card-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.ph-card-sub   { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }
.ph-card-arrow { font-size: 1.2rem; color: var(--primary); padding-left: 8px; }

.ph-progress-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.ph-progress-bar {
  flex: 1; height: 4px; background: rgba(196,125,149,0.15);
  border-radius: 99px; overflow: hidden;
}
.ph-progress-fill {
  height: 100%; background: var(--primary); border-radius: 99px;
  transition: width 0.4s ease;
}
.ph-progress-text { font-size: 0.72rem; color: var(--text-faint); white-space: nowrap; }


/* ── Challenge List ─────────────────────────────────────────────────────── */
.ch-list { display: flex; flex-direction: column; gap: 8px; }

.ch-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text);
}
.ch-item:hover { border-color: var(--primary); background: var(--primary-bg); }

.ch-status {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-el); border: 1.5px solid var(--border);
  flex-shrink: 0;
  font-size: 0.7rem; color: var(--text-faint); font-weight: 700;
}
.ch-status.done {
  background: var(--primary-bg); border-color: var(--primary); color: var(--primary);
}
.ch-status.done .icon { width: 13px; height: 13px; }

.ch-item-meta { flex: 1; }
.ch-item-title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.ch-item-tags  { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }

.ch-difficulty {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 99px;
}
.diff-intermediate { background: rgba(92,148,200,0.12); color: #5c94c8; }
.diff-advanced     { background: rgba(196,125,149,0.15); color: var(--primary); }

.ch-tag {
  font-size: 0.62rem; color: var(--text-faint);
  background: var(--bg-el); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 99px;
}

.ch-badge {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 1px 6px; border-radius: 99px;
  margin-left: 6px; vertical-align: middle;
}
.done-badge { background: var(--primary-bg); color: var(--primary); }

.ch-item-arrow .icon { width: 16px; height: 16px; color: var(--text-faint); }
.ch-item:hover .ch-item-arrow .icon { color: var(--primary); }

/* ── Challenge View ─────────────────────────────────────────────────────── */
.ch-mini-progress-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
}
.ch-mini-bar {
  flex: 1; height: 3px; background: var(--bg-el); border-radius: 99px; overflow: hidden;
}
.ch-mini-fill { height: 100%; background: var(--primary); border-radius: 99px; }
.ch-mini-text { font-size: 0.72rem; color: var(--text-faint); white-space: nowrap; }

.ch-scenario-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
}
.ch-scenario-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
}
.ch-scenario-title {
  font-size: 1.1rem; font-weight: 800; color: var(--text);
  letter-spacing: -0.02em; margin-bottom: 12px;
}
.ch-scenario-context {
  font-size: 0.88rem; color: var(--text-muted); line-height: 1.6;
  margin: 0 0 14px;
}
.ch-scenario-question {
  font-size: 0.92rem; font-weight: 700; color: var(--text); padding-top: 12px;
  border-top: 1px solid var(--border);
}

.ch-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

.ch-option {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 15px;
  cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text);
}
.ch-option:hover:not(:disabled) {
  border-color: var(--primary); background: var(--primary-bg);
}
.ch-opt-letter {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-el); border: 1.5px solid var(--border);
  font-size: 0.65rem; font-weight: 800; color: var(--text-faint);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ch-opt-text { font-size: 0.88rem; color: var(--text); line-height: 1.45; }

.ch-option.ch-opt-correct { border-color: #22c55e; background: rgba(34,197,94,0.07); }
.ch-option.ch-opt-correct .ch-opt-letter { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #16a34a; }
.ch-option.ch-opt-wrong   { border-color: #ef4444; background: rgba(239,68,68,0.06); }
.ch-option.ch-opt-wrong .ch-opt-letter   { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #dc2626; }

.ch-feedback {
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
  font-size: 0.875rem;
}
.ch-feedback-ok   { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.25); }
.ch-feedback-fail { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.2); }
.ch-feedback-verdict {
  font-weight: 700; margin-bottom: 6px; font-size: 0.85rem;
}
.ch-feedback-ok .ch-feedback-verdict   { color: #16a34a; }
.ch-feedback-fail .ch-feedback-verdict { color: #dc2626; }
.ch-feedback-text { margin: 0; color: var(--text-muted); line-height: 1.55; }

.ch-next-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--primary); color: #fff; border: none;
  font-size: 0.9rem; font-weight: 700; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.15s;
}
.ch-next-btn:hover { opacity: 0.88; }
.ch-next-btn .icon { width: 16px; height: 16px; }

/* ── Results Screen ─────────────────────────────────────────────────────── */
.ch-results-screen {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding-top: 24px;
}
.ch-results-burst { font-size: 3rem; margin-bottom: 10px; }
.ch-results-title { margin: 0 0 4px; font-size: 1.4rem; font-weight: 800; color: var(--text); }
.ch-results-score {
  font-size: 3rem; font-weight: 900; color: var(--primary);
  letter-spacing: -0.04em; margin: 8px 0;
}
.ch-results-msg { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 24px; }

.result-row.ok      { background: rgba(34,197,94,0.07); }
.result-row.fail    { background: rgba(239,68,68,0.06); }
.result-row.skipped { background: var(--bg-el); }
.result-row.ok 
.result-row.fail 

.ch-results-actions { display: flex; flex-direction: column; gap: 8px; width: 100%; }
.ch-retry-btn {
  width: 100%; padding: 12px; border-radius: var(--radius);
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text-muted); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.ch-retry-btn:hover { border-color: var(--primary); color: var(--primary); }
.ch-home-btn {
  width: 100%; padding: 12px; border-radius: var(--radius);
  background: var(--primary); color: #fff; border: none;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.15s;
}
.ch-home-btn:hover { opacity: 0.88; }
.ch-home-btn .icon { width: 15px; height: 15px; }

/* ── Coming Soon ────────────────────────────────────────────────────────── */

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 767px) {
  .ch-scenario-card { padding: 16px; }
  .ch-results-score { font-size: 2.4rem; }
}

/* ── Project Context Block ──────────────────────────────────────────────── */
.project-ctx-block {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px;
  background: var(--bg-el); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px;
}
.ctx-row { display: flex; flex-direction: column; gap: 1px; }
.ctx-label {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--text-faint);
}
.ctx-value { font-size: 0.8rem; font-weight: 600; color: var(--text); }
.ctx-priority { color: var(--primary); }

/* ── Mentor Comment (inside challenge feedback) ─────────────────────────── */
.ch-mentor-comment {
  display: flex; align-items: flex-start; gap: 8px;
  margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.07);
}
.ch-mentor-avatar { font-size: 1rem; flex-shrink: 0; }
.ch-mentor-text   { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; font-style: italic; }

/* Neutral option after answer revealed */
.ch-option.ch-opt-neutral { opacity: 0.45; }

/* ── Skills Block ───────────────────────────────────────────────────────── */
.skills-block {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
}
.skills-heading {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px;
}
.skills-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.skill-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--primary-bg); color: var(--primary);
  border: 1px solid rgba(196,125,149,0.25);
  border-radius: 99px; padding: 4px 10px;
  font-size: 0.78rem; font-weight: 600;
}
.skill-chip-icon { width: 11px; height: 11px; flex-shrink: 0; }
.results-skills { margin: 0 0 20px; }

/* ── Interview Home ─────────────────────────────────────────────────────── */
.int-coaching-note {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--primary-bg); border: 1px solid rgba(196,125,149,0.25);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 18px;
  font-size: 0.83rem; color: var(--text-muted); line-height: 1.5;
}
.int-note-icon { flex-shrink: 0; font-size: 1rem; }

.int-cat-grid { display: flex; flex-direction: column; gap: 10px; }

.int-cat-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 16px;
  cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text);
}
.int-cat-card:hover {
  border-color: var(--primary); background: var(--primary-bg);
  transform: translateY(-1px);
}
.int-cat-icon  { font-size: 1.6rem; flex-shrink: 0; }
.int-cat-body  { flex: 1; }
.int-cat-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.int-cat-sub   { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.int-cat-count {
  font-size: 0.7rem; font-weight: 700; color: var(--primary);
  margin-top: 5px; letter-spacing: 0.04em;
}
.int-cat-arrow { font-size: 1.2rem; color: var(--primary); }

/* ── Interview Session ──────────────────────────────────────────────────── */
.int-progress-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.int-progress-bar {
  flex: 1; height: 3px; background: var(--bg-el); border-radius: 99px; overflow: hidden;
}
.int-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; }
.int-progress-text { font-size: 0.72rem; color: var(--text-faint); white-space: nowrap; }

.int-question-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
}
.int-question-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 10px;
}
.int-question-text {
  font-size: 1.05rem; font-weight: 700; color: var(--text);
  line-height: 1.5; letter-spacing: -0.01em;
}

.int-think-block {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
}
.int-think-label {
  font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.int-think-icon { font-size: 1rem; }
.int-answer-area {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--bg-el);
  color: var(--text); font-family: inherit; font-size: 0.88rem;
  line-height: 1.6; padding: 10px 12px; resize: vertical;
  outline: none; transition: border-color 0.15s; box-sizing: border-box;
}
.int-answer-area:focus { border-color: var(--primary); }
.int-think-hint {
  font-size: 0.72rem; color: var(--text-faint); margin-top: 7px;
}

.int-reveal-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--primary); color: #fff; border: none;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; transition: opacity 0.15s; margin-bottom: 16px;
}
.int-reveal-btn:hover { opacity: 0.88; }
.int-reveal-btn .icon { width: 16px; height: 16px; }

/* ── Coaching Panel ─────────────────────────────────────────────────────── */
.int-coaching-panel { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.int-coaching-panel.hidden { display: none; }

.int-model-answer,
.int-evaluator,
.int-section-label {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}
.int-section-body {
  margin: 0; font-size: 0.875rem; color: var(--text); line-height: 1.65;
}


/* ── Interview card on Practice Home (not locked) ───────────────────────── */
.practice-home-card.interview-card {
  background: var(--bg-card);
}
.practice-home-card.interview-card:hover {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg);
  transform: translateY(-1px);
}

/* ── Tip box ────────────────────────────────────────────────────────────── */

@media (max-width: 767px) {
  .project-ctx-block { grid-template-columns: 1fr; }
  .int-question-text { font-size: 0.95rem; }
}

/* ── Certification card in practice home ── */
.practice-home-card.cert-card {
  border-color: var(--border);
}
.practice-home-card.cert-card:hover {
  border-color: var(--primary);
  background: var(--primary-bg);
}

/* ── Certification home ── */
.cert-info-card {
  margin: 0 20px 16px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.cert-info-row {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  margin-bottom: 14px;
}
.cert-info-stat {
  flex: 1;
  text-align: center;
}
.cert-info-val {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--primary);
}
.cert-info-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 600;
  margin-top: 2px;
}
.cert-domains-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.cert-domains-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.cert-domain-tag {
  padding: 3px 8px;
  background: var(--bg-el);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
}
.cert-start-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: calc(100% - 40px);
  margin: 16px 20px 0;
  padding: 14px 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  justify-content: center;
  transition: opacity 0.15s;
}
.cert-start-btn:hover { opacity: 0.88; }
.cert-start-btn .icon { width: 16px; height: 16px; }

/* ── Cert question header ── */
.cert-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 8px;
}
.cert-domain-pill {
  padding: 3px 10px;
  background: var(--primary-bg);
  border: 1px solid var(--primary);
  border-radius: 99px;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--primary);
}

/* ── Cert results ── */
.cert-score-ring {
  margin: 16px auto;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 6px solid;
}
.cert-score-ring.pass { border-color: var(--success, #2e7d32); }
.cert-score-ring.fail { border-color: var(--text-muted); }
.cert-score-pct {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.cert-score-sub {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 4px;
}
.cert-domain-breakdown {
  width: 100%;
  max-width: 320px;
  margin: 12px auto 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.cert-breakdown-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-el);
}
.cert-domain-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.cert-domain-row:last-child { border-bottom: none; }
.cert-domain-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.cert-domain-score {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-muted);
}
.cert-domain-score.perfect { color: var(--success, #2e7d32); }
.cert-domain-score.zero    { color: var(--danger, #c62828); }

/* ── STAR Coaching Panel ─────────────────────────────────────────────────── */
.int-star-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; display: flex;
  flex-direction: column; gap: 14px;
}
.int-star-heading {
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--primary); margin-bottom: 2px;
}
.int-star-block { display: flex; flex-direction: column; gap: 4px; }
.int-star-label {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text-muted);
}
.int-star-text {
  font-size: 0.875rem; color: var(--text); line-height: 1.65; margin: 0;
}
.int-key-message {
  background: var(--primary-bg); border-radius: var(--radius-sm);
  padding: 12px 14px; display: flex; flex-direction: column; gap: 4px;
}
.int-key-message .int-star-label { color: var(--primary); }
.int-key-message .int-star-text  { font-weight: 500; }

/* ── Question meta (difficulty badge on interview questions) ─────────────── */
.int-question-meta { margin-top: 10px; }

/* ═══════════════════════════════════════════════════════════════════════════

}

.skills-overview-bar {

  font-weight: 600;

}
.growth-bar-track {
  height: 6px;

  border-radius: 99px;

}

  background: var(--primary);

  font-size: 0.7rem;

  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;

  border: 1px solid var(--border);
  border-radius: 99px;

/* === core/js/event-bus.js === */
/**
 * EventBus — colon-namespaced pub/sub (e.g. 'xp:earned', 'route:changed')
 * Extension: pure addition only — never remove existing event contracts.
 */
const EventBus = (() => {
  const _subs = {};
  const _onceMap = new WeakMap();

  function on(event, handler) {
    if (typeof handler !== 'function') return;
    (_subs[event] = _subs[event] || []).push(handler);
  }

  function once(event, handler) {
    const wrapper = (...args) => { off(event, wrapper); handler(...args); };
    _onceMap.set(handler, wrapper);
    on(event, wrapper);
  }

  function off(event, handler) {
    if (!_subs[event]) return;
    const target = _onceMap.has(handler) ? _onceMap.get(handler) : handler;
    _subs[event] = _subs[event].filter(h => h !== target);
  }

  function emit(event, data) {
    (_subs[event] || []).slice().forEach(h => {
      try { h(data); } catch(e) { console.error(`[EventBus] ${event}`, e); }
    });
  }

  function clear(event) {
    if (event) delete _subs[event];
    else Object.keys(_subs).forEach(k => delete _subs[k]);
  }

  return { on, once, off, emit, clear };
})();


/* === core/js/state-manager.js === */
/**
 * StateManager — reactive key-value store.
 * Subscribers called with (newValue, oldValue, key) on every set().
 * Extension: add new keys freely; never rename/remove existing keys.
 */
const StateManager = (() => {
  const _state = {};
  const _subs  = {};          // key → [fn, ...]
  const _global = [];         // subscribe to all changes

  function get(key, defaultVal) {
    return key in _state ? _state[key] : defaultVal;
  }

  function set(key, value) {
    const prev = _state[key];
    _state[key] = value;
    if (prev === value) return;
    (_subs[key] || []).slice().forEach(fn => {
      try { fn(value, prev, key); } catch(e) { console.error(`[State] ${key}`, e); }
    });
    _global.slice().forEach(fn => {
      try { fn(key, value, prev); } catch(e) { console.error('[State] global', e); }
    });
  }

  function subscribe(key, fn) {
    (_subs[key] = _subs[key] || []).push(fn);
    return () => { _subs[key] = (_subs[key] || []).filter(h => h !== fn); };
  }

  function subscribeAll(fn) {
    _global.push(fn);
    return () => { const i = _global.indexOf(fn); if (i > -1) _global.splice(i, 1); };
  }

  function getAll() { return { ..._state }; }

  return { get, set, subscribe, subscribeAll, getAll };
})();


/* === core/js/storage-manager.js === */
/**
 * StorageManager — async IndexedDB wrapper with in-memory fallback.
 * DB_VERSION=1. All 10 stores created upfront per ADR-005.
 * Stores: user_profile, xp_events, achievements, learning_progress,
 *         notes, chat_history, settings, cached_content,
 *         vectors*, relationships*   (* reserved for future modules)
 */
const StorageManager = (() => {
  const DB_NAME    = 'pm-hub-ai';
  const DB_VERSION = 1;
  const STORES = [
    'user_profile', 'xp_events', 'achievements', 'learning_progress',
    'notes', 'chat_history', 'settings', 'cached_content',
    'vectors', 'relationships'
  ];

  let _db  = null;
  let _mem = {};   // fallback when IndexedDB unavailable

  // ── Init ────────────────────────────────────────────────────────────────
  function init() {
    return new Promise((resolve) => {
      if (!window.indexedDB) { console.warn('[Storage] IndexedDB unavailable, using memory'); resolve(false); return; }
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = e => {
        const db = e.target.result;
        STORES.forEach(name => {
          if (!db.objectStoreNames.contains(name)) {
            db.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
          }
        });
      };

      req.onsuccess = e => { _db = e.target.result; resolve(true); };
      req.onerror   = e => { console.error('[Storage] Open failed', e); resolve(false); };
    });
  }

  // ── Core helpers ─────────────────────────────────────────────────────────
  function _tx(store, mode) {
    return _db.transaction(store, mode).objectStore(store);
  }

  function _wrap(req) {
    return new Promise((res, rej) => {
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  }

  // ── Public API ───────────────────────────────────────────────────────────
  async function get(store, key) {
    if (!_db) return _mem[store + '::' + key];
    return _wrap(_tx(store, 'readonly').get(key));
  }

  async function getAll(store) {
    if (!_db) {
      return Object.keys(_mem)
        .filter(k => k.startsWith(store + '::'))
        .map(k => _mem[k]);
    }
    return _wrap(_tx(store, 'readonly').getAll());
  }

  async function put(store, value) {
    if (!_db) {
      const key = value.id || Date.now();
      _mem[store + '::' + key] = { ...value, id: key };
      return key;
    }
    return _wrap(_tx(store, 'readwrite').put(value));
  }

  async function del(store, key) {
    if (!_db) { delete _mem[store + '::' + key]; return; }
    return _wrap(_tx(store, 'readwrite').delete(key));
  }

  async function clear(store) {
    if (!_db) {
      Object.keys(_mem).filter(k => k.startsWith(store + '::')).forEach(k => delete _mem[k]);
      return;
    }
    return _wrap(_tx(store, 'readwrite').clear());
  }

  async function getByKey(store, key, value) {
    const all = await getAll(store);
    return (all || []).find(r => r[key] === value) || null;
  }

  // ── Settings shortcut ────────────────────────────────────────────────────
  async function getSetting(key) {
    const row = await get('settings', key);
    return row ? row.value : null;
  }

  async function setSetting(key, value) {
    return put('settings', { id: key, value });
  }

  return { init, get, getAll, put, del, clear, getByKey, getSetting, setSetting };
})();


/* === core/js/router.js === */
/**
 * Router — hash-based SPA router.
 * Routes: /today /learning /practice /skills
 * Emits: 'route:changed' via EventBus with { path, prev }
 */
const Router = (() => {
  const _routes  = {};
  let _current   = null;
  let _container = null;
  let _active    = null;   // current module instance { destroy }

  function define(path, handler) {
    _routes[path] = handler;
  }

  function navigate(path, pushState = false) {
    const prev = _current;
    _current = path;

    // Destroy previous module
    if (_active && typeof _active.destroy === 'function') {
      try { _active.destroy(); } catch(e) { console.error('[Router] destroy', e); }
      _active = null;
    }

    // Render next
    if (_container) _container.innerHTML = '';
    const handler = _routes[path] || _routes['/dashboard'];
    if (handler) {
      _active = handler(_container) || null;
    }

    // Sync sidebar / mobile nav active state
    _syncNav(path);

    // Emit
    EventBus.emit('route:changed', { path, prev });
    StateManager.set('currentRoute', path);
  }

  function _syncNav(path) {
    document.querySelectorAll('[data-route]').forEach(el => {
      const active = el.dataset.route === path;
      el.classList.toggle('active', active);
      if (el.getAttribute('aria-current') !== undefined) {
        el.setAttribute('aria-current', active ? 'page' : 'false');
      }
    });
  }

  function init(containerEl) {
    _container = containerEl;

    window.addEventListener('hashchange', () => {
      const path = _hashToPath();
      navigate(path);
    });

    // Initial route
    navigate(_hashToPath());
  }

  function _hashToPath() {
    const hash = window.location.hash;
    return hash ? hash.replace('#', '') : '/dashboard';
  }

  function current() { return _current; }

  function go(path) {
    window.location.hash = '#' + path;
  }

  return { define, navigate, init, current, go };
})();


/* === core/js/xp-system.js === */
/**
 * XPSystem — 10-level progression engine.
 * Emits: 'xp:earned', 'xp:level-up'
 * Persists to StorageManager store: 'user_profile'
 */
const XPSystem = (() => {
  let _xp    = 0;
  let _level = 1;

  // XP thresholds per level (cumulative)
  const THRESHOLDS = [0, 100, 250, 500, 900, 1400, 2100, 3000, 4200, 6000];

  async function init() {
    const profile = await StorageManager.get('user_profile', 'main');
    if (profile) { _xp = profile.xp || 0; _level = _levelFor(_xp); }
  }

  function _levelFor(xp) {
    let lv = 1;
    for (let i = THRESHOLDS.length - 1; i >= 0; i--) {
      if (xp >= THRESHOLDS[i]) { lv = i + 1; break; }
    }
    return Math.min(lv, 10);
  }

  function _progress() {
    const cur  = THRESHOLDS[_level - 1] || 0;
    const next = THRESHOLDS[_level]     || THRESHOLDS[THRESHOLDS.length - 1];
    const pct  = _level >= 10 ? 100 : Math.round((_xp - cur) / (next - cur) * 100);
    return { current: _xp - cur, total: next - cur, pct };
  }

  async function award(amount, reason = '') {
    const prev = _level;
    _xp  += amount;
    const next = _levelFor(_xp);

    await _persist();

    EventBus.emit('xp:earned', { amount, reason, total: _xp, level: next });
    StateManager.set('xp', _xp);
    StateManager.set('xpLevel', next);

    if (next > prev) {
      _level = next;
      EventBus.emit('xp:level-up', { prev, next, xp: _xp });
    } else {
      _level = next;
    }
  }

  async function _persist() {
    const profile = (await StorageManager.get('user_profile', 'main')) || { id: 'main' };
    profile.xp    = _xp;
    profile.level = _level;
    await StorageManager.put('user_profile', profile);
  }

  function getXP()       { return _xp; }
  function getLevel()    { return _level; }
  function getProgress() { return _progress(); }
  function getThresholds() { return [...THRESHOLDS]; }

  return { init, award, getXP, getLevel, getProgress, getThresholds };
})();
