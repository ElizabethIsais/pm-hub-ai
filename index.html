  { id: 'cq-21', domain: 'Stakeholder Management', question: 'A stakeholder who was previously classified as Low Power / Low Interest has been promoted to Director and now has budget approval authority. What should the project manager do FIRST?', options: [ { text: 'Continue with the same engagement strategy — their interest level has not changed.', correct: false }, { text: 'Update the stakeholder register and revise the engagement strategy to reflect the new power level.', correct: true }, { text: 'Escalate to the project sponsor to inform them of the stakeholder change.', correct: false }, { text: 'Schedule a formal kickoff meeting with the stakeholder to restart the relationship from scratch.', correct: false } ], explanation: 'The stakeholder register is a living document. When power or interest changes, the register and engagement strategy must be updated immediately. A newly promoted stakeholder with budget authority shifts from Monitor to Keep Satisfied or Manage Closely, depending on their interest level.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-22', domain: 'Stakeholder Management', question: 'A project manager notices that a key stakeholder has become less responsive and is delegating all communications to a junior team member. Which is the MOST appropriate next step?', options: [ { text: 'Continue communicating with the junior team member and assume the stakeholder will re-engage when needed.', correct: false }, { text: 'Escalate to the stakeholder\'s manager and request their active participation.', correct: false }, { text: 'Schedule a direct conversation with the stakeholder to understand their level of engagement and any concerns they may have.', correct: true }, { text: 'Remove the stakeholder from the communication plan until they re-engage.', correct: false } ], explanation: 'Stakeholder disengagement is a risk, not a convenience. Before escalating or assuming, the PM should have a direct conversation to understand whether the stakeholder has a concern, a capacity issue, or has simply lost interest. This information determines the appropriate response.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-23', domain: 'Stakeholder Management', question: 'Which of the following BEST describes the purpose of a stakeholder communication plan?', options: [ { text: 'To define what information each stakeholder group needs, when they need it, and through which channel it will be delivered.', correct: true }, { text: 'To document the project scope, schedule, and budget for all stakeholders.', correct: false }, { text: 'To assign communication responsibilities to individual team members.', correct: false }, { text: 'To establish a weekly meeting cadence for all project participants.', correct: false } ], explanation: 'A communication plan answers: who needs what information, when, and how. Its purpose is to make stakeholder communication predictable and purposeful — reducing ad-hoc requests and ensuring no stakeholder is surprised by project developments.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-24', domain: 'Communications Management', question: 'A project manager needs to communicate a technical architecture decision to both an engineering team and a non-technical executive sponsor. What is the MOST effective approach?', options: [ { text: 'Send the same detailed technical report to both audiences to ensure consistency.', correct: false }, { text: 'Summarize only the key decision for both audiences to keep communication brief.', correct: false }, { text: 'Let the engineering team communicate with the executive sponsor directly to save time.', correct: false }, { text: 'Tailor the communication to each audience — technical detail for the engineering team, business impact and recommendation for the executive sponsor.', correct: true } ], explanation: 'Effective communication adapts to the audience. Engineers need technical context to implement and maintain the decision. Executive sponsors need to understand the business impact and what (if anything) they need to decide or approve. Same decision, different lenses.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-25', domain: 'Stakeholder Management', question: 'During a project status meeting, a stakeholder begins arguing that the project approach is fundamentally wrong and should be reconsidered. Which is the BEST initial response?', options: [ { text: 'Defend the current approach with technical evidence and data.', correct: false }, { text: 'Acknowledge the concern, take it offline, and schedule a dedicated session to explore it properly.', correct: true }, { text: 'Ask the project sponsor to address the stakeholder directly.', correct: false }, { text: 'Note the concern in the meeting minutes and continue the meeting as planned.', correct: false } ], explanation: 'Public disagreements rarely resolve well in a meeting setting — they create defensiveness and derail the agenda. Acknowledging the concern and taking it offline signals respect for the stakeholder while protecting the meeting\'s purpose. A dedicated session gives the concern the proper time and attention it deserves.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-26', domain: 'Stakeholder Management', question: 'A project manager learns that a stakeholder has been giving direct instructions to developers outside of the sprint planning process. What should the project manager do?', options: [ { text: 'Ask the developers to ignore any instructions that did not come through official channels.', correct: false }, { text: 'Escalate to senior leadership immediately to stop the behavior.', correct: false }, { text: 'Meet with the stakeholder to understand their urgency, explain the impact on the team, and agree on a process for handling their requests through proper channels.', correct: true }, { text: 'Accept the situation — stakeholders with authority have the right to direct the team.', correct: false } ], explanation: 'Bypassed processes usually reflect a stakeholder who believes the formal channel is too slow. The right response is to address both the behavior and the root cause: have a direct conversation, understand their urgency, and offer a legitimate fast-track path while protecting the team from unplanned disruption.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-27', domain: 'Communications Management', question: 'What is the PRIMARY benefit of identifying stakeholders early in a project?', options: [ { text: 'It allows the project manager to involve key stakeholders in shaping requirements and expectations before commitments are made.', correct: true }, { text: 'It reduces the number of status meetings required during the project.', correct: false }, { text: 'It ensures that all stakeholders have the same level of technical knowledge.', correct: false }, { text: 'It allows the project manager to build the project schedule with input from all parties.', correct: false } ], explanation: 'Early stakeholder identification allows the PM to involve the right people in shaping requirements, setting expectations, and surfacing concerns before decisions are locked in. Stakeholders identified late often become resistant because they feel excluded — and their concerns become more costly to address.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-28', domain: 'Stakeholder Management', question: 'A stakeholder who is classified as Resistant on the engagement spectrum wants to attend all project meetings. How should the project manager respond?', options: [ { text: 'Decline the request — resistant stakeholders can create friction in meetings.', correct: false }, { text: 'Accept the request without any follow-up — participation may naturally increase their engagement.', correct: false }, { text: 'Accept the request and use the opportunity to better understand their concerns and move them toward a more supportive position.', correct: true }, { text: 'Escalate the situation to the sponsor before making a decision.', correct: false } ], explanation: 'A resistant stakeholder who wants to participate is showing a form of engagement. The right response is to welcome the participation and use it strategically — listen for their specific concerns, address them directly, and involve them in solutions where appropriate. Active participation often moves resistant stakeholders toward neutral or supportive.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-29', domain: 'Stakeholder Management', question: 'Which stakeholder engagement level requires the MOST active involvement from the project manager?', options: [ { text: 'Neutral — they are unbiased and require regular reinforcement to maintain their position.', correct: false }, { text: 'Resistant — they actively oppose the project and require direct engagement to understand and address their concerns.', correct: true }, { text: 'Unaware — they need to be informed about the project before any engagement can begin.', correct: false }, { text: 'Supportive — they are already aligned and should be leveraged to influence others.', correct: false } ], explanation: 'Resistant stakeholders require the most active engagement because their opposition can block decisions, delay approvals, and influence others negatively. Understanding their concern and addressing it directly — not escalating or excluding them — is the most effective path to moving them toward a more supportive position.' ,
  packageId: 'PKG-STAKEHOLDER' },
  { id: 'cq-30', domain: 'Communications Management', question: 'A project manager is creating a communication plan for a project with 15 stakeholders across 4 groups. What is the MOST important factor in designing the plan?', options: [ { text: 'Ensuring every stakeholder receives the same information to avoid confusion.', correct: false }, { text: 'Maximizing the frequency of updates to keep all stakeholders fully informed.', correct: false }, { text: 'Minimizing the number of communication formats to simplify management.', correct: false }, { text: 'Matching the content, frequency, and channel of communication to the specific needs of each stakeholder group.', correct: true } ], explanation: 'A communication plan serves its audience — not its author. The most effective plans are differentiated by stakeholder group: executives get impact summaries, technical teams get detail, operational teams get what affects their work. Same project, different lenses. Standardizing across audiences creates noise for some and gaps for others.' ,
  packageId: 'PKG-STAKEHOLDER' },
  // ── PKG-PLANNING ─────────────────────────────────────────────────────────
  { id: 'cq-31', domain: 'Project Planning', question: 'A project manager creates a WBS where the top-level items are: "Plan", "Execute", and "Monitor and Control". What is the PRIMARY problem with this WBS?', options: [ { text: 'The WBS has too few levels to be useful for planning.', correct: false }, { text: 'The WBS is organized by project phases rather than deliverables, violating the deliverables-based structure.', correct: true }, { text: 'The WBS does not include a closing phase.', correct: false }, { text: 'The WBS should only have one top-level item.', correct: false } ], explanation: 'A WBS should represent deliverables — the products, services, or results the project will produce. Organizing by phases (Plan, Execute, Monitor) describes process, not deliverables. A correct WBS would have items like: Authentication Module, Payment Integration, Admin Dashboard — things the team will actually build.',
  packageId: 'PKG-PLANNING' },
  { id: 'cq-32', domain: 'Estimation', question: 'A TPM uses Three-Point Estimation. The Optimistic estimate is 5 days, the Most Likely is 10 days, and the Pessimistic is 21 days. What is the PERT estimate?', options: [ { text: '11 days', correct: true }, { text: '10 days (most likely always wins)', correct: false }, { text: '12 days (simple average)', correct: false }, { text: '21 days (always use pessimistic for safety)', correct: false } ], explanation: 'PERT formula: (O + 4M + P) ÷ 6 = (5 + 4×10 + 21) ÷ 6 = (5 + 40 + 21) ÷ 6 = 66 ÷ 6 = 11 days. The formula weights the Most Likely estimate four times to reflect that it is the most realistic scenario. PERT produces more reliable estimates than simple averages.',
  packageId: 'PKG-PLANNING' },
  { id: 'cq-33', domain: 'Scope Management', question: 'Midway through a sprint, a stakeholder requests a "small" feature addition. The development team estimates 3 days of work. The sprint ends in 4 days. What should the TPM do FIRST?', options: [ { text: 'Add the feature — there is available time in the sprint.', correct: false }, { text: 'Reject the request — scope cannot change during a sprint.', correct: false }, { text: 'Evaluate the tradeoff with the team: adding the new feature may require removing an existing story to protect the sprint goal.', correct: true }, { text: 'Ask the developer to work overtime to fit both.', correct: false } ], explanation: 'Mid-sprint scope additions require a conscious tradeoff. Adding 3 days of new work does not automatically fit within a 4-day window — the team has other commitments in flight. The correct first action is to make the tradeoff visible: adding the new feature likely means removing an existing story. The sprint goal must be protected.',
  packageId: 'PKG-PLANNING' },
  // ── PKG-SPRINT ────────────────────────────────────────────────────────────
  { id: 'cq-34', domain: 'Sprint Planning', question: 'A Scrum team\'s 3-sprint rolling average velocity is 28 story points. During sprint planning, the team selects 42 points. What is the MOST appropriate action?', options: [ { text: 'Accept the 42-point commitment — teams should stretch to grow.', correct: false }, { text: 'Reduce the commitment to align with the team\'s proven velocity of 28 points.', correct: true }, { text: 'Split the difference and commit to 35 points.', correct: false }, { text: 'Add more developers to the sprint to close the capacity gap.', correct: false } ], explanation: 'Velocity is the team\'s proven delivery rate, not a ceiling to be broken with motivation. Committing 50% above velocity (42 vs. 28) without a structural change is a predictable failure. The TPM\'s job is to protect the team\'s credibility and stakeholder expectations by aligning commitment with sustainable pace.',
  packageId: 'PKG-SPRINT' },
  { id: 'cq-35', domain: 'Delivery Management', question: 'On day 7 of a 10-day sprint, the burndown chart shows no progress for 3 consecutive days. What does this MOST LIKELY indicate?', options: [ { text: 'The team is working on tasks not tracked in the project management tool.', correct: false }, { text: 'The team is blocked by a dependency, technical issue, or unclear acceptance criteria that has not been escalated.', correct: true }, { text: 'The sprint commitment was too aggressive.', correct: false }, { text: 'The velocity calculation for this sprint is incorrect.', correct: false } ], explanation: 'A flat burndown for 3 days is a strong signal of a blocker — something preventing the team from closing stories. The TPM should immediately convene a focused session to identify the blocker: a dependency, technical uncertainty, unavailable reviewer, or unclear acceptance criteria. A flat burndown is a signal to act, not wait.',
  packageId: 'PKG-SPRINT' },
  // ── PKG-DELIVERY ─────────────────────────────────────────────────────────
  { id: 'cq-36', domain: 'Release Management', question: 'During a release readiness review, a security team flags a medium-severity SQL injection vulnerability in the admin search feature. The release is scheduled for tomorrow. What is the BEST course of action?', options: [ { text: 'Release as planned — medium severity does not require a delay.', correct: false }, { text: 'Block the release and fix the vulnerability before deployment to production.', correct: true }, { text: 'Release with monitoring enabled to detect any exploitation attempts.', correct: false }, { text: 'Patch the vulnerability in the first post-release hotfix.', correct: false } ], explanation: 'SQL injection is an exploitable vulnerability regardless of severity classification. Releasing with a known injection attack vector creates immediate legal, regulatory, and reputational risk. Security vulnerabilities involving user input and database interaction must be patched before production deployment.',
  packageId: 'PKG-DELIVERY' },
  { id: 'cq-37', domain: 'Release Management', question: 'A team uses a canary release, deploying to 5% of users. After 24 hours, the error rate in the new version is 4.1% vs. 0.3% in the previous version. What should the TPM recommend?', options: [ { text: 'Proceed with full rollout — 4.1% error rate is within acceptable limits.', correct: false }, { text: 'Expand the canary to 25% and observe for another 48 hours.', correct: false }, { text: 'Pause the rollout, revert the feature flag to 0%, and investigate the root cause before proceeding.', correct: true }, { text: 'Notify affected users and continue the rollout as planned.', correct: false } ], explanation: 'A 13× increase in error rate (0.3% → 4.1%) is a clear rollback signal. The canary strategy exists precisely to catch this pattern before it affects all users. Reverting the flag immediately protects 95% of users while engineering investigates without the pressure of an active production incident.',
  packageId: 'PKG-DELIVERY' },
  // ── PKG-LEADERSHIP ───────────────────────────────────────────────────────
  { id: 'cq-38', domain: 'Leadership', question: 'A Technical PM has no direct management authority over the engineering team. A senior engineer consistently dismisses timeline estimates in team meetings. What is the MOST effective long-term response?', options: [ { text: 'Escalate to the engineering manager to address the behavior.', correct: false }, { text: 'Ignore the comments and proceed with the original estimates.', correct: false }, { text: 'Involve the engineer in building the estimates so their expertise shapes the timeline and they share ownership of it.', correct: true }, { text: 'Ask the engineer to provide their own alternative timeline.', correct: false } ], explanation: 'Influence without authority is the defining challenge of the TPM role. When a senior engineer dismisses estimates, the most effective response is to bring them into the process: use their expertise to build the estimate, making them a co-owner of the timeline they help create. People defend estimates they built — not estimates handed to them.',
  packageId: 'PKG-LEADERSHIP' },
  { id: 'cq-39', domain: 'Decision Making', question: 'In the DACI framework, who is responsible for owning the decision-making process, gathering input from contributors, and driving the decision to resolution?', options: [ { text: 'The Approver — they have final authority.', correct: false }, { text: 'The Driver — they own the process and drive to resolution.', correct: true }, { text: 'The Contributors — they have the most relevant expertise.', correct: false }, { text: 'The Informed — they receive the final decision.', correct: false } ], explanation: 'In DACI (Driver, Approver, Contributor, Informed), the Driver owns the process: they gather input from contributors, facilitate the discussion, and drive to a conclusion. The Approver has final authority on the decision itself. A Technical PM is typically the Driver for project-related decisions.',
  packageId: 'PKG-LEADERSHIP' },
  // ── PKG-TECHNICAL ────────────────────────────────────────────────────────
  { id: 'cq-40', domain: 'API Literacy', question: 'A developer reports that an external payment API is returning HTTP 429 errors. What does this indicate and what is the appropriate response?', options: [ { text: '429 means the API server is down. Pause all payment processing.', correct: false }, { text: '429 means Too Many Requests — implement request throttling or batching to stay within the rate limit.', correct: true }, { text: '429 means the API key has expired. Request a new key from the provider.', correct: false }, { text: '429 means the request payload is malformed. Review the API documentation.', correct: false } ], explanation: 'HTTP 429 (Too Many Requests) indicates the application is exceeding the API provider\'s rate limit. The response is to implement throttling (limit requests per unit time), exponential backoff (wait progressively longer before retrying), or request batching. Rate limits must be understood before integration work begins.',
  packageId: 'PKG-TECHNICAL' },
  { id: 'cq-41', domain: 'Technical Communication', question: 'A TPM needs to communicate a critical API dependency risk to both the engineering team and a non-technical Chief Commercial Officer. What is the BEST approach?', options: [ { text: 'Send the same detailed technical report to both audiences for consistency.', correct: false }, { text: 'Tailor the communication: technical details for the engineering team; business impact, timeline risk, and recommended action for the CCO.', correct: true }, { text: 'Let the engineering team communicate directly with the CCO for technical accuracy.', correct: false }, { text: 'Send a brief email to both stating the risk will be addressed.', correct: false } ], explanation: 'Effective technical communication adapts to the audience. The engineering team needs technical context to implement mitigations. The CCO needs to understand business impact — which features are at risk, what the timeline implication is, and what decision is needed from them. Same risk, two different communication needs.',
  packageId: 'PKG-TECHNICAL' },
  // ── PKG-DEVOPS ───────────────────────────────────────────────────────────
  { id: 'cq-42', domain: 'DevOps Fundamentals', question: 'Which of the four DORA metrics measures the ability of a team to recover from a production failure?', options: [ { text: 'Deployment Frequency — how often the team deploys to production.', correct: false }, { text: 'Lead Time for Changes — time from code commit to production.', correct: false }, { text: 'Mean Time to Restore (MTTR) — average time to recover from a production incident.', correct: true }, { text: 'Change Failure Rate — percentage of deployments causing incidents.', correct: false } ], explanation: 'MTTR (Mean Time to Restore) measures how quickly a team recovers from production failures. It reflects the quality of monitoring, incident response processes, and rollback capabilities. High-performing teams achieve MTTR under 1 hour. The four DORA metrics (Deployment Frequency, Lead Time, MTTR, Change Failure Rate) define DevOps delivery performance.',
  packageId: 'PKG-DEVOPS' },
  { id: 'cq-43', domain: 'Incident Management', question: 'During a production incident, the TPM\'s PRIMARY role is to:', options: [ { text: 'Diagnose the root cause alongside the engineering team.', correct: false }, { text: 'Coordinate communication with internal stakeholders and maintain the incident log while engineering resolves the issue.', correct: true }, { text: 'Make the technical decision about whether to roll back the release.', correct: false }, { text: 'Contact affected customers directly to manage their expectations.', correct: false } ], explanation: 'During a production incident, engineers diagnose and fix. The TPM coordinates: managing communication to internal stakeholders (leadership, Customer Success), maintaining a running incident log for the postmortem, and removing obstacles for the engineering team. The TPM does not diagnose, does not make technical recovery decisions, and does not contact customers directly.',
  packageId: 'PKG-DEVOPS' },
  // ── PKG-TECHDEBT ─────────────────────────────────────────────────────────
  { id: 'cq-44', domain: 'Technical Debt', question: 'The engineering team reports that a core service is responsible for 45% of all production incidents last quarter. The Product Owner wants to focus exclusively on new features. What should the TPM recommend?', options: [ { text: 'Support the Product Owner — new features generate revenue; technical debt does not.', correct: false }, { text: 'Quantify the debt\'s business cost (engineering hours on incidents) and compare it to the refactoring cost, then present the tradeoff to the Product Owner.', correct: true }, { text: 'Override the Product Owner and schedule the refactoring unilaterally.', correct: false }, { text: 'Accept the situation — all legacy services have high incident rates.', correct: false } ], explanation: 'Technical debt is a business risk that must be communicated in business terms. Translating "this service has a lot of debt" into "this service cost 47 engineering hours in incident response last quarter — equivalent to a full sprint" gives the Product Owner the data to make an informed tradeoff decision. The TPM facilitates; the PO decides.',
  packageId: 'PKG-TECHDEBT' },
  { id: 'cq-45', domain: 'Technical Debt', question: 'A team implements a "20% of sprint capacity for technical debt" rule. The Product Owner says this reduces feature output. What is the STRONGEST business argument for maintaining the rule?', options: [ { text: 'Engineers are happier when they can work on clean code.', correct: false }, { text: 'The 20% allocation replaces reactive incident response time the team already spends — it is a reallocation, not an additional cost.', correct: true }, { text: 'Technical debt will eventually cause the product to stop working.', correct: false }, { text: 'Industry best practices recommend 20% for technical debt.', correct: false } ], explanation: 'Teams already spend similar capacity reactively on incident response, workarounds, and debugging caused by debt. Structured debt allocation replaces unpredictable reactive spending with planned, productive improvement work. It is a reallocation of existing cost, not new spending — and it makes the team more predictable over time.',
  packageId: 'PKG-TECHDEBT' },
  // ── PKG-AI ───────────────────────────────────────────────────────────────
  { id: 'cq-46', domain: 'AI Literacy', question: 'A product team wants to use an LLM to automatically send legally binding contract amendments to customers without human review. What is the PRIMARY risk that should block this design?', options: [ { text: 'LLMs are too slow for real-time contract generation.', correct: false }, { text: 'LLMs can hallucinate — generating plausible but factually incorrect legal content — creating legal and regulatory liability without human review.', correct: true }, { text: 'LLMs cannot generate text in formal legal language.', correct: false }, { text: 'The LLM API costs would be too high at scale.', correct: false } ], explanation: 'LLM hallucination — generating confident but incorrect content — is the primary risk for high-stakes automated AI outputs. Legal documents sent without human review could contain incorrect terms, dates, or obligations that create legal liability. The correct design is human-in-the-loop: AI drafts, human reviews and approves, then the document is sent.',
  packageId: 'PKG-AI' },
  { id: 'cq-47', domain: 'AI Project Management', question: 'Six months after an AI recommendation model launches, its click-through rate drops from 19% to 11% with no code changes. What is the MOST LIKELY cause?', options: [ { text: 'The model has a bug introduced by the latest infrastructure update.', correct: false }, { text: 'Model drift — real-world data distribution has shifted away from the training data, degrading performance over time.', correct: true }, { text: 'Users have become bored with the recommendations.', correct: false }, { text: 'The evaluation dataset was too small and the model was never accurate.', correct: false } ], explanation: 'Model drift occurs when the real-world data distribution evolves differently from the training data. User behavior, content inventory, and market conditions change over time. Without retraining, the model\'s predictions become less accurate. The absence of code changes rules out a software bug. Monitoring for drift and establishing a retraining cadence is a core AI PM responsibility.',
  packageId: 'PKG-AI' },
];


/* === modules/m2-learning/module.js === */
/**
 * LearningModule — M2
 * Entry: Learn Home → Learning Library (packages) → Experience → Phases
 * Tracks last_active_exp for smart Continue Learning on Home.
 * Data source: COMPETENCY_PACKAGES[n].learn
 */
const LearningModule = (() => {
  let _container = null;
  let _currentTrackId  = null;
  let _currentExpId    = null;
  let _currentPhaseIdx = 0;
  let _phaseState = {};
  let _progress   = {};

  const LETTERS = ['A','B','C','D'];

  // ── Package/track helpers ─────────────────────────────────────────────────
  function _findTrack(trackId) { return COMPETENCY_PACKAGES.find(p => p.learn.id === trackId)?.learn || null; }
  function _findPackage(trackId) { return COMPETENCY_PACKAGES.find(p => p.learn.id === trackId) || null; }

  // ── Progress ─────────────────────────────────────────────────────────────
  async function _loadProgress() {
    try {
      const all = await StorageManager.getAll('learning_progress');
      _progress = {};
      (all || []).forEach(r => { if (r && r.id) _progress[r.id] = r; });
    } catch(e) { _progress = {}; }
  }

  async function _saveExpProgress(expId, data) {
    _progress[expId] = { id: expId, ...data };
    try { await StorageManager.set('learning_progress', { id: expId, ...data }); } catch(e) {}
  }

  function _getExpProgress(expId) { return _progress[expId] || null; }

  function _trackCompleted(trackId) {
    const track = _findTrack(trackId);
    if (!track) return 0;
    const available = track.experiences.filter(e => e.status === 'available');
    const done = available.filter(e => _getExpProgress(e.id)?.completed).length;
    return available.length ? done / available.length : 0;
  }

  async function _saveLastActive(data) {
    try { await StorageManager.setSetting('last_active_exp', data); } catch(e) {}
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function icon(path, cls = 'icon') {
    return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg>`;
  }
  const ICO_BACK  = 'M15 18l-6-6 6-6';
  const ICO_ARROW = 'M5 12h14M12 5l7 7-7 7';
  const ICO_CHECK = 'M20 6L9 17l-5-5';

  function _render(html) { if (_container) _container.innerHTML = html; }
  function _q(sel)  { return _container ? _container.querySelector(sel)  : null; }
  function _qa(sel) { return _container ? Array.from(_container.querySelectorAll(sel)) : []; }

  function _mentorVoice(text) {
    if (!text) return '';
    return `<div class="mentor-voice">
      <span class="mentor-avatar" aria-hidden="true">🎓</span>
      <p class="mentor-text">${text}</p>
    </div>`;
  }

  // ── Phase progress indicator ──────────────────────────────────────────────
  function _buildPhaseProgress(phases, currentIdx) {
    const steps = phases.map((p, i) => {
      const done = i < currentIdx, active = i === currentIdx;
      const cls  = done ? 'done' : active ? 'active' : '';
      const inner = done ? icon(ICO_CHECK, 'icon') : (i + 1);
      const line  = i < phases.length - 1 ? `<div class="phase-step-line${done ? ' done' : ''}"></div>` : '';
      return `<div class="phase-step"><div class="phase-step-circle ${cls}">${inner}</div>${line}</div>`;
    }).join('');
    const labels = phases.map((p, i) => {
      const cls = i < currentIdx ? 'done' : i === currentIdx ? 'active' : '';
      return `<span class="phase-label ${cls}">${p.label}</span>`;
    }).join('');
    return `<div class="phase-progress">${steps}</div><div class="phase-label-row">${labels}</div>`;
  }

  function _wrap(exp, phaseIdx, inner) {
    return `<div class="learn-screen exp-view">
      <button class="learn-back" id="exp-back">${icon(ICO_BACK)} Back to track</button>
      <div class="phase-progress-block">${_buildPhaseProgress(exp.phases, phaseIdx)}</div>
      ${inner}
    </div>`;
  }

  // ── LEARNING LIBRARY (competency packages) ────────────────────────────────
  function _renderLearningLibrary() {
    const cards = COMPETENCY_PACKAGES.map(pkg => {
      const trackId  = pkg.learn.id;
      const ratio    = _trackCompleted(trackId);
      const pct      = Math.round(ratio * 100);
      const totalExp = pkg.learn.experiences.filter(e => e.status === 'available').length;
      const doneExp  = pkg.learn.experiences.filter(e => e.status === 'available' && _getExpProgress(e.id)?.completed).length;
      const progressRow = `
        <div class="track-progress-row">
          <div class="track-progress-bar"><div class="track-progress-fill" style="width:${pct}%"></div></div>
          <span class="track-progress-text">${doneExp}/${totalExp}</span>
        </div>`;
      const badge = `<span class="track-level-badge">${pkg.level}</span>`;
      const ip = pct > 0 && pct < 100 ? ' in-progress' : '';
      return `<button class="track-card${ip}" data-track="${trackId}">
        <div class="track-card-top">
          <div class="track-icon">${pkg.icon}</div>
          <div class="track-meta">
            <div class="track-title">${pkg.name}</div>
            <div class="track-desc">${pkg.description}</div>
            ${badge}
          </div>
        </div>
        ${progressRow}
      </button>`;
    }).join('');

    _render(`<div class="learn-screen">
      <button class="learn-back" id="back-to-learn">${icon(ICO_BACK)} Learn</button>
      <div class="learn-header">
        <div class="learn-eyebrow">Learning Library</div>
        <h1>All Tracks</h1>
        <p>Choose a track to explore. Each one is built around real PM skills.</p>
      </div>
      <div class="track-grid">${cards}</div>
    </div>`);

    _q('#back-to-learn').addEventListener('click', _renderLearningLibrary);
    _qa('.track-card:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        _currentTrackId = btn.dataset.track;
        _renderExperienceList(_currentTrackId);
      });
    });
  }

  // ── EXPERIENCE LIST ───────────────────────────────────────────────────────
  function _renderExperienceList(trackId) {
    const pkg   = _findPackage(trackId);
    const track = pkg?.learn || null;
    if (!track) return _renderLearningLibrary();

    const totalAvail = track.experiences.filter(e => e.status === 'available').length;
    const doneCount  = track.experiences.filter(e => _getExpProgress(e.id)?.completed).length;
    const pct        = totalAvail ? Math.round((doneCount / totalAvail) * 100) : 0;

    const expItems = track.experiences.map((exp, idx) => {
      const prog = _getExpProgress(exp.id);
      const done = prog?.completed;
      const statusEl = done
        ? `<div class="exp-status-circle done">${icon(ICO_CHECK)}</div>`
        : `<div class="exp-status-circle"><span style="font-size:0.65rem;color:var(--text-faint);font-weight:700">${idx+1}</span></div>`;
      const doneLabel = done ? `<span class="exp-status-label review-label">Review</span>` : '';
      return `<button class="exp-item${done ? ' completed' : ''}" data-exp="${exp.id}">
        ${statusEl}
        <div class="exp-item-meta">
          <div class="exp-item-title">${exp.title}${doneLabel}</div>
          <div class="exp-item-objective">${exp.objective}</div>
          <div class="exp-item-duration">⏱ ${exp.duration}</div>
        </div>
        <div class="exp-item-arrow">${icon('M9 18l6-6-6-6')}</div>
      </button>`;
    }).join('');

    _render(`<div class="learn-screen">
      <button class="learn-back" id="back-to-library">${icon(ICO_BACK)} All Learning Tracks</button>
      <div class="track-view-header">
        <div class="track-view-icon">${track.icon}</div>
        <div class="track-view-meta">
          <div class="track-view-title">${pkg.name}</div>
          <div class="track-view-stats">${pkg.level} · ${track.experiences.length} experiences</div>
          <div class="track-view-progress">
            <div class="track-view-progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
      <div class="exp-list">${expItems}</div>
    </div>`);

    _q('#back-to-library').addEventListener('click', _renderLearningLibrary);
    _qa('.exp-item').forEach(btn => {
      btn.addEventListener('click', () => _startExperience(trackId, btn.dataset.exp));
    });
  }

  // ── START EXPERIENCE ──────────────────────────────────────────────────────
  async function _startExperience(trackId, expId) {
    const track = _findTrack(trackId);
    const exp   = track?.experiences.find(e => e.id === expId);
    if (!exp || !exp.phases) return;

    _currentTrackId  = trackId;
    _currentExpId    = expId;
    _currentPhaseIdx = 0;
    _phaseState      = {};

    await _saveLastActive({ trackId, expId, phaseIdx: 0 });
    StreakSystem.recordActivity?.();
    _renderPhase(exp, 0);
  }

  // ── RENDER PHASE ─────────────────────────────────────────────────────────
  function _renderPhase(exp, phaseIdx) {
    _currentPhaseIdx = phaseIdx;
    const phase = exp.phases[phaseIdx];
    switch (phase.type) {
      case 'reading':     _renderReading(exp, phase, phaseIdx);     break;
      case 'classify':    _renderClassify(exp, phase, phaseIdx);    break;
      case 'quiz':        _renderQuiz(exp, phase, phaseIdx);        break;
      case 'keyTakeaway': _renderKeyTakeaway(exp, phase, phaseIdx); break;
      default: _advancePhase(exp, phaseIdx);
    }
  }

  async function _advancePhase(exp, fromIdx) {
    const next = fromIdx + 1;
    if (next < exp.phases.length) {
      await _saveLastActive({ trackId: _currentTrackId, expId: _currentExpId, phaseIdx: next });
      _phaseState = {};
      _renderPhase(exp, next);
    } else {
      _completeExperience(exp);
    }
  }

  function _bindBack(exp) {
    _q('#exp-back')?.addEventListener('click', () => _renderExperienceList(_currentTrackId));
  }

  // ── PHASE: READING ────────────────────────────────────────────────────────
  function _renderReading(exp, phase, phaseIdx) {
    if (!_phaseState.reading) _phaseState.reading = { cardIdx: 0 };
    const state = _phaseState.reading;
    const cards = phase.sections || [];
    const total = cards.length;

    function showCard() {
      const c = cards[state.cardIdx];
      const isFirst = state.cardIdx === 0;
      const isLast  = state.cardIdx === total - 1;
      const pct     = Math.round(((state.cardIdx + 1) / total) * 100);
      const mentorHtml = (isFirst && phase.mentorIntro) ? _mentorVoice(phase.mentorIntro) : '';

      _render(_wrap(exp, phaseIdx, `
        ${mentorHtml}
        <div class="reading-card-nav-top">
          <div class="reading-mini-progress"><div class="reading-mini-fill" style="width:${pct}%"></div></div>
          <span class="reading-card-counter">${state.cardIdx + 1} of ${total}</span>
        </div>
        <div class="reading-card">
          <div class="reading-card-heading">${c.heading}</div>
          <div class="reading-card-body">${c.body}</div>
          ${c.explainSimply ? '<button class="explain-simply-btn" id="explain-simply-btn">💡 Explain Simply</button><div class="explain-simply-panel" id="explain-simply-panel" hidden>' + c.explainSimply + '</div>' : ''}
        </div>
        <div class="reading-nav">
          ${!isFirst ? `<button class="reading-prev-btn" id="r-prev">← Back</button>` : '<div></div>'}
          <button class="${isLast ? 'reading-continue-btn' : 'reading-next-btn'}" id="r-next">
            ${isLast ? `Continue ${icon(ICO_ARROW)}` : 'Next →'}
          </button>
        </div>
      `));

      _bindBack(exp);
      _q('#explain-simply-btn')?.addEventListener('click', () => {
        const panel = _q('#explain-simply-panel');
        const btn   = _q('#explain-simply-btn');
        if (panel) {
          const hidden = panel.hasAttribute('hidden');
          hidden ? panel.removeAttribute('hidden') : panel.setAttribute('hidden', '');
          btn.textContent = hidden ? '✕ Close' : '💡 Explain Simply';
        }
      });
      _q('#r-prev')?.addEventListener('click', () => { state.cardIdx--; showCard(); });
      _q('#r-next').addEventListener('click', () => {
        if (isLast) _advancePhase(exp, phaseIdx);
        else { state.cardIdx++; showCard(); }
      });
    }
    showCard();
  }

  // ── PHASE: CLASSIFY ───────────────────────────────────────────────────────
  function _renderClassify(exp, phase, phaseIdx) {
    if (!_phaseState.classify) _phaseState.classify = { idx: 0, results: [], answered: false };
    const state = _phaseState.classify;

    function showCard() {
      if (state.idx >= phase.items.length) { showResults(); return; }
      const item = phase.items[state.idx];
      const pct  = Math.round((state.idx / phase.items.length) * 100);
      const cats = phase.categories.map(c =>
        `<button class="classify-option-btn" data-cat="${c.id}">
          <span class="opt-icon">${c.icon}</span>${c.label}
        </button>`).join('');
      const mentorHtml = (state.idx === 0 && phase.mentorIntro) ? _mentorVoice(phase.mentorIntro) : '';

      _render(_wrap(exp, phaseIdx, `
        ${mentorHtml}
        <div class="classify-header">
          <div class="classify-title">${phase.title}</div>
          <div class="classify-instruction">${phase.instruction}</div>
        </div>
        <div class="classify-progress-row">
          <div class="classify-progress-bar"><div class="classify-progress-fill" style="width:${pct}%"></div></div>
          <span class="classify-progress-text">${state.idx + 1} of ${phase.items.length}</span>
        </div>
        <div class="classify-card">
          <div class="classify-card-label">Scenario ${state.idx + 1}</div>
          <div class="classify-card-text">${item.text}</div>
        </div>
        <div class="classify-options">${cats}</div>
        <div id="classify-feedback"></div>
      `));
      _bindBack(exp);

      _qa('.classify-option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.answered) return;
          state.answered = true;
          const chosen  = btn.dataset.cat;
          const correct = chosen === item.correct;
          state.results.push({ correct });
          _qa('.classify-option-btn').forEach(b => b.disabled = true);
          btn.classList.add(correct ? 'selected-correct' : 'selected-wrong');
          if (!correct) _qa('.classify-option-btn').forEach(b => { if (b.dataset.cat === item.correct) b.classList.add('other-correct'); });
          const fb = _q('#classify-feedback');
          if (fb) fb.innerHTML = `<div class="classify-feedback ${correct ? 'correct' : 'wrong'}">
            <div class="feedback-verdict">${correct ? '✓ Correct!' : '✗ Not quite.'}</div>
            ${correct ? item.feedbackCorrect : item.feedbackWrong}
          </div>`;
          setTimeout(() => { state.idx++; state.answered = false; showCard(); }, 2200);
        });
      });
    }

    function showResults() {
      const total   = phase.items.length;
      const correct = state.results.filter(r => r.correct).length;
      const ratio   = correct / total;
      const chips   = state.results.map((r, i) =>
        `<div class="classify-result-chip ${r.correct ? 'ok' : 'fail'}">${r.correct ? '✓' : '✗'} ${i+1}</div>`).join('');
      const msg = ratio <= 0.5  ? 'Keep going — this concept will click with practice.'
                : ratio <= 0.75 ? 'Good effort. The concepts section will fill in the gaps.'
                : ratio < 1     ? 'Great instincts. Just a couple to revisit.'
                :                 'Perfect — every scenario landed correctly.';

      _render(_wrap(exp, phaseIdx, `
        <div class="classify-results">
          <div class="classify-results-score">${correct}/${total}</div>
          <div class="classify-results-label">${msg}</div>
          <div class="classify-results-row">${chips}</div>
          ${_mentorVoice('Now let\'s look at the theory behind these scenarios. Everything will make sense.')}
          <button class="phase-continue-btn" id="classify-continue">Read the concepts ${icon(ICO_ARROW)}</button>
        </div>
      `));
      _bindBack(exp);
      _q('#classify-continue').addEventListener('click', () => _advancePhase(exp, phaseIdx));
    }
    showCard();
  }

  // ── PHASE: QUIZ ───────────────────────────────────────────────────────────
  function _renderQuiz(exp, phase, phaseIdx) {
    if (!_phaseState.quiz) _phaseState.quiz = { qIdx: 0, correct: 0, answered: false };
    const state = _phaseState.quiz;

    function showQuestion() {
      if (state.qIdx >= phase.questions.length) { showQuizResults(); return; }
      const q    = phase.questions[state.qIdx];
      const pct  = Math.round((state.qIdx / phase.questions.length) * 100);
      const opts = q.options.map((o, i) =>
        `<button class="quiz-option-btn" data-idx="${i}">
          <span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${o.text}</span>
        </button>`).join('');
      const mentorHtml = (state.qIdx === 0 && phase.mentorIntro) ? _mentorVoice(phase.mentorIntro) : '';

      _render(_wrap(exp, phaseIdx, `
        ${mentorHtml}
        <div class="quiz-header">
          <div class="quiz-title">${phase.title}</div>
          <div class="quiz-progress-row">
            <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
            <span class="quiz-progress-text">Question ${state.qIdx + 1} of ${phase.questions.length}</span>
          </div>
        </div>
        <div class="quiz-question-card"><div class="quiz-question-text">${q.question}</div></div>
        <div class="quiz-options">${opts}</div>
        <div id="quiz-feedback"></div>
        <div id="quiz-next"></div>
      `));
      _bindBack(exp);

      _qa('.quiz-option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.answered) return;
          state.answered = true;
          const chosen = parseInt(btn.dataset.idx);
          const opt    = q.options[chosen];
          const isOk   = opt.correct;
          if (isOk) state.correct++;
          _qa('.quiz-option-btn').forEach((b, i) => {
            b.disabled = true;
            if (q.options[i].correct)           b.classList.add('revealed-correct');
            else if (i === chosen && !isOk)     b.classList.add('selected-wrong');
            else                                b.classList.add('neutral-after');
          });
          const fb = _q('#quiz-feedback');
          if (fb) fb.innerHTML = `<div class="quiz-feedback ${isOk ? 'correct-feedback' : 'wrong-feedback'}">${opt.feedback}</div>`;
          const nx = _q('#quiz-next');
          if (nx) {
            const isLast = state.qIdx === phase.questions.length - 1;
            nx.innerHTML = `<button class="quiz-next-btn" id="quiz-next-btn">${isLast ? 'See results' : 'Next question'} ${icon(ICO_ARROW)}</button>`;
            _q('#quiz-next-btn').addEventListener('click', () => { state.qIdx++; state.answered = false; showQuestion(); });
          }
        });
      });
    }

    function showQuizResults() {
      const total   = phase.questions.length;
      const correct = state.correct;
      const pct     = Math.round((correct / total) * 100);
      const msg = pct <= 33 ? 'Review the concepts and try again.' : pct <= 66 ? 'Good progress. A couple of tricky ones in there.' : pct < 100 ? 'Almost perfect. Strong understanding.' : 'Perfect score. Solid understanding.';
      const sub = pct < 100 ? 'The feedback above explains the reasoning — review it before moving on.' : 'You\'re ready for the key takeaway.';
      _render(_wrap(exp, phaseIdx, `
        <div class="quiz-results">
          <div class="quiz-results-score">${correct}/${total}</div>
          <div class="quiz-results-label">${msg}</div>
          <div class="quiz-results-sub">${sub}</div>
          <button class="phase-continue-btn" id="quiz-continue">Continue ${icon(ICO_ARROW)}</button>
        </div>
      `));
      _bindBack(exp);
      _q('#quiz-continue').addEventListener('click', () => _advancePhase(exp, phaseIdx));
    }
    showQuestion();
  }

  // ── PHASE: KEY TAKEAWAY ───────────────────────────────────────────────────
  function _renderKeyTakeaway(exp, phase, phaseIdx) {
    const mentorHtml = phase.mentorNote ? _mentorVoice(phase.mentorNote) : '';
    _render(_wrap(exp, phaseIdx, `
      <div class="keytakeaway-screen">
        <div class="keytakeaway-badge">✨ Key Takeaway</div>
        ${mentorHtml}
        <div class="keytakeaway-card">
          <div class="keytakeaway-label">Remember this</div>
          <div class="keytakeaway-text">${phase.text}</div>
        </div>
        <div class="xp-award">
          <div class="xp-award-number">+${phase.xp} XP</div>
          <div class="xp-award-label">Experience earned</div>
        </div>
        <button class="complete-exp-btn" id="complete-exp-btn">${icon(ICO_CHECK)} Complete experience</button>
      </div>
    `));
    _bindBack(exp);
    _q('#complete-exp-btn').addEventListener('click', () => _completeExperience(exp));
  }

  // ── COMPLETE ──────────────────────────────────────────────────────────────
  async function _completeExperience(exp) {
    await _saveExpProgress(exp.id, { completed: true, completedAt: Date.now() });
    await _saveLastActive({ trackId: _currentTrackId, expId: exp.id, completed: true });
    const xp     = exp.phases.find(p => p.type === 'keyTakeaway')?.xp || 25;
    const phases = exp.phases.length;
    try { XPSystem.award(xp, 'lesson_complete'); } catch(e) {}
    if (exp.competencies) { try { await CompetencySystem.award(exp.competencies); } catch(e) {} }

    const completedPkg = _findPackage(_currentTrackId);
    const pkgName = completedPkg?.name || 'PM';
    _render(`<div class="learn-screen">
      <div class="completion-screen">
        <div class="completion-burst" aria-hidden="true">🎉</div>
        <h2 class="completion-title">You reinforced your ${pkgName} skills!</h2>
        <p class="completion-exp-name">${exp.title}</p>
        <div class="completion-stats">
          <div class="completion-stat">
            <div class="completion-stat-val">+${xp}</div>
            <div class="completion-stat-label">XP earned</div>
          </div>
          <div class="completion-stat">
            <div class="completion-stat-val">${phases}</div>
            <div class="completion-stat-label">phases done</div>
          </div>
        </div>
        ${_mentorVoice('That\'s the foundation. Every PM needs this concept locked in. You\'ve got it.')}
        <button class="phase-continue-btn" id="back-to-track">Back to track ${icon(ICO_ARROW)}</button>
      </div>
    </div>`);
    _q('#back-to-track').addEventListener('click', () => _renderExperienceList(_currentTrackId));
  }

  // ── PUBLIC API ────────────────────────────────────────────────────────────
  async function render(container) {
    _container = container;
    await _loadProgress();

    const intent = StateManager.get('learn_intent', null);
    StateManager.set('learn_intent', null);

    if (intent?.action === 'resume' && intent.trackId && intent.expId) {
      const track = _findTrack(intent.trackId);
      const exp   = track?.experiences.find(e => e.id === intent.expId);
      if (exp?.phases) {
        _currentTrackId  = intent.trackId;
        _currentExpId    = intent.expId;
        _currentPhaseIdx = intent.phaseIdx || 0;
        _phaseState      = {};
        _renderPhase(exp, _currentPhaseIdx);
        return;
      }
    } else if (intent?.action === 'track' && intent.trackId) {
      _currentTrackId = intent.trackId;
      _renderExperienceList(intent.trackId);
      return;
    } else if (intent?.action === 'library') {
      _renderLearningLibrary();
      return;
    }

    _renderLearningLibrary();
  }

  function destroy() { _container = null; }
  return { render, destroy };
})();


/* === modules/m3-practice/module.js === */
/**
 * PracticeModule — M3
 * Data source: COMPETENCY_PACKAGES (competency-first single source of truth)
 *
 *   Practice Challenges → develops judgment (scenario → decision → coaching)
 *   Interview Prep      → develops communication (STAR format coaching)
 *   Certification Prep  → tests knowledge (PMP-style MCQ with competency breakdown)
 */
const PracticeModule = (() => {
  let _container = null;
  let _challengeResults = {};

  // Derived flat arrays from COMPETENCY_PACKAGES
  const _allChallenges = () => COMPETENCY_PACKAGES.flatMap(p => p.practice);
  const _allInterviews = () => COMPETENCY_PACKAGES.flatMap(p => p.interview);

  const LETTERS = ['A', 'B', 'C', 'D'];

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function icon(path, cls = 'icon') {
    return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg>`;
  }
  const ICO_BACK  = 'M15 18l-6-6 6-6';
  const ICO_ARROW = 'M5 12h14M12 5l7 7-7 7';
  const ICO_CHECK = 'M20 6L9 17l-5-5';

  function _render(html) { if (_container) _container.innerHTML = html; }
  function _q(sel)  { return _container ? _container.querySelector(sel) : null; }
  function _qa(sel) { return _container ? Array.from(_container.querySelectorAll(sel)) : []; }

  // ── Project context block ─────────────────────────────────────────────────
  function _contextBlock(ctx) {
    if (!ctx) return '';
    return `<div class="project-ctx-block">
      <div class="ctx-row"><span class="ctx-label">Project</span><span class="ctx-value">${ctx.project}</span></div>
      <div class="ctx-row"><span class="ctx-label">Status</span><span class="ctx-value">${ctx.status}</span></div>
      <div class="ctx-row"><span class="ctx-label">Priority</span><span class="ctx-value ctx-priority">${ctx.priority}</span></div>
      <div class="ctx-row"><span class="ctx-label">Team</span><span class="ctx-value">${ctx.team}</span></div>
    </div>`;
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PRACTICE HOME
  // ════════════════════════════════════════════════════════════════════════════
  function _renderPracticeHome() {
    const challenges = _allChallenges();
    const interviews = _allInterviews();
    const doneCount = Object.keys(_challengeResults).length;
    const total = challenges.length;
    const pct = Math.round((doneCount / total) * 100);

    _render(`<div class="practice-screen">
      <div class="practice-header">
        <div class="practice-eyebrow">PM Hub AI</div>
        <h1>Practice</h1>
        <p>Develop your judgment through realistic Technical PM scenarios.</p>
      </div>
      <div class="practice-home-grid">
        <button class="practice-home-card primary" id="ph-challenges">
          <div class="ph-card-left">
            <div class="ph-card-icon">⚡</div>
            <div class="ph-card-body">
              <div class="ph-card-title">Practice Challenges</div>
              <div class="ph-card-sub">${total} IT/TPM decision scenarios</div>
              <div class="ph-progress-row">
                <div class="ph-progress-bar"><div class="ph-progress-fill" style="width:${pct}%"></div></div>
                <span class="ph-progress-text">${doneCount}/${total} done</span>
              </div>
            </div>
          </div>
          <div class="ph-card-arrow">→</div>
        </button>
        <button class="practice-home-card interview-card" id="ph-interview">
          <div class="ph-card-left">
            <div class="ph-card-icon">🎤</div>
            <div class="ph-card-body">
              <div class="ph-card-title">Interview Preparation</div>
              <div class="ph-card-sub">${interviews.length} questions · organized by competency</div>
            </div>
          </div>
          <div class="ph-card-arrow">→</div>
        </button>
        <button class="practice-home-card cert-card" id="ph-cert">
          <div class="ph-card-left">
            <div class="ph-card-icon">📋</div>
            <div class="ph-card-body">
              <div class="ph-card-title">Certification Prep</div>
              <div class="ph-card-sub">${CERT_QUESTIONS.length} PMP-style practice questions · Pass threshold: 70%</div>
            </div>
          </div>
          <div class="ph-card-arrow">→</div>
        </button>
      </div>
    </div>`);

    _q('#ph-challenges').addEventListener('click', _renderChallenges);
    _q('#ph-interview').addEventListener('click', () => _renderInterviewHome());
    _q('#ph-cert').addEventListener('click', _renderCertificationHome);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PRACTICE CHALLENGES
  // ════════════════════════════════════════════════════════════════════════════
  function _renderChallenges() {
    const items = _allChallenges().map((ch, i) => {
      const done = _challengeResults[ch.id];
      const statusEl = done
        ? `<div class="ch-status done">${icon(ICO_CHECK)}</div>`
        : `<div class="ch-status"><span>${i + 1}</span></div>`;
      const doneBadge = done ? `<span class="ch-badge done-badge">Done</span>` : '';
      const diffCls = ch.difficulty === 'Advanced' ? 'diff-advanced' : 'diff-intermediate';
      const tags = ch.tags.map(t => `<span class="ch-tag">${t}</span>`).join('');
      return `<button class="ch-item" data-idx="${i}">
        ${statusEl}
        <div class="ch-item-meta">
          <div class="ch-item-title">${ch.title} ${doneBadge}</div>
          <div class="ch-item-tags"><span class="ch-difficulty ${diffCls}">${ch.difficulty}</span>${tags}</div>
        </div>
        <div class="ch-item-arrow">${icon('M9 18l6-6-6-6')}</div>
      </button>`;
    }).join('');

    _render(`<div class="practice-screen">
      <button class="practice-back" id="back-to-practice">${icon(ICO_BACK)} Practice</button>
      <div class="practice-header">
        <div class="practice-eyebrow">Practice · Challenges</div>
        <h1>PM Scenarios</h1>
        <p>Read the situation. Choose the best TPM response. Reflect on the coaching.</p>
      </div>
      <div class="ch-list">${items}</div>
    </div>`);

    _q('#back-to-practice').addEventListener('click', _renderPracticeHome);
    _qa('.ch-item').forEach(btn => {
      btn.addEventListener('click', () => _renderChallenge(parseInt(btn.dataset.idx)));
    });
  }

  function _renderChallenge(idx) {
    const challenges = _allChallenges();
    const ch = challenges[idx];
    const total = challenges.length;
    const pct = Math.round(((idx + 1) / total) * 100);
    const opts = ch.options.map((o, i) =>
      `<button class="ch-option" data-idx="${i}">
        <span class="ch-opt-letter">${LETTERS[i]}</span>
        <span class="ch-opt-text">${o.text}</span>
      </button>`).join('');

    _render(`<div class="practice-screen">
      <button class="practice-back" id="back-to-list">${icon(ICO_BACK)} All challenges</button>
      <div class="ch-mini-progress-row">
        <div class="ch-mini-bar"><div class="ch-mini-fill" style="width:${pct}%"></div></div>
        <span class="ch-mini-text">${idx + 1} of ${total}</span>
      </div>
      ${_contextBlock(ch.projectContext)}
      <div class="ch-scenario-card">
        <div class="ch-scenario-label">Situation</div>
        <div class="ch-scenario-title">${ch.title}</div>
        <p class="ch-scenario-context">${ch.context}</p>
        <div class="ch-scenario-question">${ch.question}</div>
      </div>
      <div class="ch-options" id="ch-options">${opts}</div>
      <div id="ch-feedback"></div>
      <div id="ch-next"></div>
    </div>`);

    _q('#back-to-list').addEventListener('click', _renderChallenges);

    let answered = false;
    _qa('.ch-option').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (answered) return;
        answered = true;
        const chosen = parseInt(btn.dataset.idx);
        const opt = ch.options[chosen];
        const isOk = opt.correct;

        _challengeResults[ch.id] = { correct: isOk };

        // Award competencies on any engagement with the challenge
        if (ch.competencies) {
          try { await CompetencySystem.award(ch.competencies); } catch(e) {}
        }

        _qa('.ch-option').forEach((b, i) => {
          b.disabled = true;
          if (ch.options[i].correct)      b.classList.add('ch-opt-correct');
          else if (i === chosen && !isOk) b.classList.add('ch-opt-wrong');
          else                            b.classList.add('ch-opt-neutral');
        });

        const fb = _q('#ch-feedback');
        if (fb) fb.innerHTML = `
          <div class="ch-feedback ${isOk ? 'ch-feedback-ok' : 'ch-feedback-fail'}">
            <div class="ch-feedback-verdict">${isOk ? '✓ Good call.' : '✗ Not the best move.'}</div>
            <p class="ch-feedback-text">${opt.feedback}</p>
            <div class="ch-mentor-comment">
              <span class="ch-mentor-avatar">🎓</span>
              <span class="ch-mentor-text">${opt.mentorComment}</span>
            </div>
          </div>`;

        const nx = _q('#ch-next');
        if (nx) {
          const hasNext = idx + 1 < challenges.length;
          if (hasNext) {
            nx.innerHTML = `<button class="ch-next-btn" id="ch-next-btn">Next scenario ${icon(ICO_ARROW)}</button>`;
            _q('#ch-next-btn').addEventListener('click', () => _renderChallenge(idx + 1));
          } else {
            nx.innerHTML = `<button class="ch-next-btn" id="ch-done-btn">${icon(ICO_CHECK)} See results</button>`;
            _q('#ch-done-btn').addEventListener('click', _renderChallengeResults);
          }
        }
      });
    });
  }

  function _renderChallengeResults() {
    const challenges = _allChallenges();
    const total = challenges.length;
    const done  = Object.keys(_challengeResults).length;
    const correct = Object.values(_challengeResults).filter(r => r.correct).length;
    const pct = done ? Math.round((correct / done) * 100) : 0;
    const msg = pct < 50  ? 'Keep practicing — judgment develops over time.'
              : pct < 75  ? 'Good instincts. Review the coaching on the ones you missed.'
              : pct < 100 ? 'Strong PM thinking. Nearly there.'
              :              'Outstanding — every scenario handled correctly.';

    const allSkills = {};
    challenges.forEach(ch => {
      if (_challengeResults[ch.id]) {
        (ch.skills || []).forEach(s => { allSkills[s] = (allSkills[s] || 0) + 1; });
      }
    });
    const skillChips = Object.keys(allSkills).map(s =>
      `<span class="skill-chip">${icon(ICO_CHECK, 'icon skill-chip-icon')} ${s}</span>`).join('');

    _render(`<div class="practice-screen">
      <div class="ch-results-screen">
        <div class="ch-results-burst">🎯</div>
        <h2 class="ch-results-title">Session complete</h2>
        <div class="ch-results-score">${correct}/${done}</div>
        <p class="ch-results-msg">${msg}</p>
        <div class="skills-block results-skills">
          <div class="skills-heading">Skills strengthened today</div>
          <div class="skills-chips">${skillChips}</div>
        </div>
        <div class="ch-results-actions">
          <button class="ch-retry-btn" id="ch-retry">Practice again</button>
          <button class="ch-home-btn" id="ch-home">Back to Practice ${icon(ICO_ARROW)}</button>
        </div>
      </div>
    </div>`);

    _q('#ch-retry').addEventListener('click', () => { _challengeResults = {}; _renderChallenges(); });

    _q('#ch-home').addEventListener('click', _renderPracticeHome);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // INTERVIEW PREPARATION  (competency-package organized, STAR format)
  // ════════════════════════════════════════════════════════════════════════════
  function _renderInterviewHome() {
    const pkgCards = COMPETENCY_PACKAGES.map(pkg => {
      const count = pkg.interview.length;
      return `<button class="int-cat-card" data-pkg="${pkg.id}">
        <div class="int-cat-icon">${pkg.icon}</div>
        <div class="int-cat-body">
          <div class="int-cat-title">${pkg.name}</div>
          <div class="int-cat-sub">${pkg.description}</div>
          <div class="int-cat-count">${count} question${count !== 1 ? 's' : ''}</div>
        </div>
        <div class="int-cat-arrow">→</div>
      </button>`;
    }).join('');

    _render(`<div class="practice-screen">
      <button class="practice-back" id="back-to-practice">${icon(ICO_BACK)} Practice</button>
      <div class="practice-header">
        <div class="practice-eyebrow">Practice · Interview</div>
        <h1>Interview Prep</h1>
        <p>Practice like it's real. Formulate your answer, then see what strong responses look like.</p>
      </div>
      <div class="int-coaching-note">
        <span class="int-note-icon">💡</span>
        <span>Think through your answer first — then reveal the STAR coaching. The reflection is where the learning happens.</span>
      </div>
      <div class="int-cat-grid">${pkgCards}</div>
    </div>`);

    _q('#back-to-practice').addEventListener('click', _renderPracticeHome);
    _qa('.int-cat-card').forEach(btn => {
      btn.addEventListener('click', () => {
        const pkg = COMPETENCY_PACKAGES.find(p => p.id === btn.dataset.pkg);
        if (pkg) _renderInterviewSession(pkg, 0);
      });
    });
  }

  function _renderInterviewSession(pkg, idx) {
    const questions = pkg.interview;
    if (idx >= questions.length) {
      _renderInterviewComplete(pkg);
      return;
    }
    const q = questions[idx];
    const pct = Math.round(((idx + 1) / questions.length) * 100);

    _render(`<div class="practice-screen">
      <button class="practice-back" id="int-back">${icon(ICO_BACK)} ${pkg.name}</button>
      <div class="int-progress-row">
        <div class="int-progress-bar"><div class="int-progress-fill" style="width:${pct}%"></div></div>
        <span class="int-progress-text">Question ${idx + 1} of ${questions.length}</span>
      </div>
      <div class="int-question-card">
        <div class="int-question-label">Interview Question · ${pkg.name}</div>
        <div class="int-question-text">${q.question}</div>
        <div class="int-question-meta">
          <span class="ch-difficulty diff-${q.difficulty === 'Advanced' ? 'advanced' : 'intermediate'}">${q.difficulty}</span>
        </div>
      </div>
      <div class="int-think-block">
        <div class="int-think-label"><span class="int-think-icon">💭</span> Your answer</div>
        <textarea class="int-answer-area" id="int-answer" placeholder="${q.context}" rows="5"></textarea>
        <div class="int-think-hint">Write or think through your answer — then reveal the STAR coaching below.</div>
      </div>
      <button class="int-reveal-btn" id="int-reveal">See coaching ${icon(ICO_ARROW)}</button>
      <div id="int-coaching" class="int-coaching-panel hidden"></div>
      <div id="int-next"></div>
    </div>`);

    _q('#int-back').addEventListener('click', () => _renderInterviewHome());

    _q('#int-reveal').addEventListener('click', () => {
      _q('#int-reveal').style.display = 'none';
      const panel = _q('#int-coaching');
      panel.classList.remove('hidden');
      const s = q.star;

      panel.innerHTML = `
        <div class="int-star-panel">
          <div class="int-star-heading">⭐ STAR Response Framework</div>
          <div class="int-star-block">
            <div class="int-star-label">S — Situation</div>
            <div class="int-star-text">${s.situation}</div>
          </div>
          <div class="int-star-block">
            <div class="int-star-label">T — Task</div>
            <div class="int-star-text">${s.task}</div>
          </div>
          <div class="int-star-block">
            <div class="int-star-label">A — Action</div>
            <div class="int-star-text">${s.action}</div>
          </div>
          <div class="int-star-block">
            <div class="int-star-label">R — Result</div>
            <div class="int-star-text">${s.result}</div>
          </div>
          <div class="int-key-message">
            <div class="int-star-label">💡 Key Message</div>
            <div class="int-star-text">${s.keyMessage}</div>
          </div>
        </div>
        <div class="int-evaluator">
          <div class="int-section-label">🔍 What the interviewer is evaluating</div>
          <p class="int-section-body">${q.evaluatorFocus}</p>
        </div>`;

      const nx = _q('#int-next');
      if (nx) {
        const isLast = idx === questions.length - 1;
        nx.innerHTML = isLast
          ? `<button class="ch-next-btn" id="int-next-btn">${icon(ICO_CHECK)} Finish session</button>`
          : `<button class="ch-next-btn" id="int-next-btn">Next question ${icon(ICO_ARROW)}</button>`;
        _q('#int-next-btn').addEventListener('click', () => _renderInterviewSession(pkg, idx + 1));
      }

      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
    });
  }

  async function _renderInterviewComplete(pkg) {
    if (pkg.competencies) { try { await CompetencySystem.award(pkg.competencies); } catch(e) {} }

    const compChips = Object.keys(pkg.competencies || {}).map(c =>
      `<span class="skill-chip">${icon(ICO_CHECK, 'icon skill-chip-icon')} ${c}</span>`).join('');

    _render(`<div class="practice-screen">
      <div class="ch-results-screen">
        <div class="ch-results-burst">🎤</div>
        <h2 class="ch-results-title">You reinforced your ${pkg.name} skills!</h2>
        <p class="ch-results-msg">You've worked through every question in this package. Revisit in a few days — the goal is to internalize the thinking patterns, not memorize the answers.</p>
        <div class="skills-block results-skills">
          <div class="skills-heading">Competencies reinforced</div>
          <div class="skills-chips">${compChips}</div>
        </div>
        <div class="ch-results-actions">
          <button class="ch-retry-btn" id="int-retry">Practice again</button>
          <button class="ch-home-btn" id="int-home">Back to Interview Prep ${icon(ICO_ARROW)}</button>
        </div>
      </div>
    </div>`);

    _q('#int-retry').addEventListener('click', () => _renderInterviewSession(pkg, 0));
    _q('#int-home').addEventListener('click', _renderInterviewHome);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // CERTIFICATION PREP
  // ════════════════════════════════════════════════════════════════════════════
  const PASS_THRESHOLD = 0.7; // 70%

  function _renderCertificationHome() {
    const total = (typeof CERT_QUESTIONS !== 'undefined') ? CERT_QUESTIONS.length : 0;
    const domains = [...new Set((CERT_QUESTIONS || []).map(q => q.domain))];
    const domainList = domains.map(d => `<span class="cert-domain-tag">${d}</span>`).join('');

    _render(`<div class="practice-screen">
      <button class="practice-back" id="back-to-practice">${icon(ICO_BACK)} Practice</button>
      <div class="practice-header">
        <div class="practice-eyebrow">Practice · Certification</div>
        <h1>Certification Prep</h1>
        <p>PMP-style multiple choice questions. Aim for 70% or above to pass.</p>
      </div>
      <div class="cert-info-card">
        <div class="cert-info-row">
          <div class="cert-info-stat"><div class="cert-info-val">${total}</div><div class="cert-info-label">Questions</div></div>
          <div class="cert-info-stat"><div class="cert-info-val">70%</div><div class="cert-info-label">Pass threshold</div></div>
          <div class="cert-info-stat"><div class="cert-info-val">~12 min</div><div class="cert-info-label">Estimated time</div></div>
        </div>
        <div class="cert-domains">
          <div class="cert-domains-label">Knowledge areas covered</div>
          <div class="cert-domains-list">${domainList}</div>
        </div>
      </div>
      <div class="int-coaching-note">
        <span class="int-note-icon">💡</span>
        <span>Each question includes a full explanation — understanding the reasoning matters more than memorizing answers.</span>
      </div>
      <button class="cert-start-btn" id="cert-start">Start practice exam ${icon(ICO_ARROW)}</button>
    </div>`);

    _q('#back-to-practice').addEventListener('click', _renderPracticeHome);
    _q('#cert-start').addEventListener('click', () => _renderCertQuestion(0, []));
  }

  function _renderCertQuestion(idx, results) {
    const questions = CERT_QUESTIONS || [];
    if (idx >= questions.length) {
      _renderCertResults(results);
      return;
    }

    const q = questions[idx];
    const pct = Math.round(((idx + 1) / questions.length) * 100);
    const opts = q.options.map((o, i) =>
      `<button class="cert-option" data-idx="${i}">
        <span class="ch-opt-letter">${LETTERS[i]}</span>
        <span class="ch-opt-text">${o.text}</span>
      </button>`).join('');

    _render(`<div class="practice-screen">
      <button class="practice-back" id="cert-back">${icon(ICO_BACK)} Certification Prep</button>
      <div class="cert-header-row">
        <div class="cert-domain-pill">${q.domain}</div>
        <span class="int-progress-text">Question ${idx + 1} of ${questions.length}</span>
      </div>
      <div class="int-progress-row">
        <div class="int-progress-bar"><div class="int-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="int-question-card">
        <div class="int-question-text">${q.question}</div>
      </div>
      <div class="ch-options" id="cert-options">${opts}</div>
      <div id="cert-feedback"></div>
      <div id="cert-next"></div>
    </div>`);

    _q('#cert-back').addEventListener('click', _renderCertificationHome);

    let answered = false;
    _qa('.cert-option').forEach(btn => {
      btn.addEventListener('click', () => {
        if (answered) return;
        answered = true;
        const chosen = parseInt(btn.dataset.idx);
        const opt = q.options[chosen];
        const isOk = opt.correct;

        _qa('.cert-option').forEach((b, i) => {
          b.disabled = true;
          if (q.options[i].correct)      b.classList.add('ch-opt-correct');
          else if (i === chosen && !isOk) b.classList.add('ch-opt-wrong');
          else                            b.classList.add('ch-opt-neutral');
        });

        const fb = _q('#cert-feedback');
        if (fb) fb.innerHTML = `
          <div class="ch-feedback ${isOk ? 'ch-feedback-ok' : 'ch-feedback-fail'}">
            <div class="ch-feedback-verdict">${isOk ? '✓ Correct.' : '✗ Incorrect.'}</div>
            <p class="ch-feedback-text">${opt.explanation}</p>
          </div>`;

        const newResults = [...results, { correct: isOk, domain: q.domain, packageId: q.packageId }];
        const nx = _q('#cert-next');
        if (nx) {
          const isLast = idx === questions.length - 1;
          nx.innerHTML = isLast
            ? `<button class="ch-next-btn" id="cert-next-btn">${icon(ICO_CHECK)} See results</button>`
            : `<button class="ch-next-btn" id="cert-next-btn">Next question ${icon(ICO_ARROW)}</button>`;
          _q('#cert-next-btn').addEventListener('click', () => _renderCertQuestion(idx + 1, newResults));
        }
      });
    });
  }

  async function _renderCertResults(results) {
    const total   = results.length;
    const correct = results.filter(r => r.correct).length;
    const pct     = total ? correct / total : 0;
    const passed  = pct >= PASS_THRESHOLD;
    const pctDisplay = Math.round(pct * 100);

    // Award competencies from each package based on correct answers
    if (passed) {
      const compMap = {};
      COMPETENCY_PACKAGES.forEach(pkg => {
        Object.entries(pkg.competencies).forEach(([comp, pts]) => {
          compMap[comp] = (compMap[comp] || 0) + Math.round(pts * 0.6);
        });
      });
      try { await CompetencySystem.award(compMap); } catch(e) {}
    } else {
      try { await CompetencySystem.award({ 'Decision Making': 4, 'Product Thinking': 4 }); } catch(e) {}
    }

    // Competency package breakdown using packageId
    const byPkg = {};
    results.forEach(r => {
      const pkgId = r.packageId || 'PKG-FUNDAMENTALS';
      if (!byPkg[pkgId]) byPkg[pkgId] = { total: 0, correct: 0 };
      byPkg[pkgId].total++;
      if (r.correct) byPkg[pkgId].correct++;
    });
    const pkgNames = {};
    const pkgIcons = {};
    COMPETENCY_PACKAGES.forEach(p => { pkgNames[p.id] = p.name; pkgIcons[p.id] = p.icon; });
    const domainRows = Object.entries(byPkg).map(([pkgId, s]) =>
      `<div class="cert-domain-row">
        <span class="cert-domain-name">${pkgIcons[pkgId] || ''} ${pkgNames[pkgId] || pkgId}</span>
        <span class="cert-domain-score ${s.correct === s.total ? 'perfect' : s.correct === 0 ? 'zero' : ''}">${s.correct}/${s.total}</span>
      </div>`).join('');

    _render(`<div class="practice-screen">
      <div class="ch-results-screen">
        <div class="ch-results-burst">${passed ? '🏆' : '📚'}</div>
        <h2 class="ch-results-title">${passed ? 'Passed!' : 'Keep studying'}</h2>
        <div class="cert-score-ring ${passed ? 'pass' : 'fail'}">
          <div class="cert-score-pct">${pctDisplay}%</div>
          <div class="cert-score-sub">${correct} of ${total} correct</div>
        </div>
        <p class="ch-results-msg">${passed
          ? 'Strong result. You\'ve demonstrated solid PM knowledge across multiple domains.'
          : `You need 70% to pass — you scored ${pctDisplay}%. Review the domains where you missed questions and try again.`
        }</p>
        <div class="cert-domain-breakdown">
          <div class="cert-breakdown-title">Score by competency</div>
          ${domainRows}
        </div>
        <div class="ch-results-actions">
          <button class="ch-retry-btn" id="cert-retry">Try again</button>
          <button class="ch-home-btn" id="cert-home">Back to Practice ${icon(ICO_ARROW)}</button>
        </div>
      </div>
    </div>`);

    _q('#cert-retry').addEventListener('click', () => _renderCertQuestion(0, []));
    _q('#cert-home').addEventListener('click', _renderPracticeHome);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PUBLIC API
  // ════════════════════════════════════════════════════════════════════════════
  function render(container) {
    _container = container;
    const intent = StateManager.get('practice_intent', null);
    StateManager.set('practice_intent', null);

    if (intent === 'challenges')    { _renderChallenges();       return; }
    if (intent === 'interview')     { _renderInterviewHome();    return; }
    if (intent === 'certification') { _renderCertificationHome(); return; }
    _renderPracticeHome();
  }

  function destroy() { _container = null; }
  return { render, destroy };
})();
